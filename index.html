<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
    />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>oodim Game — Pac-Man</title>
    <style>
      :root {
        color-scheme: dark;
        /* Canvas's native aspect: 448 × 496. The maze is wider in
           portrait once we squeeze it to viewport width, so we treat
           that ratio as the source of truth for sizing. */
        --pac-aspect: calc(448 / 496);
      }
      html,
      body {
        margin: 0;
        height: 100%;
        background: #000;
        color: #fff;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        /* Suppress iOS rubber-band scroll on swipe gestures — the
           game is the whole viewport, there's nothing to scroll TO. */
        overflow: hidden;
        overscroll-behavior: none;
        -webkit-user-select: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        /* Use the dynamic viewport unit when supported so the bottom
           browser UI bar on mobile doesn't clip the d-pad. */
        height: 100dvh;
        padding: env(safe-area-inset-top) env(safe-area-inset-right)
          env(safe-area-inset-bottom) env(safe-area-inset-left);
        box-sizing: border-box;
      }
      /* Canvas scales to fit the viewport while preserving the native
         448:496 aspect. min() with both viewport dimensions means
         portrait phones cap on width, landscape laptops cap on height,
         and the canvas never overflows either axis. */
      #game {
        background: #000;
        image-rendering: pixelated;
        /* Reserve ~180px of vertical space for the d-pad on small
           screens; on large screens the d-pad is hidden so we use
           the full height. */
        width: min(100vw, calc((100dvh - 200px) * var(--pac-aspect)));
        height: auto;
        max-width: 100vw;
        max-height: 100dvh;
        /* The canvas itself receives swipe events — disable
           native pan/zoom so swipes register as gestures, not scrolls. */
        touch-action: none;
      }
      /* On screens wide enough to fit the canvas at native-ish size
         without the d-pad eating space, allow the canvas to use the
         full viewport height. */
      @media (min-width: 900px) and (min-height: 600px) {
        #game {
          width: auto;
          height: min(100dvh, calc(100vw / var(--pac-aspect)));
        }
      }
      /* On-screen d-pad. Hidden on devices that report a fine pointer
         (mouse / trackpad) since the keyboard is the better input there;
         shown on coarse-pointer devices (touchscreens). */
      #dpad {
        display: none;
        grid-template-areas:
          ". up ."
          "left . right"
          ". down .";
        gap: 6px;
        touch-action: none;
      }
      @media (pointer: coarse) {
        #dpad {
          display: grid;
        }
      }
      #dpad button {
        width: 56px;
        height: 56px;
        border-radius: 12px;
        border: 1px solid #2121de;
        background: #111;
        color: #ffd76a;
        font-size: 22px;
        font-family: inherit;
        line-height: 1;
        display: grid;
        place-items: center;
        /* Each button captures its own taps; pointerdown bubbles to
           the #dpad container which the input module is listening on. */
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
        cursor: pointer;
      }
      #dpad button:active {
        background: #2121de;
        color: #fff;
      }
      #dpad [data-dir="up"] {
        grid-area: up;
      }
      #dpad [data-dir="left"] {
        grid-area: left;
      }
      #dpad [data-dir="right"] {
        grid-area: right;
      }
      #dpad [data-dir="down"] {
        grid-area: down;
      }
    </style>
  </head>
  <body>
    <canvas id="game" width="448" height="496"></canvas>
    <!-- On-screen d-pad. data-dir attributes are the contract with
         src/game/input.ts; the input module listens for pointerdown
         on this container and reads data-dir to dispatch the same
         direction intents the keyboard does. -->
    <div id="dpad" aria-label="On-screen direction pad" role="group">
      <button type="button" data-dir="up" aria-label="Up">▲</button>
      <button type="button" data-dir="left" aria-label="Left">◀</button>
      <button type="button" data-dir="right" aria-label="Right">▶</button>
      <button type="button" data-dir="down" aria-label="Down">▼</button>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
