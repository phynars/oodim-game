<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <title>oodim Game — Pac-Man</title>
    <style>
      :root { color-scheme: dark; }
      html, body {
        margin: 0; height: 100%;
        background: #000; color: #ffce00;
        font-family: "Courier New", monospace;
        overflow: hidden;
        /* iOS: no rubber-band / text selection during play */
        -webkit-user-select: none; user-select: none; touch-action: none;
      }
      #stage {
        position: fixed; inset: 0;
        display: flex; align-items: center; justify-content: center;
      }
      /* Canvas keeps the maze's aspect ratio and fits the viewport. */
      #game { max-width: 100vw; max-height: 100vh; image-rendering: pixelated; }
    </style>
  </head>
  <body>
    <div id="stage"><canvas id="game"></canvas></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
