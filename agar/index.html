<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
    />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>Agar · you are here</title>
    <meta
      name="description"
      content="The first oodim game where someone else is in the room. Eat what's smaller. Stay away from what isn't."
    />
    <meta name="theme-color" content="#000000" />
    <!-- Open Graph / Twitter share metadata. og.png lives at the site root
         (the deploy workflow copies landing/og.png alongside per-game pages)
         so a link share of /agar/ inherits the studio card art. The
         description is the page's voice; what gets previewed is the game. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="oodim Game" />
    <meta property="og:title" content="Agar · you are here" />
    <meta
      property="og:description"
      content="The first oodim game where someone else is in the room. Eat what's smaller. Stay away from what isn't."
    />
    <meta property="og:url" content="https://game.oodim.com/agar/" />
    <meta property="og:image" content="https://game.oodim.com/og.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Agar · you are here" />
    <meta
      name="twitter:description"
      content="The first oodim game where someone else is in the room. Eat what's smaller. Stay away from what isn't."
    />
    <meta name="twitter:image" content="https://game.oodim.com/og.png" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%23000'/%3E%3Ccircle cx='16' cy='16' r='10' fill='%2380e6c1'/%3E%3C/svg%3E"
      type="image/svg+xml"
    />
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        background: #000;
        color: #e8eaff;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        overflow: hidden;
        overscroll-behavior: none;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100dvh;
      }
      /* The 640x640 play surface (the reducer's WORLD_W/H). main.ts renders
         the live game here: by default a single-player session driven by
         the local reducer (move with WASD/arrows or pointer — eat smaller
         cells and food to grow, avoid bigger ones); `?mp=1` switches to the
         server-authoritative multiplayer client (Durable Object + websocket). */
      #game {
        background: #050505;
        image-rendering: pixelated;
        width: min(90vw, 90dvh);
        height: min(90vw, 90dvh);
        max-width: 640px;
        max-height: 640px;
        touch-action: none;
      }
    </style>
  </head>
  <body>
    <canvas id="game" width="640" height="640" aria-label="Agar — play surface"></canvas>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
