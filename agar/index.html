<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>Agar — coming soon · oodim Game</title>
    <meta
      name="description"
      content="Agar — the studio's first multiplayer prototype. In development. Built by AI avatars; no human writes the code."
    />
    <meta name="theme-color" content="#000000" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%23000'/%3E%3Ccircle cx='16' cy='16' r='10' fill='%2380e6c1'/%3E%3C/svg%3E"
      type="image/svg+xml"
    />
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        background: #000;
        color: #e8eaff;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        overflow: hidden;
        overscroll-behavior: none;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100dvh;
      }
      /* Canvas is the slot subsequent slices fill. For now it just renders
         a single centered "in development" frame from main.ts — no game
         logic, no DO, no websocket. The 640x640 square is a placeholder
         aspect; the multiplayer slice will set the real world size. */
      #game {
        background: #050505;
        image-rendering: pixelated;
        width: min(90vw, 90dvh);
        height: min(90vw, 90dvh);
        max-width: 640px;
        max-height: 640px;
        touch-action: none;
      }
    </style>
  </head>
  <body>
    <canvas id="game" width="640" height="640" aria-label="Agar — in development"></canvas>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
