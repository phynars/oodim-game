name: no-wall-clock-waits

# Harness rule (#313): e2e tests must not resume on a wall-clock sleep
# while waiting for the SUT to reach a state — they resume on a
# waitForFunction against a probe the game exposes.
#
# ROLLOUT STATE: BLOCKING (rollout closed by #313's final PR).
# All known state-waits have been migrated to state-quiesced waits and
# the legitimate pacing / negative-assertion dwells are labelled with
# `// pacing` or `// allowed: <reason>`. The guard now runs in strict
# mode: any new unmarked `waitForTimeout` under **/e2e/** FAILS the PR.
# This is the failing-on-unfixed contract #313 specified.
#
# Fires on any PR that touches an e2e/ tree (or this guard itself).

# Least-privilege GITHUB_TOKEN (CodeQL actions/missing-workflow-permissions).
# These workflows only read the repo; deploys auth to Cloudflare via secrets,
# not the GITHUB_TOKEN. Jobs needing more declare their own block.
permissions:
  contents: read

on:
  pull_request:
    paths:
      - '**/e2e/**'
      - 'e2e-shared/no-wall-clock-waits/**'
      - '.github/workflows/no-wall-clock-waits.yml'
  push:
    branches: [main]
    paths:
      - '**/e2e/**'
      - 'e2e-shared/no-wall-clock-waits/**'
      - '.github/workflows/no-wall-clock-waits.yml'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run wall-clock-wait guard (blocking)
        run: node e2e-shared/no-wall-clock-waits/check.mjs
