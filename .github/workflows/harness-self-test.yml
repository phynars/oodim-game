name: harness-self-test
# Multiplayer harness self-fixture gate (Refs #129, #162, Closes #152).
#
# The harness in e2e-shared/multiplayer/harness.ts exports a
# HARNESS_BREAK_MODE env switch with four values:
#   - "off"             : production behaviour; all primitives obey their
#                         contract.
#   - "unstable-order"  : orderTape's stable-tiebreak is sabotaged
#                         (duplicate-key events sort by REVERSE input pos).
#   - "drop-every-7th"  : pureReplay skips every 7th event (1-indexed).
#   - "nan-blind"       : structuralEquals treats NaN as !== NaN.
#
# CONTRACT (positive break-detection, NOT inverted exit codes):
#
# The companion spec e2e-shared/multiplayer/harness.spec.ts contains
# two kinds of cases:
#   (1) Contract cases — run only under "off"; under each break mode the
#       cases that the mode would falsify are `test.skip`'d. (E.g. the
#       "stable on duplicate" case is skipped under unstable-order.)
#   (2) Self-test cases — `test("self-test: <mode>", ...)` — each one
#       SKIPS unless HARNESS_BREAK_MODE matches its mode, and asserts the
#       sabotaged behaviour POSITIVELY (e.g. under drop-every-7th, replay
#       of a 7-event tape MUST yield 6 increments, not 7).
#
# Therefore every job — "off" and every break mode — is expected to exit
# zero in the steady state. What this workflow gates is:
#
#   - "off" goes red if a primitive regresses out of contract (a real
#     production bug).
#   - "<mode>" goes red if either:
#       a) the break-mode code path no longer sabotages the primitive
#          (someone removed the `if (mode === "...")` branch), OR
#       b) the production primitive accidentally adopted the broken
#          behaviour, so the contract case that gets SKIPPED under that
#          mode now fails under "off" too — caught by the off job, but
#          the matching self-test stays green.
#
# That is #129's "fails-on-unfixed" criterion satisfied IN-TREE: the
# sabotage and the assertion that detects it ship in the same commit.
#
# Runs independently of the per-product lanes (pacman/galaga/doom); the
# auto-merge gate reads workflow-run conclusion, so a skipped lane is
# not a failure.

on:
  pull_request:
    paths:
      - 'e2e-shared/multiplayer/**'
      - '.github/workflows/harness-self-test.yml'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig*.json'

jobs:
  contract:
    name: harness self-test (off — contract holds)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - name: Run harness spec with HARNESS_BREAK_MODE="off"
        env:
          # Quoted: bare `off` is a YAML 1.1 boolean keyword and would be
          # coerced to the string "false" before reaching the process env.
          HARNESS_BREAK_MODE: "off"
        run: npm run test:harness

  break-modes:
    name: harness self-test (${{ matrix.mode }} — sabotage detected)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        mode:
          - unstable-order
          - drop-every-7th
          - nan-blind
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - name: Run harness spec with HARNESS_BREAK_MODE=${{ matrix.mode }}
        env:
          HARNESS_BREAK_MODE: ${{ matrix.mode }}
        # Expected exit 0: the spec's `self-test: ${{ matrix.mode }}` case
        # asserts the sabotaged behaviour positively, and the contract
        # cases that the sabotage would falsify are `test.skip`'d for this
        # mode. A non-zero exit means either the break-mode code path no
        # longer sabotages the primitive (the `if (mode === ...)` branch
        # was removed) or a contract case was un-skipped without revisiting
        # this gate — either way, the self-fixture is broken and the
        # author needs to look at it.
        run: npm run test:harness
