# agar persistence harness — red/green polarity gate (issue #323).
#
# Mirror of .github/workflows/agar-multiplayer-redgreen.yml (#276) for
# the persistence rung. The persistence-harness.spec.ts (#307) declares
# two polarity inverses:
#
#   - monotonic-persist  MUST go RED when AGAR_DO_BREAK_MODE=non-monotone-persist
#   - eviction-roundtrip MUST go RED when AGAR_DO_BREAK_MODE=lossy-persist
#
# This workflow enforces both. Until #319 (slice 1) unskips
# monotonic-persist, the red-polarity job hits the skip-when-skipped
# guard and exits 0 with a clear log line — that's intentional preflight
# behaviour per AC3.
#
# When #319 lands and unskips the test, the red job genuinely runs the
# spec under the broken break-mode and inverts the exit code: a passing
# test (guard not honest) becomes CI failure; a failing test (guard
# honest) becomes CI success.
#
# WIRING — mirrors #276 literally:
#
#   - Deps install at REPO ROOT (`npm ci`). There is no agar/package.json;
#     scripts live in the root package.json (build:agar, dev:agar-server,
#     test:e2e:agar, etc).
#   - Playwright is invoked via the `npm run test:e2e:agar:persistence*`
#     scripts (added in this PR alongside the workflow), which bake in
#     `--config agar/playwright.config.ts` / the broken sibling configs.
#     Invoking `npx playwright test e2e/foo.spec.ts` directly skips the
#     config — and with it the vite preview + wrangler dev webServers —
#     so the green job would never reach a running stack.
#   - The break-mode env must reach the WORKER (the Durable Object reads
#     it once at construction), NOT the test runner. The precedent does
#     this in package.json:
#         dev:agar-server:broken =
#           wrangler dev --config agar/wrangler.toml --var AGAR_DO_BREAK_MODE:drop-every-7th
#     The persistence epic mirrors that pattern with per-mode scripts:
#         dev:agar-server:broken-non-monotone-persist  → --var AGAR_DO_BREAK_MODE:non-monotone-persist
#         dev:agar-server:broken-lossy-persist         → --var AGAR_DO_BREAK_MODE:lossy-persist
#     and matching playwright.broken-*.config.ts files that point their
#     wrangler webServer at the right script. The red job runs
#     `npm run test:e2e:agar:persistence:broken-non-monotone` and lets
#     those configs thread the env through `wrangler dev --var`.
#
#     Setting `AGAR_DO_BREAK_MODE` as a step-level `env:` does nothing —
#     it lands on the GitHub runner shell, not on the wrangler subprocess.
#     The runner-env approach was the round-1 wiring bug; do not regress.
#
# AC4 hook: when slice 3 unskips eviction-roundtrip, un-comment the
# marked block below. Keep this as ONE workflow file — do not split per
# slice.

name: agar-persistence-redgreen

# Least-privilege GITHUB_TOKEN (CodeQL actions/missing-workflow-permissions).
# These workflows only read the repo; deploys auth to Cloudflare via secrets,
# not the GITHUB_TOKEN. Jobs needing more declare their own block.
permissions:
  contents: read

on:
  pull_request:
    paths:
      - "agar/**"
      - "e2e-shared/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/agar-persistence-redgreen.yml"
  push:
    branches: [main]
    paths:
      - "agar/**"
      - "e2e-shared/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/agar-persistence-redgreen.yml"

jobs:
  green-polarity:
    name: persistence-harness (green — default mode)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # Routes through the `test:e2e:agar:persistence` npm script (added
      # in this PR) which is `playwright test --config
      # agar/playwright.config.ts e2e/persistence-harness.spec.ts`. The
      # config brings up vite preview + wrangler dev — without it, the
      # spec runs against nothing and the file-time `break-mode-parse`
      # test passes vacuously while the slice-1/3 tests can't ever
      # genuinely run when unskipped.
      - name: Run agar persistence-harness spec (green polarity)
        run: npm run test:e2e:agar:persistence

  red-polarity-monotonic:
    name: persistence-harness (red — non-monotone-persist MUST fail monotonic-persist)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # AC3 — skip-when-skipped guard. Until #319 (slice 1) unskips
      # monotonic-persist, there is no test for the broken break-mode
      # to flip. We detect the per-test skip by anchoring on the test
      # title `monotonic-persist` (the `-A 3` window scopes the second
      # grep to that test's first 3 lines, so it cannot leak into the
      # `eviction-roundtrip` skip below) and looking for `test.skip(`
      # in that window. We deliberately do NOT match the `true` literal
      # — the spec writes the call across two lines:
      #
      #   test.skip(
      #     true,
      #     "unskipped by agar persistence slice 1 ...",
      #   );
      #
      # so a `test\.skip(\s*true` regex (round-1 Mara catch) never
      # matches under pipe-grep's line-oriented mode. The `-A 3`
      # scoping is what keeps this honest, not the `true` literal:
      # when slice 1 unskips by deleting the whole `test.skip(...)`
      # call, the bare `test.skip(` token disappears from the window
      # and the preflight flips to "live".
      - name: Skip-when-skipped preflight (monotonic-persist)
        id: preflight
        shell: bash
        run: |
          if grep -A 3 'test(\s*"monotonic-persist' agar/e2e/persistence-harness.spec.ts | grep -q 'test\.skip('; then
            echo "monotonic-persist is still skipped — #319 has not landed yet — red polarity not enforced this run."
            echo "skipped=true" >> "$GITHUB_OUTPUT"
          else
            echo "monotonic-persist is live — enforcing red polarity under AGAR_DO_BREAK_MODE=non-monotone-persist."
            echo "skipped=false" >> "$GITHUB_OUTPUT"
          fi

      # Red polarity: invert the Playwright exit code. The spec is
      # expected to FAIL under AGAR_DO_BREAK_MODE=non-monotone-persist,
      # which the `test:e2e:agar:persistence:broken-non-monotone` script
      # threads into the Worker via `wrangler dev --var` (NOT via runner
      # env — see WIRING note at top). A passing exit code here means
      # the guard is dishonest — we convert that to a CI failure. A
      # non-zero exit means the guard caught the broken break-mode as
      # designed — we convert that to a CI pass.
      - name: Run agar persistence-harness monotonic-persist (red polarity — MUST fail)
        if: steps.preflight.outputs.skipped == 'false'
        shell: bash
        run: |
          set +e
          npm run test:e2e:agar:persistence:broken-non-monotone
          rc=$?
          set -e
          if [ "$rc" -eq 0 ]; then
            echo "::error::Broken-polarity spec passed (exit 0) — monotonic-persist did NOT catch the non-monotone-persist break mode. Did slice 1's break-mode wiring regress, or is the test asserting a weaker property than the harness contract?"
            exit 1
          else
            echo "Broken-polarity spec failed as expected (exit $rc) — monotonic-persist guard is honest."
            exit 0
          fi

  red-polarity-eviction:
    name: persistence-harness (red — lossy-persist MUST fail eviction-roundtrip)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # Slice 3 has landed and eviction-roundtrip is live. Keep the
      # preflight anyway: if a future refactor accidentally re-skips
      # the test, this job exits with an explicit log instead of
      # pretending the lossy-persist polarity was exercised.
      - name: Skip-when-skipped preflight (eviction-roundtrip)
        id: preflight
        shell: bash
        run: |
          # Anchor on the eviction-roundtrip title — same shape as the
          # monotonic-persist preflight above. Match `test.skip(` only
          # (not `test.skip(\s*true`); the spec splits the call across
          # lines and pipe-grep is line-oriented. The `-A 3` window is
          # what scopes us to this test's skip, not the `true` arg.
          if grep -A 3 'test(\s*"eviction-roundtrip' agar/e2e/persistence-harness.spec.ts | grep -q 'test\.skip('; then
            echo "eviction-roundtrip is skipped — red polarity not enforced this run."
            echo "skipped=true" >> "$GITHUB_OUTPUT"
          else
            echo "eviction-roundtrip is live — enforcing red polarity under AGAR_DO_BREAK_MODE=lossy-persist."
            echo "skipped=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run agar persistence-harness eviction-roundtrip (red polarity — MUST fail)
        if: steps.preflight.outputs.skipped == 'false'
        shell: bash
        run: |
          set +e
          npm run test:e2e:agar:persistence:broken-lossy
          rc=$?
          set -e
          if [ "$rc" -eq 0 ]; then
            echo "::error::Broken-polarity spec passed (exit 0) — eviction-roundtrip did NOT catch the lossy-persist break mode."
            exit 1
          else
            echo "Broken-polarity spec failed as expected (exit $rc) — eviction-roundtrip guard is honest."
            exit 0
          fi
