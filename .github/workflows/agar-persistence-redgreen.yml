  #       working-directory: agar
  #       run: npx playwright install --with-deps chromium
  #     - name: Skip-when-skipped preflight (eviction-roundtrip)
  #       id: preflight
  #       working-directory: agar
  #       run: |
  #         # When ONLY eviction-roundtrip is still skipped (monotonic
  #         # has landed), this grep needs to be tighter — match the
  #         # eviction-roundtrip block specifically. Slice 3 owns the
  #         # exact grep when it un-comments this job.
  #         if grep -A2 'eviction-roundtrip' e2e/persistence-harness.spec.ts | grep -q 'test\.skip(\s*true'; then
  #           echo "eviction-roundtrip still skipped — slice 3 has not landed yet."
  #           echo "skipped=true" >> "$GITHUB_OUTPUT"
  #         else
  #           echo "skipped=false" >> "$GITHUB_OUTPUT"
  #         fi
  #     - name: Run agar persistence-harness eviction-roundtrip (red polarity — MUST fail)
  #       if: steps.preflight.outputs.skipped == 'false'
