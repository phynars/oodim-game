name: Deploy staging.game.oodim.com

# Mirrors oodim's deploy-staging: dispatch with a branch/ref to preview a
# change at https://staging.game.oodim.com/pacman/ before it reaches prod.
# The autonomous pipeline opens PRs to this repo; deploy the PR branch here to
# eyeball the gameplay, then merge to main → prod (game.oodim.com). The
# gameplay E2E (CI) is the hard gate; staging is the visual preview.

# Least-privilege GITHUB_TOKEN (CodeQL actions/missing-workflow-permissions).
# These workflows read the repo; deploys auth to Cloudflare via secrets, not
# the GITHUB_TOKEN. Jobs needing more declare their own block.
permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch/ref to deploy to staging"
        required: false
        default: main

concurrency:
  group: deploy-game-staging
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      # npm install (not `npm ci`) — see deploy.yml: keeps deploy tolerant of an
      # avatar's package-lock drift so CI-green ⟹ deploy works.
      - run: npm install
      - run: npm run build  # all products → dist-<name>/ per product (base /<name>/)
      - name: Stage built assets (portfolio — every product, auto-derived)
        run: |
          rm -rf public
          # AUTO-DERIVE: stage EVERY dist-<name>/ into public/<name>/ (mirrors
          # deploy.yml). New product ships once its build emits dist-<name>.
          shopt -s nullglob
          staged=0
          for d in dist-*/; do
            name="${d#dist-}"; name="${name%/}"
            mkdir -p "public/$name"
            cp -r "$d"* "public/$name/"
            echo "staged dist-$name -> public/$name/"
            staged=$((staged+1))
          done
          if [ "$staged" -eq 0 ]; then echo "::error::no dist-*/ dirs to stage — did the build run?"; exit 1; fi
          cp -r landing/. public/
      - name: Deploy to Cloudflare (staging)
        if: ${{ env.CF_TOKEN != '' }}
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.100.0"
          command: deploy --config wrangler.staging.jsonc
      - name: Note if deploy skipped
        if: ${{ env.CF_TOKEN == '' }}
        run: echo "::warning::CLOUDFLARE_API_TOKEN secret not set — built but did not publish to staging."
