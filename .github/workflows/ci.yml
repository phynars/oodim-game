name: CI
# PR-only quality gate (2026-06-16). The post-merge run on `push: [main]` was
# redundant: slices merge serially (the linear blocked-by chain), so there's no
# concurrent-merge interaction for a main re-run to catch, and deploy.yml
# rebuilds on main (a broken main still fails to publish). PR-only halves CI
# minutes per slice and speeds merge→deploy.
on:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      # Aggregate scripts typecheck + build ALL products (pacman + galaga +
      # doom), so a break in any fails the PR. See package.json for per-project
      # scripts (build:pacman / build:galaga / build:doom).
      - run: npm run typecheck
      - run: npm run build

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npx playwright install --with-deps chromium
      # Aggregate runs ALL gameplay harnesses (pacman + galaga + doom) — "CI
      # for gameplay" is the merge gate for every product in the portfolio.
      # Doom's harness forces software WebGL (SwiftShader) in headless Chromium
      # — see doom/playwright.config.ts + doom/docs/ARCHITECTURE.md.
      - run: npm run test:e2e
