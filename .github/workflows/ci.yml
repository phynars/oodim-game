name: CI
# Per-product CI lanes (2026-06-19). Previously ONE aggregate job ran
# `typecheck && build && test:e2e` across pacman + galaga + doom, so ANY
# product's broken test failed EVERY PR — a galaga regression jammed doom
# slices and a doom WebGL flake jammed galaga (the recurring cross-product
# CI jam). Now a `changes` job detects which product(s) a PR touches, and
# only those lanes run: a doom-only PR is gated solely by doom's
# typecheck/build/gameplay-harness; a shared/root change runs all three.
# The auto-merge gate reads the workflow RUN conclusion (skipped lanes don't
# fail it), so no branch-protection change is needed.
# Least-privilege GITHUB_TOKEN (CodeQL actions/missing-workflow-permissions).
# These workflows read the repo; deploys auth to Cloudflare via secrets, not
# the GITHUB_TOKEN. Jobs needing more declare their own block.
permissions:
  contents: read

on:
  pull_request:

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      pacman: ${{ steps.filter.outputs.pacman }}
      galaga: ${{ steps.filter.outputs.galaga }}
      doom: ${{ steps.filter.outputs.doom }}
      agar: ${{ steps.filter.outputs.agar }}
      aftersign: ${{ steps.filter.outputs.aftersign }}
      shared: ${{ steps.filter.outputs.shared }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            pacman:
              - 'pacman/**'
            galaga:
              - 'galaga/**'
            doom:
              - 'doom/**'
            agar:
              - 'agar/**'
            aftersign:
              - 'aftersign/**'
              - 'e2e-shared/aftersign/**'
            shared:
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig*.json'
              - '.github/workflows/ci.yml'

  # Product-wiring guard — always runs (no filter). Fails the PR if any product
  # dir (<name>/vite.config.ts) isn't fully wired into package.json + ci.yml, so
  # a new game can't ship half-registered (the agar/ deploy-404 + no-CI-lane
  # class, 2026-06-20). See scripts/check-product-wiring.mjs.
  wiring:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: node scripts/check-product-wiring.mjs

  pacman:
    needs: changes
    if: ${{ needs.changes.outputs.pacman == 'true' || needs.changes.outputs.shared == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install
      - run: npm run typecheck:pacman
      - run: npm run build:pacman
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e:pacman
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pacman-playwright-trace
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore
          retention-days: 7

  galaga:
    needs: changes
    if: ${{ needs.changes.outputs.galaga == 'true' || needs.changes.outputs.shared == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install
      - run: npm run typecheck:galaga
      - run: npm run build:galaga
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e:galaga
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: galaga-playwright-trace
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore
          retention-days: 7

  doom:
    needs: changes
    if: ${{ needs.changes.outputs.doom == 'true' || needs.changes.outputs.shared == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install
      - run: npm run typecheck:doom
      - run: npm run build:doom
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e:doom
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: doom-playwright-trace
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore
          retention-days: 7

  agar:
    needs: changes
    if: ${{ needs.changes.outputs.agar == 'true' || needs.changes.outputs.shared == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install
      - run: npm run typecheck:agar
      - run: npm run build:agar
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e:agar
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: agar-playwright-trace
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore
          retention-days: 7

  aftersign:
    needs: changes
    if: ${{ needs.changes.outputs.aftersign == 'true' || needs.changes.outputs.shared == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install
      - run: npm run typecheck:aftersign
      - run: npm run build:aftersign
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e:aftersign
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: aftersign-playwright-trace
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore
          retention-days: 7
