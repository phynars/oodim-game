name: CI
# Per-product CI lanes (2026-06-19). Previously ONE aggregate job ran
# `typecheck && build && test:e2e` across pacman + galaga + doom, so ANY
# product's broken test failed EVERY PR — a galaga regression jammed doom
# slices and a doom WebGL flake jammed galaga (the recurring cross-product
# CI jam). Now a `changes` job detects which product(s) a PR touches, and
# only those lanes run: a doom-only PR is gated solely by doom's
# typecheck/build/gameplay-harness; a shared/root change runs all three.
# The auto-merge gate reads the workflow RUN conclusion (skipped lanes don't
# fail it), so no branch-protection change is needed.
on:
  pull_request:

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      pacman: ${{ steps.filter.outputs.pacman }}
      galaga: ${{ steps.filter.outputs.galaga }}
      doom: ${{ steps.filter.outputs.doom }}
      agar: ${{ steps.filter.outputs.agar }}
      shared: ${{ steps.filter.outputs.shared }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            pacman:
              - 'pacman/**'
            galaga:
              - 'galaga/**'
            doom:
              - 'doom/**'
            agar:
              - 'agar/**'
            shared:
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig*.json'
              - '.github/workflows/ci.yml'

  # Product-wiring guard — always runs (no filter). Fails the PR if any product
  # dir (<name>/vite.config.ts) isn't fully wired into package.json + ci.yml, so
  # a new game can't ship half-registered (the agar/ deploy-404 + no-CI-lane
  # class, 2026-06-20). See scripts/check-product-wiring.mjs.
  wiring:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/check-product-wiring.mjs

  pacman:
    needs: changes
    if: ${{ needs.changes.outputs.pacman == 'true' || needs.changes.outputs.shared == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run typecheck:pacman
      - run: npm run build:pacman
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e:pacman
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pacman-playwright-trace
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore
          retention-days: 7

  galaga:
    needs: changes
    if: ${{ needs.changes.outputs.galaga == 'true' || needs.changes.outputs.shared == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run typecheck:galaga
      - run: npm run build:galaga
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e:galaga
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: galaga-playwright-trace
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore
          retention-days: 7

  # Diagnostic-only lane for #255 — runs the formation-breathing-lag spec
  # gated behind GALAGA_DIAG=1 so the prior 5-commit cold-CI failure mode
  # is captured as a trace artifact WITHOUT jamming the per-product merge
  # gate. `continue-on-error: true` means a red run here does NOT fail the
  # PR (the spec is on a known-flaky footing; the goal is to see WHICH
  # expect() line fails on cold CI, not to gate on it). Once the failure
  # mode is in hand from the uploaded trace, a follow-up PR will either
  # tune the spec assertions or fold it into the main `galaga` lane and
  # remove this diagnostic job.
  galaga-diag-breathing:
    needs: changes
    if: ${{ needs.changes.outputs.galaga == 'true' || needs.changes.outputs.shared == 'true' }}
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      GALAGA_DIAG: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run build:galaga
      - run: npx playwright install --with-deps chromium
      # `--reporter=list` is already the default in galaga/playwright.config.ts,
      # but we set it explicitly here so the per-test pass/fail lines appear
      # in the workflow log (the artifact uploaded below is the trace; the
      # log is the human-readable summary). `--grep` narrows to just the
      # breathing-lag spec so this lane is fast.
      - run: npx playwright test --config=galaga/playwright.config.ts --reporter=list --grep "formation breathing"
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: galaga-diag-breathing-trace
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore
          retention-days: 14

  doom:
    needs: changes
    if: ${{ needs.changes.outputs.doom == 'true' || needs.changes.outputs.shared == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run typecheck:doom
      - run: npm run build:doom
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e:doom
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: doom-playwright-trace
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore
          retention-days: 7

  agar:
    needs: changes
    if: ${{ needs.changes.outputs.agar == 'true' || needs.changes.outputs.shared == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run typecheck:agar
      - run: npm run build:agar
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e:agar
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: agar-playwright-trace
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore
          retention-days: 7
