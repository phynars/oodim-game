name: Deploy game.oodim.com

# Publishes the built game to https://game.oodim.com/pacman/ via an
# assets-only Cloudflare Worker. Runs on every push to main (after a slice
# merges) and on manual dispatch. CI (ci.yml) is the quality gate; this is
# the publish step.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-game
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    # CF_TOKEN mirrors the secret so the deploy step can skip gracefully
    # (job stays green) until the CLOUDFLARE_API_TOKEN repo secret is added.
    env:
      CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run build  # all products → dist-pacman/ + dist-galaga/ + dist-doom/ + dist-agar/
      - name: Stage built assets (portfolio — /pacman/ + /galaga/ + /doom/ + /agar/)
        run: |
          rm -rf public
          mkdir -p public/pacman public/galaga public/doom public/agar
          cp -r dist-pacman/* public/pacman/
          cp -r dist-galaga/* public/galaga/
          cp -r dist-doom/* public/doom/
          cp -r dist-agar/* public/agar/
          # Root portfolio landing linking both products. Copy the whole
          # landing/ directory (not just index.html) so siblings like og.png
          # resolve at site root — landing/index.html references
          # https://game.oodim.com/og.png in its OG/Twitter tags.
          cp -r landing/. public/
      - name: Deploy to Cloudflare
        if: ${{ env.CF_TOKEN != '' }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # wrangler 3.x predates assets-only Workers (errors "Missing
          # entry-point"); pin 4.x to match the local deploy.
          wranglerVersion: "4.100.0"
      - name: Note if deploy skipped
        if: ${{ env.CF_TOKEN == '' }}
        run: echo "::warning::CLOUDFLARE_API_TOKEN secret not set — built but did not publish. Add it in repo Settings → Secrets → Actions to enable auto-publish."
