name: Deploy game.oodim.com

# Publishes the built game to https://game.oodim.com/pacman/ via an
# assets-only Cloudflare Worker. Runs on every push to main (after a slice
# merges) and on manual dispatch. CI (ci.yml) is the quality gate; this is
# the publish step.

# Least-privilege GITHUB_TOKEN (CodeQL actions/missing-workflow-permissions).
# These workflows read the repo; deploys auth to Cloudflare via secrets, not
# the GITHUB_TOKEN. Jobs needing more declare their own block.
permissions:
  contents: read

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-game
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    # CF_TOKEN mirrors the secret so the deploy step can skip gracefully
    # (job stays green) until the CLOUDFLARE_API_TOKEN repo secret is added.
    env:
      CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      # npm install (not `npm ci`) so the deploy tolerates a package-lock that an
      # avatar's dependency change left out of sync — CI uses npm install too, so
      # this keeps "CI green ⟹ deploy works" (avatars can edit package.json but
      # can't regenerate the lock; npm ci's strict-sync broke deploys, 2026-06-20).
      - run: npm install
      - run: npm run build  # all products → dist-<name>/ per product (base /<name>/)
      - name: Stage built assets (portfolio — every product, auto-derived)
        run: |
          rm -rf public
          # AUTO-DERIVE: stage EVERY dist-<name>/ the build emitted into
          # public/<name>/. A new product ships automatically once its build
          # produces dist-<name> — no per-game line to forget. (2026-06-20:
          # agar/ shipped but a hardcoded per-game cp block only staged
          # pacman/galaga/doom, so game.oodim.com/agar 404'd.)
          shopt -s nullglob
          staged=0
          for d in dist-*/; do
            name="${d#dist-}"; name="${name%/}"
            mkdir -p "public/$name"
            cp -r "$d"* "public/$name/"
            echo "staged dist-$name -> public/$name/"
            staged=$((staged+1))
          done
          if [ "$staged" -eq 0 ]; then echo "::error::no dist-*/ dirs to stage — did the build run?"; exit 1; fi
          # Root portfolio landing. Whole dir (not just index.html) so siblings
          # like og.png resolve at site root.
          cp -r landing/. public/
      - name: Deploy to Cloudflare
        if: ${{ env.CF_TOKEN != '' }}
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # wrangler 3.x predates assets-only Workers (errors "Missing
          # entry-point"); pin 4.x to match the local deploy.
          wranglerVersion: "4.100.0"
      # PROD-REACHABILITY PLAY-SMOKE (2026-06-23). After publishing, load the LIVE
      # site in a real browser and assert each game is actually PLAYABLE — not just
      # 200. This is the gate that would have caught the agar WS-404 incident
      # (multiplayer server unrouted in prod → "no one is listening" while every
      # code/CI/deploy signal was green). A red here means "prod is broken for
      # players" — investigate immediately. Post-deploy (the site is already live),
      # so it's a verification alarm, not a pre-gate; staging mirror is a follow-up.
      - name: Prod play-smoke — games actually playable
        if: ${{ env.CF_TOKEN != '' }}
        run: |
          # Let the Worker + custom-domain route + DO migration propagate before
          # we hit the live URL as a player (the smoke also retries x2 internally).
          sleep 30
          npx playwright install --with-deps chromium
          SMOKE_BASE_URL=https://game.oodim.com npm run test:smoke
      - name: Note if deploy skipped
        if: ${{ env.CF_TOKEN == '' }}
        run: echo "::warning::CLOUDFLARE_API_TOKEN secret not set — built but did not publish. Add it in repo Settings → Secrets → Actions to enable auto-publish."
