# agar multiplayer convergence — red/green polarity gate (issue #276).
#
# Two jobs that together prove the `multiplayer-convergence.spec.ts`
# ordering invariant is honest:
#
#   1. green — the existing build (no env). Spec MUST pass.
#   2. red   — the AC3 desync-broken build (AGAR_DO_BREAK_MODE=
#              drop-every-7th, wired by `playwright.broken.config.ts`
#              via `dev:agar-server:broken`). Spec MUST FAIL — every
#              7th input is silently elided from the reducer fold, so
#              `pureReplay(SEED, appliedLog) !== canonical`.
#
# Both polarities together are the merge gate. A change that breaks
# either side fails CI:
#   - regress the spec → green job fails.
#   - delete the drop logic → red job's `playwright test` exits 0,
#     and the `!` inversion makes the step fail.
#
# The spec file is byte-identical across both jobs (same `testDir:
# "e2e"`); only the wrangler webServer command differs. That
# invariance IS the proof — see agar/docs/desync-broken-fixture-plan.md.

name: agar-multiplayer-fixture-redgreen

on:
  push:
    branches: [main]
    paths:
      - "agar/**"
      - "e2e-shared/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/agar-multiplayer-redgreen.yml"
  pull_request:
    paths:
      - "agar/**"
      - "e2e-shared/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/agar-multiplayer-redgreen.yml"

jobs:
  green:
    name: green — main DO, spec must pass
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run agar multiplayer-convergence spec (green polarity)
        run: npm run test:e2e:agar

  red:
    name: red — drop-every-7th DO, spec must fail
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      # Red polarity: invert the Playwright exit code. The spec is
      # expected to FAIL against the desync-broken Worker; if it
      # passes (exit 0), `!` flips it to non-zero and this step
      # fails — which is the signal that the drop logic was
      # silently removed and the fixture stopped proving anything.
      #
      # Shell explicitly set to bash so `!` and `set -o pipefail`
      # behave consistently across runners.
      - name: Run agar multiplayer-convergence spec (red polarity — MUST fail)
        shell: bash
        run: |
          set +e
          npm run test:e2e:agar:broken
          rc=$?
          set -e
          if [ "$rc" -eq 0 ]; then
            echo "::error::Broken-polarity spec passed (exit 0) — the AC3 drop logic is not exercising the convergence guard. Did the drop point regress?"
            exit 1
          fi
          echo "Broken-polarity spec failed as expected (exit $rc) — AC3 guard is honest."
