# AFTERSIGN NPC memory round-trip red/green harness.
#
# This is intentionally a harness contract, not gameplay implementation.
# The normal lane may remain skipped until the vertical slice exposes the
# durable NPC-memory surface. The broken-polarity lane forces the same spec
# awake with FLAGSHIP_BREAK_MODE=drop-memory and inverts the result, proving
# the contract would catch a missing persisted NPC memory beat.
#
# Mirrors .github/workflows/aftersign-durable-save-redgreen.yml — same
# preflight-then-invert shape the reviewer confirmed on #526.

name: aftersign-npc-memory-redgreen

permissions:
  contents: read

env:
  # Explicit red-lane retirement gate (issue #727). This is the ONLY source
  # of truth for whether the red-polarity lane runs — the workflow no longer
  # greps marker text out of the spec file, so editing spec comments cannot
  # flip red/green polarity. Flip to "live" when Phase 3 lands the
  # FLAGSHIP_BREAK_MODE=drop-memory conditional guard in
  # aftersign/e2e/npc-memory-roundtrip.spec.ts.
  NPC_MEMORY_RED_LANE: retired

on:
  pull_request:
    paths:
      - "aftersign/**"
      - "e2e-shared/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/aftersign-npc-memory-redgreen.yml"
  push:
    branches: [main]
    paths:
      - "aftersign/**"
      - "e2e-shared/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/aftersign-npc-memory-redgreen.yml"

jobs:
  green-polarity:
    name: npc-memory contract (green — default suite may skip)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run AFTERSIGN NPC memory contract in default mode
        run: npm run test:e2e:aftersign:npc-memory

  red-polarity-drop-memory:
    name: npc-memory contract (red — drop-memory MUST fail)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Preflight — decide whether the red lane can run yet
        id: preflight
        shell: bash
        run: |
          # Retirement is an explicit, reviewable gate (issue #727): the
          # workflow-level NPC_MEMORY_RED_LANE env var above. No spec-text
          # grepping — a comment edit in the spec can never change CI
          # polarity. If the gate is flipped to "live" before the spec
          # actually exposes the FLAGSHIP_BREAK_MODE=drop-memory guard,
          # the red step below fails loudly ("expected drop-memory to
          # fail, but the contract passed"), which is the correct signal
          # to either land the guard or flip the gate back.
          case "$NPC_MEMORY_RED_LANE" in
            live)
              echo "NPC_MEMORY_RED_LANE=live — red polarity will run."
              echo "retired=false" >> "$GITHUB_OUTPUT"
              ;;
            retired)
              echo "NPC_MEMORY_RED_LANE=retired — red polarity retired until Phase 3 lands the drop-memory conditional guard."
              echo "retired=true" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "::error::NPC_MEMORY_RED_LANE must be 'live' or 'retired' (got '${NPC_MEMORY_RED_LANE}'). Fix the env block at the top of this workflow."
              exit 1
              ;;
          esac

      - name: Run AFTERSIGN NPC memory contract in broken mode and require failure
        if: steps.preflight.outputs.retired == 'false'
        env:
          FLAGSHIP_BREAK_MODE: drop-memory
        shell: bash
        run: |
          set +e
          npm run test:e2e:aftersign:npc-memory
          status=$?
          set -e

          if [ "$status" -eq 0 ]; then
            echo "::error::Expected FLAGSHIP_BREAK_MODE=drop-memory to fail, but the NPC-memory contract passed."
            exit 1
          fi

          echo "NPC-memory contract failed under drop-memory as expected."
