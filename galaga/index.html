<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
    />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>Galaga — oodim Game</title>
    <meta name="description" content="The studio's second project — formations, diving attacks, and the boss capture-beam &amp; dual-fighter rescue. Shipped autonomously by AI avatars." />
    <meta name="theme-color" content="#000000" />
    <!-- Open Graph / Twitter share metadata. og.png is a 1200×630 PNG sibling
         to this file; vite copies galaga/* under /galaga/ at build time so the
         absolute URL resolves once art lands. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="oodim Game" />
    <meta property="og:title" content="Galaga · oodim Game" />
    <meta property="og:description" content="Formations, diving attacks, and the boss capture-beam &amp; dual-fighter rescue. Shipped autonomously, slice by slice." />
    <meta property="og:url" content="https://game.oodim.com/galaga/" />
    <meta property="og:image" content="https://game.oodim.com/galaga/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Galaga · oodim Game" />
    <meta name="twitter:description" content="Formations, diving attacks, and the boss capture-beam &amp; dual-fighter rescue. Shipped autonomously, slice by slice." />
    <meta name="twitter:image" content="https://game.oodim.com/galaga/og.png" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%23000'/%3E%3Cpath d='M16 4 L24 26 L16 20 L8 26 Z' fill='%23e8eaff'/%3E%3C/svg%3E"
      type="image/svg+xml"
    />
    <style>
      :root {
        color-scheme: dark;
        /* Native canvas aspect: 320 × 448 (portrait — Galaga is a vertical
           shooter). Source of truth for sizing. */
        --gx-aspect: calc(320 / 448);
      }
      html,
      body {
        margin: 0;
        height: 100%;
        background: #000;
        color: #fff;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        overflow: hidden;
        overscroll-behavior: none;
        -webkit-user-select: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        height: 100dvh;
        padding: env(safe-area-inset-top) env(safe-area-inset-right)
          env(safe-area-inset-bottom) env(safe-area-inset-left);
        box-sizing: border-box;
      }
      /* Canvas scales to fit while preserving the native 320:448 portrait
         aspect. Portrait phones cap on height; wide screens cap on width. */
      #game {
        background: #000;
        image-rendering: pixelated;
        height: min(100dvh, calc(100vw / var(--gx-aspect)));
        width: auto;
        max-width: 100vw;
        max-height: 100dvh;
        touch-action: none;
      }
      /* HUD strip above the canvas — score / lives / stage. Monospace +
         tabular numerals so the layout doesn't reflow as digits roll over.
         The [data-hud] attributes are the contract galaga/e2e reads. */
      #hud {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 16px;
        width: min(90vw, calc((100dvh) * var(--gx-aspect)));
        max-width: 100vw;
        padding: 4px 8px;
        box-sizing: border-box;
        font-variant-numeric: tabular-nums;
        color: #e8eaff;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }
      #hud .hud-cell {
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      #hud .hud-label {
        font-size: 10px;
        color: #8ab;
        opacity: 0.8;
      }
      #hud .hud-value {
        font-size: 16px;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <!-- HUD. main.ts mirrors window.__galaga into the [data-hud] spans on
         every animation frame. The data-hud attributes are the contract
         that galaga/e2e/galaga.spec.ts asserts against. -->
    <div id="hud" aria-label="Game status" role="status" aria-live="polite">
      <div class="hud-cell">
        <span class="hud-label">Score</span>
        <span class="hud-value" data-hud="score">0</span>
      </div>
      <div class="hud-cell">
        <span class="hud-label">Lives</span>
        <span class="hud-value" data-hud="lives">3</span>
      </div>
      <div class="hud-cell">
        <span class="hud-label">Stage</span>
        <span class="hud-value" data-hud="stage">1</span>
      </div>
    </div>
    <canvas id="game" width="320" height="448"></canvas>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
