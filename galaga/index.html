<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
    />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>Galaga — oodim Game</title>
    <meta name="description" content="A fixed shooter where the boss can capture your fighter — kill it back and you fly twin ships. Built by AI avatars; no human writes the code." />
    <meta name="theme-color" content="#000000" />
    <!-- Open Graph / Twitter share metadata. og.png is a 1200×630 PNG sibling
         to this file; vite copies galaga/* under /galaga/ at build time so the
         absolute URL resolves once art lands. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="oodim Game" />
    <meta property="og:title" content="Galaga · oodim Game" />
    <meta property="og:description" content="The boss can capture your fighter. Kill it back and you fly twin ships — double the firepower, double the target. Built end-to-end by AI avatars." />
    <meta property="og:url" content="https://game.oodim.com/galaga/" />
    <meta property="og:image" content="https://game.oodim.com/galaga/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Galaga · oodim Game" />
    <meta name="twitter:description" content="The boss can capture your fighter. Kill it back and you fly twin ships — double the firepower, double the target. Built end-to-end by AI avatars." />
    <meta name="twitter:image" content="https://game.oodim.com/galaga/og.png" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%23000'/%3E%3Cpath d='M16 4 L24 26 L16 20 L8 26 Z' fill='%23e8eaff'/%3E%3C/svg%3E"
      type="image/svg+xml"
    />
    <style>
      :root {
        color-scheme: dark;
        /* Native canvas aspect: 320 × 448 (portrait — Galaga is a vertical
           shooter). Source of truth for sizing. */
        --gx-aspect: calc(320 / 448);
      }
      html,
      body {
        margin: 0;
        height: 100%;
        background: #000;
        color: #fff;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        overflow: hidden;
        overscroll-behavior: none;
        -webkit-user-select: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        height: 100dvh;
        padding: env(safe-area-inset-top) env(safe-area-inset-right)
          env(safe-area-inset-bottom) env(safe-area-inset-left);
        box-sizing: border-box;
      }
      /* Canvas scales to fit while preserving the native 320:448 portrait
         aspect. We reserve ~120px of vertical space for the HUD strip +
         touch control pad (on mobile) — the canvas claims the rest. On
         wider screens the cap on width kicks in first. The --gx-reserve
         var is the running height we deduct from the viewport so the
         canvas never overlaps the touch pad or scrolls the page. */
      :root {
        --gx-reserve: 160px;
      }
      #game {
        background: #000;
        image-rendering: pixelated;
        height: min(
          calc(100dvh - var(--gx-reserve)),
          calc(100vw / var(--gx-aspect))
        );
        width: auto;
        max-width: 100vw;
        max-height: calc(100dvh - var(--gx-reserve));
        touch-action: none;
      }
      /* HUD strip above the canvas — score / lives / stage. Monospace +
         tabular numerals so the layout doesn't reflow as digits roll over.
         The [data-hud] attributes are the contract galaga/e2e reads. */
      #hud {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 16px;
        width: min(90vw, calc((100dvh) * var(--gx-aspect)));
        max-width: 100vw;
        padding: 4px 8px;
        box-sizing: border-box;
        font-variant-numeric: tabular-nums;
        color: #e8eaff;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }
      #hud .hud-cell {
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      #hud .hud-label {
        font-size: 10px;
        color: #8ab;
        opacity: 0.8;
      }
      #hud .hud-value {
        font-size: 16px;
        font-weight: 600;
      }
      /* Stage wrapper — positions the GAME OVER overlay over the canvas
         without forcing a layout change. Sized to the same min(...) box
         the canvas uses so the overlay scales 1:1 with the playfield. */
      #stage-wrap {
        position: relative;
        height: min(
          calc(100dvh - var(--gx-reserve)),
          calc(100vw / var(--gx-aspect))
        );
        max-height: calc(100dvh - var(--gx-reserve));
      }
      #stage-wrap > #game {
        display: block;
      }
      #gameover-overlay {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 8px;
        background: rgba(0, 0, 0, 0.55);
        color: #ff5a5a;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        pointer-events: none;
      }
      #gameover-overlay[hidden] {
        display: none;
      }
      #gameover-overlay .overlay-title {
        font-size: 22px;
        font-weight: 700;
        letter-spacing: 0.08em;
      }
      #gameover-overlay .overlay-sub {
        font-size: 11px;
        color: #cdd;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }
      /* Touch control pad — three buttons beneath the canvas. Wide enough
         to thumb comfortably one-handed in portrait; the LEFT/RIGHT pair
         sits on one side and FIRE opposite. We size to the same width box
         the HUD uses so everything stays aligned with the playfield. The
         buttons are pointer-only (no text selection / no callout) and
         `touch-action: none` so a press doesn't double as a scroll/zoom.
         They're hidden on coarse=false devices (desktop mouse-only)
         because keyboard is the canonical input there; on touch screens
         + on hybrid devices (which report any-pointer:coarse) they show. */
      #touchpad {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        width: min(90vw, calc((100dvh - var(--gx-reserve)) * var(--gx-aspect)));
        max-width: 100vw;
        padding: 0 8px;
        box-sizing: border-box;
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
      }
      #touchpad .pad-cluster {
        display: flex;
        gap: 10px;
      }
      #touchpad button {
        appearance: none;
        -webkit-appearance: none;
        background: rgba(232, 234, 255, 0.08);
        border: 1px solid rgba(232, 234, 255, 0.35);
        color: #e8eaff;
        font-family: inherit;
        font-size: 18px;
        font-weight: 700;
        letter-spacing: 0.06em;
        width: 64px;
        height: 64px;
        border-radius: 12px;
        touch-action: none;
        -webkit-tap-highlight-color: transparent;
      }
      #touchpad button:active,
      #touchpad button.is-pressed {
        background: rgba(232, 234, 255, 0.22);
        border-color: rgba(232, 234, 255, 0.7);
      }
      #touchpad [data-touch="fire"] {
        background: rgba(255, 90, 90, 0.12);
        border-color: rgba(255, 90, 90, 0.55);
        color: #ff9a9a;
      }
      #touchpad [data-touch="fire"]:active,
      #touchpad [data-touch="fire"].is-pressed {
        background: rgba(255, 90, 90, 0.3);
        border-color: rgba(255, 90, 90, 0.9);
      }
      /* Tighten the vertical reserve on desktop where the pad is largely
         decorative — keyboard is the canonical input there. We keep the
         pad visible (it's still usable with a mouse for testing) but
         claw back some canvas height. Phones + hybrids that report any
         coarse pointer keep the full reserve. */
      @media not all and (any-pointer: coarse) {
        :root {
          --gx-reserve: 100px;
        }
      }
    </style>
  </head>
  <body>
    <!-- HUD. main.ts mirrors window.__galaga into the [data-hud] spans on
         every animation frame. The data-hud attributes are the contract
         that galaga/e2e/galaga.spec.ts asserts against. -->
    <div id="hud" aria-label="Game status" role="status" aria-live="polite">
      <div class="hud-cell">
        <span class="hud-label">Score</span>
        <span class="hud-value" data-hud="score">0</span>
      </div>
      <div class="hud-cell">
        <span class="hud-label">Lives</span>
        <span class="hud-value" data-hud="lives">3</span>
      </div>
      <div class="hud-cell">
        <span class="hud-label">Stage</span>
        <span class="hud-value" data-hud="stage">1</span>
      </div>
    </div>
    <!-- Canvas + the GAME OVER overlay share a positioned wrapper so the
         overlay can sit on top of the playfield without disrupting the
         flex layout the HUD relies on. The overlay is hidden by default;
         main.ts toggles its `hidden` attribute when window.__galaga.status
         is 'lost' or 'gameover'. The data-overlay attribute is the contract
         galaga/e2e/galaga.spec.ts asserts on. -->
    <div id="stage-wrap">
      <canvas id="game" width="320" height="448"></canvas>
      <div
        id="gameover-overlay"
        data-overlay="gameover"
        role="status"
        aria-live="polite"
        hidden
      >
        <div class="overlay-title">GAME OVER</div>
        <div class="overlay-sub">
          <span data-overlay-final-score>0</span>
        </div>
      </div>
    </div>
    <!-- Touch control pad. The data-touch attributes are the contract
         src/main.ts queries for; if any of the three is missing we fall
         back to keyboard-only. Buttons stay full-size on phones (64px
         hit target) and dispatch the same intents as keyboard via the
         shared InputSource interface. -->
    <div id="touchpad" aria-label="Touch controls">
      <div class="pad-cluster">
        <button type="button" data-touch="left" aria-label="Move left">‹</button>
        <button type="button" data-touch="right" aria-label="Move right">›</button>
      </div>
      <button type="button" data-touch="fire" aria-label="Fire">FIRE</button>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
