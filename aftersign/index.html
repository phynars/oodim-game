<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>AFTERSIGN — Kiosk Slice</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #05070c;
        color: #edf7ff;
        --confirm-shake-x: 0px;
        --confirm-shake-y: 0px;
        --packet-progress: 0;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        overflow: hidden;
        background: radial-gradient(circle at 50% 20%, #182033 0%, #05070c 65%);
        touch-action: manipulation;
      }

      canvas {
        display: block;
        width: 100vw;
        height: 100vh;
        cursor: pointer;
        touch-action: none;
      }

      .hud {
        position: fixed;
        inset: auto 0 0 0;
        padding: 18px max(18px, env(safe-area-inset-right)) max(18px, env(safe-area-inset-bottom)) max(18px, env(safe-area-inset-left));
        pointer-events: none;
        background: linear-gradient(0deg, rgba(2, 5, 10, 0.86) 0%, rgba(2, 5, 10, 0.5) 58%, rgba(2, 5, 10, 0) 100%);
        transform: translate3d(var(--confirm-shake-x), var(--confirm-shake-y), 0);
        will-change: transform;
      }

      .panel {
        width: min(680px, 100%);
        border: 1px solid rgba(119, 232, 255, 0.34);
        border-radius: 18px;
        padding: 16px;
        background: rgba(5, 10, 19, 0.72);
        box-shadow: 0 0 40px rgba(0, 204, 255, 0.12), inset 0 0 30px rgba(22, 89, 130, 0.14);
        backdrop-filter: blur(12px);
      }

      .speaker {
        margin: 0 0 8px;
        color: #78e9ff;
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      .line {
        margin: 0;
        font-size: clamp(17px, 3.6vw, 24px);
        line-height: 1.32;
        text-wrap: balance;
      }

      .controls {
        display: flex;
        gap: 10px;
        margin-top: 12px;
        flex-wrap: wrap;
        pointer-events: auto;
      }

      button {
        border: 1px solid rgba(173, 242, 255, 0.4);
        border-radius: 999px;
        padding: 11px 14px;
        color: #edf7ff;
        background: rgba(8, 28, 43, 0.85);
        box-shadow: 0 0 20px rgba(0, 204, 255, 0.1);
        font: inherit;
        font-weight: 750;
        cursor: pointer;
      }

      button:active {
        transform: translateY(1px) scale(0.99);
      }

      .packet-button {
        position: relative;
        overflow: hidden;
      }

      .packet-button::after {
        content: "";
        position: absolute;
        inset: 0;
        width: calc(var(--packet-progress) * 100%);
        background: linear-gradient(90deg, rgba(120, 233, 255, 0.2), rgba(255, 184, 107, 0.28));
        pointer-events: none;
        transition: width 40ms linear;
      }

      .packet-button span {
        position: relative;
        z-index: 1;
      }

      .state-readout {
        position: fixed;
        top: max(14px, env(safe-area-inset-top));
        left: max(14px, env(safe-area-inset-left));
        margin: 0;
        padding: 8px 10px;
        border-radius: 999px;
        color: rgba(237, 247, 255, 0.74);
        background: rgba(3, 7, 13, 0.58);
        font-size: 12px;
        letter-spacing: 0.04em;
      }
    </style>
  </head>
  <body>
    <canvas id="scene" aria-label="AFTERSIGN first kiosk scene"></canvas>
    <p class="state-readout" id="stateReadout">story: packet-offered</p>
    <section class="hud" aria-live="polite">
      <div class="panel">
        <p class="speaker" id="speaker">Io</p>
        <p class="line" id="line">Keep it sealed if you want the city to trust you. Touch the blue kiosk when you're ready.</p>
        <div class="controls">
          <button id="packetButton" class="packet-button" type="button" aria-label="Tap the packet to preserve the seal, or hold to open it"><span>Tap packet / hold to open</span></button>
          <button id="deliverButton" type="button">Deliver at the blue kiosk</button>
          <button id="soundButton" type="button">Wake kiosk sound</button>
          <button id="resetButton" type="button">Reset slice save</button>
        </div>
      </div>
    </section>

    <script type="module">
      import * as THREE from "https://esm.sh/three@0.165.0";
      import { EffectComposer } from "https://esm.sh/three@0.165.0/examples/jsm/postprocessing/EffectComposer.js";
      import { RenderPass } from "https://esm.sh/three@0.165.0/examples/jsm/postprocessing/RenderPass.js";
      import { UnrealBloomPass } from "https://esm.sh/three@0.165.0/examples/jsm/postprocessing/UnrealBloomPass.js";
      import { PacketIntentController, PACKET_OUTCOME } from "./packet-intent.js";
      import { createFirstCameraMoveController, assertFirstCameraMoveFeelContract } from "./first-camera-move-feel.js";

      const canvas = document.querySelector("#scene");
      const line = document.querySelector("#line");
      const speaker = document.querySelector("#speaker");
      const stateReadout = document.querySelector("#stateReadout");
      const packetButton = document.querySelector("#packetButton");
      const deliverButton = document.querySelector("#deliverButton");
      const soundButton = document.querySelector("#soundButton");
      const resetButton = document.querySelector("#resetButton");

      const CONFIRM_FEEDBACK = {
        durationMs: 220,
        easing: "easeOutCubic",
        cameraKickDeg: 1.4,
        cameraKickWorldX: 0.055,
        hudShakePx: 10,
        hudLiftPx: 3,
        pulseDecayPerSecond: 3.8,
      };
      const MOVEMENT = {
        fixedStepSeconds: 1 / 60,
        targetFrameMs: 16.67,
        speedMetersPerSecond: 3.6,
        deadzone: 0.08,
        minX: -5.2,
        maxX: 5.2,
        minZ: -6.4,
        maxZ: 2.2,
        inputToVelocityFrames: 1,
      };

      const params = new URLSearchParams(window.location.search);
      const slot = params.get("slot") || "local";
      const storageKey = `aftersign:kiosk-slice:${slot}`;
      const sessionId = `session-${slot}`;

      const clone = (value) => JSON.parse(JSON.stringify(value));
      const clamp = (value, min, max) => Math.max(min, Math.min(max, value));
      const readStored = () => {
        try {
          const raw = window.localStorage.getItem(storageKey);
          return raw ? JSON.parse(raw) : null;
        } catch {
          return null;
        }
      };

      const writeStored = (payload) => {
        window.localStorage.setItem(storageKey, JSON.stringify(payload));
      };

      const emptySave = () => ({ revision: 0, dirty: false });
      const stored = readStored();
      const packetIntent = new PacketIntentController();
      const firstCameraMove = createFirstCameraMoveController();

      const state = {
        slug: "aftersign",
        scene: {
          id: "io-kiosk-rainline",
          beat: stored?.beat ?? "packet-offered",
        },
        player: {
          id: "local-slice-player",
          x: stored?.player?.x ?? -1.8,
          z: stored?.player?.z ?? 1.15,
          facingRadians: stored?.player?.facingRadians ?? 0,
        },
        packet: {
          delivered: Boolean(stored?.packet?.delivered),
          route: stored?.packet?.route || null,
          sealed: stored?.packet?.sealed ?? true,
          deliveredAt: stored?.packet?.deliveredAt || null,
        },
        npcs: {
          io: {
            memory: stored?.memory ? clone(stored.memory) : [],
            lastLine: null,
            lastLineMemoryRefs: [],
          },
        },
        save: stored?.save ? { ...emptySave(), ...stored.save, dirty: false } : emptySave(),
        movement: {
          input: { x: 0, z: 0, source: "none", active: false },
          lastStepMs: 0,
          lastVelocityMetersPerSecond: 0,
          contract: { ...MOVEMENT },
        },
        interaction: {
          lastAction: null,
          lastPointer: null,
          kioskPulse: 0,
          confirmCount: 0,
          confirmStartedAt: null,
          confirmFeedback: {
            ...CONFIRM_FEEDBACK,
            active: false,
            remainingMs: 0,
          },
          packetIntent: packetIntent.snapshot(),
        },
        _runtime: {
          audio: {
            unlocked: false,
            ambientStarted: false,
            lastCue: null,
          },
        },
      };

      let statePublishVersion = 0;
      let publishedStateVersion = -1;

      const markStateDirty = () => {
        statePublishVersion += 1;
      };

      const setTextContentIfChanged = (node, value) => {
        if (node.textContent !== value) {
          node.textContent = value;
        }
      };

      let audioContext;
      let ambientGain;
      let rainNoise;
      let rainFilter;
      let kioskHum;
      let kioskHumGain;

      const lineForBeat = () => {
        if (state.scene.beat === "packet-kept-sealed") {
          return "Good. Some doors only open for people who can carry a secret without looking inside.";
        }

        if (state.scene.beat === "packet-opened") {
          return "You opened it. The route still glows, but now the city knows curiosity got there first.";
        }

        if (state.scene.beat === "packet-delivered") {
          return "Done. Blue route, clean handoff. Come back after the rain; I will know the mark was yours.";
        }

        if (state.scene.beat === "io-returning-recognition") {
          return state.packet.sealed
            ? "I remember you: blue seal, unbroken. The kiosk kept the route; I kept your name beside it."
            : "I remember you: blue route delivered, seal broken. The kiosk kept the route; I kept the risk beside your name.";
        }

        return "Keep it sealed if you want the city to trust you. Touch the blue kiosk when you're ready.";
      };

      const memoryFact = () => ({
        id: `io:${slot}:delivered-blue-packet`,
        predicate: "delivered-blue-packet",
        object: state.packet.sealed ? "sealed" : "opened",
        sessionId,
      });

      const persist = ({ dirty = false } = {}) => {
        const payload = {
          beat: state.scene.beat,
          player: clone(state.player),
          packet: clone(state.packet),
          memory: clone(state.npcs.io.memory),
          save: {
            revision: state.save.revision,
            dirty,
          },
        };
        writeStored(payload);
        if (state.save.dirty !== dirty) {
          state.save.dirty = dirty;
          markStateDirty();
        }
      };

      const syncIoLine = () => {
        const nextLine = lineForBeat();
        const nextMemoryRefs = state.scene.beat === "io-returning-recognition"
          ? state.npcs.io.memory.map((fact) => fact.id)
          : [];
        if (
          state.npcs.io.lastLine !== nextLine
          || state.npcs.io.lastLineMemoryRefs.length !== nextMemoryRefs.length
          || state.npcs.io.lastLineMemoryRefs.some((ref, index) => ref !== nextMemoryRefs[index])
        ) {
          state.npcs.io.lastLine = nextLine;
          state.npcs.io.lastLineMemoryRefs = nextMemoryRefs;
          markStateDirty();
        }
      };

      const syncPacketIntent = (snapshot = packetIntent.snapshot()) => {
        const progressValue = snapshot.progress.toFixed(3);
        if (document.documentElement.style.getPropertyValue("--packet-progress") !== progressValue) {
          document.documentElement.style.setProperty("--packet-progress", progressValue);
        }
        const ariaValue = Math.round(snapshot.progress * 100).toString();
        if (packetButton.getAttribute("aria-valuenow") !== ariaValue) {
          packetButton.setAttribute("aria-valuenow", ariaValue);
        }

        const currentIntent = JSON.stringify(state.interaction.packetIntent);
        const nextIntent = JSON.stringify(snapshot);
        if (currentIntent !== nextIntent) {
          state.interaction.packetIntent = clone(snapshot);
          markStateDirty();
        }
      };

      const setMoveInput = (x, z, source = "script") => {
        const length = Math.hypot(x, z);
        const scale = length > 1 ? 1 / length : 1;
        const nextX = x * scale;
        const nextZ = z * scale;
        state.movement.input = {
          x: Math.abs(nextX) < MOVEMENT.deadzone ? 0 : nextX,
          z: Math.abs(nextZ) < MOVEMENT.deadzone ? 0 : nextZ,
          source,
          active: Math.hypot(nextX, nextZ) >= MOVEMENT.deadzone,
        };
        publishState();
      };

      const stepMovement = (dt = MOVEMENT.fixedStepSeconds) => {
        const input = state.movement.input;
        const vx = input.x * MOVEMENT.speedMetersPerSecond;
        const vz = input.z * MOVEMENT.speedMetersPerSecond;
        state.player.x = clamp(state.player.x + vx * dt, MOVEMENT.minX, MOVEMENT.maxX);
        state.player.z = clamp(state.player.z + vz * dt, MOVEMENT.minZ, MOVEMENT.maxZ);
        if (input.x || input.z) {
          state.player.facingRadians = Math.atan2(input.x, input.z);
        }
        state.movement.lastStepMs = dt * 1000;
        state.movement.lastVelocityMetersPerSecond = Math.hypot(vx, vz);
      };

      const assertFeelContract = () => {
        // Snapshot ALL state this probe mutates so it's non-destructive when
        // called from the console via window.__game. Restore on exit — otherwise
        // repeated calls accumulate ~0.06m of drift per invocation.
        const playerSnapshot = clone(state.player);
        const inputSnapshot = clone(state.movement.input);
        const lastStepMsSnapshot = state.movement.lastStepMs;
        const lastVelocitySnapshot = state.movement.lastVelocityMetersPerSecond;
        const startX = state.player.x;
        const startZ = state.player.z;
        setMoveInput(1, 0, "harness");
        stepMovement(MOVEMENT.fixedStepSeconds);
        const movedThisFrame = state.player.x > startX && state.player.z === startZ;
        const observedStepMs = state.movement.lastStepMs;
        const fixedStepInsideBudget = observedStepMs <= MOVEMENT.targetFrameMs + 0.01;
        // Restore — position, input vector, and derived movement telemetry.
        state.player = playerSnapshot;
        state.movement.input = inputSnapshot;
        state.movement.lastStepMs = lastStepMsSnapshot;
        state.movement.lastVelocityMetersPerSecond = lastVelocitySnapshot;
        publishState();
        return {
          passed: movedThisFrame && fixedStepInsideBudget,
          movedThisFrame,
          fixedStepInsideBudget,
          lastStepMs: observedStepMs,
          targetFrameMs: MOVEMENT.targetFrameMs,
          inputToVelocityFrames: MOVEMENT.inputToVelocityFrames,
        };
      };

      const publishState = () => {
        syncIoLine();
        syncPacketIntent();
        if (publishedStateVersion === statePublishVersion && window.__game) {
          return window.__game;
        }

        window.__game = {
          version: 1,
          slug: state.slug,
          scene: { ...state.scene },
          player: clone(state.player),
          packet: clone(state.packet),
          npcs: clone(state.npcs),
          save: { ...state.save },
          movement: clone(state.movement),
          interaction: clone(state.interaction),
          getSnapshot: () => clone({
            version: 1,
            slug: state.slug,
            scene: state.scene,
            player: state.player,
            packet: state.packet,
            npcs: state.npcs,
            save: state.save,
            movement: state.movement,
            interaction: state.interaction,
          }),
          reset,
          input: {
            choose,
            advance,
            forceSave,
            forceReload: reloadFromSave,
            setMoveInput,
            stepMovement,
            packetPress,
            packetMove,
            packetRelease,
            packetTick,
          },
          assertFeelContract,
          assertFirstCameraMoveFeelContract,
          deliverPacket: () => choose("deliver-packet"),
          enableAudio: () => enableAudio(),
          resetSliceSave: () => resetSliceSave(),
        };
        publishedStateVersion = statePublishVersion;
        return window.__game;
      };

      const renderText = () => {
        syncIoLine();
        setTextContentIfChanged(speaker, "Io");
        setTextContentIfChanged(line, state.npcs.io.lastLine);
        setTextContentIfChanged(stateReadout, `story: ${state.scene.beat} · player ${state.player.x.toFixed(1)},${state.player.z.toFixed(1)}`);
      };

      const setBeat = (beat) => {
        if (state.scene.beat !== beat) {
          state.scene.beat = beat;
          markStateDirty();
        }
        renderText();
        publishState();
      };

      const commitPacketOutcome = (outcome) => {
        if (outcome === PACKET_OUTCOME.SEALED) {
          if (!state.packet.sealed) {
            state.packet.sealed = true;
            markStateDirty();
          }
          setBeat("packet-kept-sealed");
        }

        if (outcome === PACKET_OUTCOME.OPENED) {
          if (state.packet.sealed) {
            state.packet.sealed = false;
            markStateDirty();
          }
          setBeat("packet-opened");
        }
      };

      const packetPress = (input) => {
        const snapshot = packetIntent.press(input);
        syncPacketIntent(snapshot);
        publishState();
        return state.interaction.packetIntent;
      };

      const isCommittedOutcome = (outcome) =>
        outcome !== null && outcome !== undefined && outcome !== PACKET_OUTCOME.UNKNOWN;

      const packetMove = (input) => {
        const snapshot = packetIntent.move(input);
        syncPacketIntent(snapshot);
        if (isCommittedOutcome(snapshot.outcome)) commitPacketOutcome(snapshot.outcome);
        publishState();
        return state.interaction.packetIntent;
      };

      const packetTick = (timeMs) => {
        const snapshot = packetIntent.tick(timeMs);
        syncPacketIntent(snapshot);
        if (isCommittedOutcome(snapshot.outcome)) commitPacketOutcome(snapshot.outcome);
        publishState();
        return state.interaction.packetIntent;
      };

      const packetRelease = (input) => {
        const snapshot = packetIntent.release(input);
        syncPacketIntent(snapshot);
        if (isCommittedOutcome(snapshot.outcome)) commitPacketOutcome(snapshot.outcome);
        publishState();
        return state.interaction.packetIntent;
      };

      const choose = async (choiceId) => {
        if (choiceId === "open-packet") {
          if (state.packet.sealed) {
            state.packet.sealed = false;
            markStateDirty();
          }
          setBeat("packet-opened");
          return;
        }

        if (choiceId === "keep-packet-sealed") {
          if (!state.packet.sealed) {
            state.packet.sealed = true;
            markStateDirty();
          }
          setBeat("packet-kept-sealed");
          return;
        }

        if (choiceId === "deliver-packet") {
          deliverPacket("contract-input");
          return;
        }

        throw new Error(`Unknown AFTERSIGN choice: ${choiceId}`);
      };

      const advance = async () => {
        if (state.packet.delivered && state.npcs.io.memory.length > 0) {
          setBeat("io-returning-recognition");
        }
      };

      const forceSave = async () => {
        persist({ dirty: false });
        publishState();
      };

      const reloadFromSave = async () => {
        const saved = readStored();
        if (!saved) {
          return;
        }

        state.player = { ...state.player, ...saved.player };
        state.packet = { ...state.packet, ...saved.packet };
        state.npcs.io.memory = saved.memory ? clone(saved.memory) : [];
        state.save = { ...emptySave(), ...saved.save, dirty: false };
        state.scene.beat = state.packet.delivered ? "packet-delivered" : "packet-offered";
        markStateDirty();
        renderText();
        publishState();
      };

      const makeRainBuffer = (context) => {
        const buffer = context.createBuffer(1, context.sampleRate * 2, context.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < data.length; i += 1) {
          data[i] = (Math.random() * 2 - 1) * 0.38;
        }
        return buffer;
      };

      const startAmbientAudio = () => {
        if (!audioContext || state._runtime.audio.ambientStarted) {
          return;
        }

        ambientGain = audioContext.createGain();
        ambientGain.gain.value = 0.045;
        ambientGain.connect(audioContext.destination);

        rainNoise = audioContext.createBufferSource();
        rainNoise.buffer = makeRainBuffer(audioContext);
        rainNoise.loop = true;

        rainFilter = audioContext.createBiquadFilter();
        rainFilter.type = "bandpass";
        rainFilter.frequency.value = 1350;
        rainFilter.Q.value = 0.72;
        rainNoise.connect(rainFilter).connect(ambientGain);
        rainNoise.start();

        kioskHum = audioContext.createOscillator();
        kioskHum.type = "sine";
        kioskHum.frequency.value = 91;
        kioskHumGain = audioContext.createGain();
        kioskHumGain.gain.value = 0.018;
        kioskHum.connect(kioskHumGain).connect(ambientGain);
        kioskHum.start();

        state._runtime.audio.ambientStarted = true;
        markStateDirty();
      };

      const enableAudio = async () => {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) {
          state._runtime.audio.lastCue = "unsupported";
          markStateDirty();
          publishState();
          return false;
        }

        audioContext ||= new AudioContext();
        if (audioContext.state === "suspended") {
          await audioContext.resume();
        }

        state._runtime.audio.unlocked = audioContext.state === "running";
        if (state._runtime.audio.unlocked) {
          startAmbientAudio();
          state._runtime.audio.lastCue = "ambient-rainline";
        }
        markStateDirty();
        publishState();
        return state._runtime.audio.unlocked;
      };

      const playKioskConfirm = async () => {
        const unlocked = await enableAudio();
        if (!unlocked || !audioContext) {
          return;
        }

        const now = audioContext.currentTime;
        const gain = audioContext.createGain();
        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.exponentialRampToValueAtTime(0.14, now + 0.018);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.34);
        gain.connect(audioContext.destination);

        [523.25, 659.25, 987.77].forEach((frequency, index) => {
          const tone = audioContext.createOscillator();
          tone.type = index === 2 ? "triangle" : "sine";
          tone.frequency.setValueAtTime(frequency, now + index * 0.035);
          tone.connect(gain);
          tone.start(now + index * 0.035);
          tone.stop(now + 0.36);
        });

        state._runtime.audio.lastCue = "packet-confirmed";
        markStateDirty();
        publishState();
      };

      const triggerKioskFeedback = (source) => {
        state.interaction.lastAction = source;
        state.interaction.kioskPulse = 1;
        state.interaction.confirmCount += 1;
        state.interaction.confirmStartedAt = performance.now();
        state.interaction.confirmFeedback = {
          ...CONFIRM_FEEDBACK,
          active: true,
          remainingMs: CONFIRM_FEEDBACK.durationMs,
        };
        markStateDirty();
        publishState();
      };

      const deliverPacket = (source = "hud-button") => {
        triggerKioskFeedback(source);
        state.packet.delivered = true;
        state.packet.route = "blue rainline";
        state.packet.deliveredAt = new Date().toISOString();
        const fact = memoryFact();
        state.npcs.io.memory = [fact];
        state.save.revision += 1;
        state.save.dirty = true;
        markStateDirty();
        setBeat("packet-delivered");
        persist({ dirty: true });
        playKioskConfirm();
      };

      const resetSliceSave = () => {
        window.localStorage.removeItem(storageKey);
        packetIntent.reset();
        state.scene.beat = "packet-offered";
        state.player = { id: "local-slice-player", x: -1.8, z: 1.15, facingRadians: 0 };
        state.packet = { delivered: false, route: null, sealed: true, deliveredAt: null };
        state.npcs.io.memory = [];
        state.npcs.io.lastLineMemoryRefs = [];
        state.save = emptySave();
        state.movement.input = { x: 0, z: 0, source: "none", active: false };
        state.movement.lastStepMs = 0;
        state.movement.lastVelocityMetersPerSecond = 0;
        state.interaction.lastAction = null;
        state.interaction.lastPointer = null;
        state.interaction.kioskPulse = 0;
        state.interaction.confirmCount = 0;
        state.interaction.confirmStartedAt = null;
        state.interaction.confirmFeedback = {
          ...CONFIRM_FEEDBACK,
          active: false,
          remainingMs: 0,
        };
        markStateDirty();
        syncPacketIntent();
        document.documentElement.style.setProperty("--confirm-shake-x", "0px");
        document.documentElement.style.setProperty("--confirm-shake-y", "0px");
        firstCameraMove.reset();
        firstCameraMove.start(performance.now());
        renderText();
        publishState();
      };

      // Harness-only: restore state from a snapshot produced by getSnapshot(),
      // OR (no arg) fall back to resetSliceSave(). Restores the same fields
      // getSnapshot() exposes — scene, player, packet, npcs, save — via a
      // deep clone so the caller's snapshot is not aliased into live state.
      // Runtime-only concerns (audio, transient interaction feedback) are
      // intentionally left as-is; they aren't part of the story-state contract.
      const reset = (snapshot) => {
        if (!snapshot || typeof snapshot !== "object") {
          resetSliceSave();
          return;
        }
        const restored = clone(snapshot);
        if (restored.scene && typeof restored.scene.beat === "string") {
          state.scene.beat = restored.scene.beat;
        }
        if (restored.player && typeof restored.player === "object") {
          state.player = { ...state.player, ...restored.player };
        }
        if (restored.packet && typeof restored.packet === "object") {
          state.packet = { ...state.packet, ...restored.packet };
        }
        if (restored.npcs && restored.npcs.io) {
          state.npcs.io.memory = Array.isArray(restored.npcs.io.memory)
            ? clone(restored.npcs.io.memory)
            : [];
          state.npcs.io.lastLine = restored.npcs.io.lastLine ?? null;
          state.npcs.io.lastLineMemoryRefs = Array.isArray(restored.npcs.io.lastLineMemoryRefs)
            ? clone(restored.npcs.io.lastLineMemoryRefs)
            : [];
        }
        if (restored.save && typeof restored.save === "object") {
          state.save = { ...emptySave(), ...restored.save };
        }
        markStateDirty();
        renderText();
        publishState();
      };

      const scene = new THREE.Scene();
      scene.fog = new THREE.FogExp2(0x07111d, 0.045);

      const camera = new THREE.PerspectiveCamera(62, 1, 0.1, 100);
      camera.position.set(0, 2.58, 9.2);
      camera.rotation.z = THREE.MathUtils.degToRad(-0.85);

      const raycaster = new THREE.Raycaster();
      const pointer = new THREE.Vector2();

      const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, powerPreference: "high-performance" });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 1.08;

      const composer = new EffectComposer(renderer);
      composer.addPass(new RenderPass(scene, camera));
      const bloomPass = new UnrealBloomPass(new THREE.Vector2(1, 1), 0.52, 0.55, 0.18);
      composer.addPass(bloomPass);

      const hemi = new THREE.HemisphereLight(0x8ccfff, 0x09111d, 1.4);
      scene.add(hemi);

      const key = new THREE.DirectionalLight(0xc4f4ff, 2.2);
      key.position.set(-4, 6, 5);
      key.castShadow = true;
      key.shadow.mapSize.set(1024, 1024);
      scene.add(key);

      const signLight = new THREE.PointLight(0x33ddff, 8, 9, 1.8);
      signLight.position.set(0, 2.15, -1.1);
      scene.add(signLight);

      const wetGround = new THREE.Mesh(
        new THREE.PlaneGeometry(16, 18),
        new THREE.MeshStandardMaterial({ color: 0x07111a, roughness: 0.18, metalness: 0.2 })
      );
      wetGround.rotation.x = -Math.PI / 2;
      wetGround.receiveShadow = true;
      scene.add(wetGround);

      const playerMesh = new THREE.Group();
      const playerBody = new THREE.Mesh(
        new THREE.CapsuleGeometry(0.22, 0.74, 6, 12),
        new THREE.MeshStandardMaterial({ color: 0xf4dfb1, roughness: 0.48, metalness: 0.08 })
      );
      playerBody.position.y = 0.76;
      playerBody.castShadow = true;
      playerMesh.add(playerBody);
      const playerFacing = new THREE.Mesh(
        new THREE.BoxGeometry(0.12, 0.08, 0.28),
        new THREE.MeshStandardMaterial({ color: 0x79e8ff, emissive: 0x17677b, emissiveIntensity: 0.7 })
      );
      playerFacing.position.set(0, 1.02, 0.18);
      playerMesh.add(playerFacing);
      scene.add(playerMesh);

      const kiosk = new THREE.Group();
      const kioskBody = new THREE.Mesh(
        new THREE.BoxGeometry(1.35, 2.45, 0.5),
        new THREE.MeshStandardMaterial({ color: 0x102134, roughness: 0.42, metalness: 0.25 })
      );
      kioskBody.position.y = 1.23;
      kioskBody.castShadow = true;
      kiosk.add(kioskBody);

      const screen = new THREE.Mesh(
        new THREE.BoxGeometry(1.08, 0.66, 0.04),
        new THREE.MeshStandardMaterial({ color: 0x67eaff, emissive: 0x25cfff, emissiveIntensity: 1.8, roughness: 0.08 })
      );
      screen.position.set(0, 1.65, 0.28);
      kiosk.add(screen);

      const slotMesh = new THREE.Mesh(
        new THREE.BoxGeometry(0.76, 0.08, 0.05),
        new THREE.MeshStandardMaterial({ color: 0x07111a, emissive: 0x0b6a82, emissiveIntensity: 0.7 })
      );
      slotMesh.position.set(0, 0.92, 0.3);
      kiosk.add(slotMesh);
      scene.add(kiosk);
      const kioskHitTargets = [kioskBody, screen, slotMesh];

      const io = new THREE.Group();
      const coat = new THREE.Mesh(
        new THREE.CapsuleGeometry(0.34, 1.08, 6, 12),
        new THREE.MeshStandardMaterial({ color: 0x1d2738, roughness: 0.64, metalness: 0.05 })
      );
      coat.position.y = 1.1;
      coat.castShadow = true;
      io.add(coat);

      const face = new THREE.Mesh(
        new THREE.SphereGeometry(0.22, 24, 16),
        new THREE.MeshStandardMaterial({ color: 0xd7b99c, roughness: 0.5 })
      );
      face.position.y = 1.92;
      face.castShadow = true;
      io.add(face);

      const visor = new THREE.Mesh(
        new THREE.BoxGeometry(0.5, 0.08, 0.08),
        new THREE.MeshStandardMaterial({ color: 0x8af2ff, emissive: 0x5bdfff, emissiveIntensity: 1.1 })
      );
      visor.position.set(0, 1.95, 0.17);
      io.add(visor);
      io.position.set(-1.55, 0, 0.7);
      io.rotation.y = 0.35;
      scene.add(io);

      const makeTower = (x, z, height, color) => {
        const tower = new THREE.Mesh(
          new THREE.BoxGeometry(0.72, height, 0.72),
          new THREE.MeshStandardMaterial({ color, roughness: 0.72, metalness: 0.08 })
        );
        tower.position.set(x, height / 2, z);
        tower.castShadow = true;
        tower.receiveShadow = true;
        scene.add(tower);

        const windowStrip = new THREE.Mesh(
          new THREE.BoxGeometry(0.5, 0.06, 0.04),
          new THREE.MeshStandardMaterial({ color: 0xffca75, emissive: 0xff9d2e, emissiveIntensity: 0.45 })
        );
        windowStrip.position.set(x, height * 0.72, z + 0.39);
        scene.add(windowStrip);
      };

      makeTower(-4.6, -3.8, 4.4, 0x0c1724);
      makeTower(3.8, -3.4, 5.8, 0x101b2a);
      makeTower(-3.1, -6.1, 7.1, 0x0a1420);
      makeTower(4.9, -6.4, 6.3, 0x0d1722);

      const rain = new THREE.Group();
      const rainMaterial = new THREE.LineBasicMaterial({ color: 0x8edfff, transparent: true, opacity: 0.38 });
      for (let i = 0; i < 90; i += 1) {
        const x = THREE.MathUtils.randFloatSpread(13);
        const y = THREE.MathUtils.randFloat(1.5, 8.5);
        const z = THREE.MathUtils.randFloat(-8, 4);
        const points = [new THREE.Vector3(x, y, z), new THREE.Vector3(x - 0.08, y - 0.55, z)];
        const drop = new THREE.Line(new THREE.BufferGeometry().setFromPoints(points), rainMaterial);
        rain.add(drop);
      }
      scene.add(rain);

      const resize = () => {
        const width = window.innerWidth;
        const height = window.innerHeight;
        camera.aspect = width / height;
        camera.updateProjectionMatrix();
        renderer.setSize(width, height, false);
        composer.setSize(width, height);
        bloomPass.setSize(width, height);
      };

      const handleScenePointer = (event) => {
        const rect = canvas.getBoundingClientRect();
        pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
        pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
        state.interaction.lastPointer = {
          x: Math.round(event.clientX - rect.left),
          y: Math.round(event.clientY - rect.top),
        };
        markStateDirty();
        raycaster.setFromCamera(pointer, camera);
        if (raycaster.intersectObjects(kioskHitTargets, false).length > 0) {
          event.preventDefault();
          deliverPacket("scene-kiosk-pointer");
        } else {
          publishState();
        }
      };

      const pressedKeys = new Set();
      const syncKeyboardInput = () => {
        const x = Number(pressedKeys.has("KeyD") || pressedKeys.has("ArrowRight")) - Number(pressedKeys.has("KeyA") || pressedKeys.has("ArrowLeft"));
        const z = Number(pressedKeys.has("KeyS") || pressedKeys.has("ArrowDown")) - Number(pressedKeys.has("KeyW") || pressedKeys.has("ArrowUp"));
        setMoveInput(x, z, x || z ? "keyboard" : "none");
      };

      const packetPointFromEvent = (event) => ({
        timeMs: performance.now(),
        x: event.clientX,
        y: event.clientY,
      });

      packetButton.addEventListener("pointerdown", (event) => {
        event.preventDefault();
        packetButton.setPointerCapture(event.pointerId);
        packetPress(packetPointFromEvent(event));
      });
      packetButton.addEventListener("pointermove", (event) => {
        if (state.interaction.packetIntent.active) {
          event.preventDefault();
          packetMove(packetPointFromEvent(event));
        }
      });
      packetButton.addEventListener("pointerup", (event) => {
        event.preventDefault();
        packetRelease(packetPointFromEvent(event));
      });
      packetButton.addEventListener("pointercancel", (event) => {
        event.preventDefault();
        packetMove({ ...packetPointFromEvent(event), x: state.interaction.packetIntent.config.DRIFT_CANCEL_PX + event.clientX + 1 });
      });
      deliverButton.addEventListener("click", () => choose("deliver-packet"));
      canvas.addEventListener("pointerdown", handleScenePointer, { passive: false });
      window.addEventListener("keydown", (event) => {
        pressedKeys.add(event.code);
        syncKeyboardInput();
      });
      window.addEventListener("keyup", (event) => {
        pressedKeys.delete(event.code);
        syncKeyboardInput();
      });
      soundButton.addEventListener("click", enableAudio);
      resetButton.addEventListener("click", resetSliceSave);
      window.addEventListener("resize", resize, { passive: true });

      renderText();
      publishState();
      resize();

      const firstCameraMoveStartedAt = performance.now();
      firstCameraMove.start(firstCameraMoveStartedAt);

      let last = firstCameraMoveStartedAt;
      let movementAccumulator = 0;
      const tick = (now) => {
        const dt = Math.min((now - last) / 1000, 0.05);
        last = now;
        movementAccumulator += dt;
        while (movementAccumulator >= MOVEMENT.fixedStepSeconds) {
          stepMovement(MOVEMENT.fixedStepSeconds);
          movementAccumulator -= MOVEMENT.fixedStepSeconds;
        }
        const t = now / 1000;
        const kioskPulse = state.interaction.kioskPulse;
        const confirmStartedAt = state.interaction.confirmStartedAt;
        const packetIntentSnapshot = state.interaction.packetIntent.active ? packetTick(now) : state.interaction.packetIntent;
        const packetProgress = packetIntentSnapshot.progress;
        const confirmProgress = confirmStartedAt === null
          ? 1
          : Math.min(Math.max((now - confirmStartedAt) / CONFIRM_FEEDBACK.durationMs, 0), 1);
        const confirmIntensity = 1 - (1 - confirmProgress) ** 3;
        const confirmFalloff = 1 - confirmIntensity;
        const confirmWobble = confirmFalloff * Math.sin(confirmProgress * Math.PI * 6);

        playerMesh.position.set(state.player.x, 0, state.player.z);
        playerMesh.rotation.y = state.player.facingRadians;
        kiosk.rotation.y = Math.sin(t * 0.6) * 0.025 + confirmWobble * 0.045;
        kiosk.scale.setScalar(1 + kioskPulse * 0.018 + confirmFalloff * 0.012);
        io.position.y = Math.sin(t * 1.7) * 0.025;
        const firstCameraSample = firstCameraMove.sample(now);
        const cameraTrackX = state.player.x * firstCameraMove.profile.parallax.playerTrackX;
        const cameraTrackZ = state.player.z * firstCameraMove.profile.parallax.playerTrackZ;
        // settleOffsetPx: a small vertical micro-bounce at the tail of the
        // ease-in — the "settle" of the camera landing. Convert px→world-y
        // via the same 0.001 factor the confirm kick uses (visually calibrated
        // so 6px feels like a fingertip nudge, not a jolt). Feeds camera.y so
        // the contract's settleBouncePx is actually observable in-scene.
        const settleWorldY = firstCameraSample.settleOffsetPx * 0.001;
        camera.position.x = firstCameraSample.x + cameraTrackX + confirmWobble * CONFIRM_FEEDBACK.cameraKickWorldX;
        camera.position.y = firstCameraSample.y + settleWorldY;
        camera.position.z = firstCameraSample.z + cameraTrackZ;
        camera.rotation.z = firstCameraSample.rollRadians + THREE.MathUtils.degToRad(confirmWobble * CONFIRM_FEEDBACK.cameraKickDeg);
        document.documentElement.style.setProperty("--confirm-shake-x", `${Math.round(confirmWobble * CONFIRM_FEEDBACK.hudShakePx)}px`);
        document.documentElement.style.setProperty("--confirm-shake-y", `${Math.round(-confirmFalloff * CONFIRM_FEEDBACK.hudLiftPx)}px`);
        screen.material.emissiveIntensity = 1.55 + Math.sin(t * 3.2) * 0.25 + kioskPulse * 1.2 + confirmFalloff * 0.7 + packetProgress * 0.65;
        slotMesh.material.emissiveIntensity = 0.7 + kioskPulse * 1.5 + confirmFalloff * 0.45 + packetProgress * 0.4;
        signLight.intensity = 7.4 + Math.sin(t * 2.4) * 0.8 + kioskPulse * 2.4 + confirmFalloff * 1.3 + packetProgress * 1.1;
        state.interaction.kioskPulse = Math.max(0, kioskPulse - dt * CONFIRM_FEEDBACK.pulseDecayPerSecond);
        if (confirmStartedAt !== null) {
          state.interaction.confirmFeedback.active = confirmProgress < 1;
          state.interaction.confirmFeedback.remainingMs = Math.max(0, Math.round(CONFIRM_FEEDBACK.durationMs - (now - confirmStartedAt)));
          if (confirmProgress >= 1) {
            state.interaction.confirmStartedAt = null;
          }
        }
        if (rainFilter) {
          rainFilter.frequency.value = 1280 + Math.sin(t * 0.7) * 180;
        }
        if (kioskHum) {
          kioskHum.frequency.value = 89 + Math.sin(t * 0.45) * 3;
        }
        rain.children.forEach((drop, index) => {
          drop.position.y -= dt * (4.4 + (index % 5) * 0.38);
          if (drop.position.y < -2) {
            drop.position.y = 7.5;
          }
        });

        renderText();
        publishState();
        composer.render();
        requestAnimationFrame(tick);
      };

      requestAnimationFrame(tick);
    </script>
  </body>
</html>
