<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>AFTERSIGN — Io Memory Slice</title>
  <meta name="description" content="A Night Post kiosk, a blue seal, and one dispatcher who remembers what you did with it." />
  <style>
    :root {
      color-scheme: dark;
      --ink: #071014;
      --water: #0a1d26;
      --mist: #7ca6aa;
      --lantern: #f2b15e;
      --paper: #f6dfad;
      --wax: #9d3340;
      --moth: #eef4e8;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at 50% 0%, #15333c 0%, var(--water) 42%, var(--ink) 100%);
      color: var(--moth);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.06), transparent 34%),
        repeating-linear-gradient(92deg, rgba(255,255,255,0.025) 0 1px, transparent 1px 7px);
      mix-blend-mode: screen;
      opacity: 0.35;
    }

    main {
      position: relative;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
    }

    .scene {
      position: absolute;
      inset: 0;
      perspective: 900px;
      transform-style: preserve-3d;
    }

    .rain {
      position: absolute;
      inset: -20% 0;
      background-image: linear-gradient(180deg, rgba(238,244,232,0.18) 0 18%, transparent 18% 100%);
      background-size: 2px 54px;
      transform: rotate(8deg) scale(1.2);
      opacity: 0.2;
      animation: rain 0.75s linear infinite;
    }

    @keyframes rain {
      to { translate: 0 54px; }
    }

    .water {
      position: absolute;
      left: -10vw;
      right: -10vw;
      bottom: -8vh;
      height: 28vh;
      background:
        radial-gradient(ellipse at 25% 15%, rgba(242,177,94,0.16), transparent 28%),
        radial-gradient(ellipse at 72% 30%, rgba(238,244,232,0.12), transparent 25%),
        linear-gradient(180deg, rgba(9,36,46,0.2), #03080b 70%);
      border-top: 1px solid rgba(124,166,170,0.26);
      filter: blur(0.2px);
    }

    .stair {
      position: absolute;
      left: 50%;
      bottom: 18vh;
      width: min(82vw, 720px);
      height: 54vh;
      transform: translateX(-50%) rotateX(58deg) rotateZ(-10deg);
      transform-origin: 50% 100%;
      background:
        repeating-linear-gradient(90deg, rgba(255,255,255,0.07) 0 1px, transparent 1px 72px),
        repeating-linear-gradient(0deg, rgba(246,223,173,0.18) 0 2px, transparent 2px 44px),
        linear-gradient(135deg, #21343b, #0b1820 62%, #05090d);
      border: 1px solid rgba(246,223,173,0.16);
      box-shadow: 0 40px 90px rgba(0,0,0,0.55), inset 0 0 60px rgba(124,166,170,0.06);
    }

    .kiosk {
      position: absolute;
      left: 50%;
      bottom: 34vh;
      width: min(82vw, 420px);
      min-height: 245px;
      padding: 88px 22px 22px;
      transform: translateX(-50%);
      border: 1px solid rgba(246,223,173,0.28);
      border-radius: 18px 18px 8px 8px;
      background:
        linear-gradient(180deg, rgba(17,41,46,0.94), rgba(8,17,22,0.98)),
        repeating-linear-gradient(90deg, rgba(246,223,173,0.05) 0 1px, transparent 1px 18px);
      box-shadow:
        0 0 48px rgba(242,177,94,0.12),
        0 28px 70px rgba(0,0,0,0.56),
        inset 0 1px 0 rgba(255,255,255,0.08);
    }

    .kiosk::before {
      content: "NIGHT POST";
      position: absolute;
      left: 18px;
      right: 18px;
      top: 18px;
      height: 48px;
      display: grid;
      place-items: center;
      letter-spacing: 0.28em;
      font-size: 0.78rem;
      color: var(--ink);
      text-shadow: 0 1px 0 rgba(255,255,255,0.18);
      background: linear-gradient(90deg, #d89449, var(--paper), #d89449);
      border-radius: 999px;
      box-shadow: 0 0 32px rgba(242,177,94,0.48);
    }

    .lantern {
      position: absolute;
      width: 54px;
      height: 78px;
      border-radius: 24px 24px 18px 18px;
      background: radial-gradient(circle at 50% 28%, #fff5c9, var(--lantern) 46%, rgba(157,51,64,0.72));
      box-shadow: 0 0 38px rgba(242,177,94,0.55);
      animation: breathe 3.4s ease-in-out infinite;
    }

    .lantern.left { left: calc(50% - min(45vw, 290px)); top: 18vh; }
    .lantern.right { right: calc(50% - min(45vw, 300px)); top: 24vh; animation-delay: -1.2s; }

    @keyframes breathe {
      50% { filter: brightness(1.25); transform: translateY(3px); }
    }

    .packet {
      width: 116px;
      height: 76px;
      margin: 0 auto 18px;
      position: relative;
      border-radius: 10px;
      background:
        linear-gradient(145deg, rgba(255,255,255,0.22), transparent 34%),
        linear-gradient(180deg, #375b7a, #162b42);
      border: 1px solid rgba(238,244,232,0.22);
      box-shadow: 0 16px 30px rgba(0,0,0,0.32);
    }

    .packet::before,
    .packet::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 10px;
      background: linear-gradient(30deg, transparent 48%, rgba(238,244,232,0.22) 49% 51%, transparent 52%);
    }

    .packet::after {
      background: linear-gradient(150deg, transparent 48%, rgba(238,244,232,0.16) 49% 51%, transparent 52%);
    }

    .seal {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      translate: -50% -50%;
      background: radial-gradient(circle at 35% 30%, #e08a90, var(--wax) 58%, #4e1520);
      box-shadow: 0 0 0 4px rgba(157,51,64,0.18), 0 0 20px rgba(157,51,64,0.38);
      z-index: 2;
    }

    .packet.opened .seal {
      border-radius: 42% 8% 48% 16%;
      transform: rotate(-22deg) translate(-10px, 6px);
      opacity: 0.72;
    }

    .packet.opened::before {
      background: linear-gradient(30deg, transparent 48%, rgba(255,255,255,0.34) 49% 51%, transparent 52%);
      transform: translateY(-11px) rotateX(22deg);
    }

    .dialogue {
      margin: 0 0 18px;
      font-size: clamp(1.08rem, 3.8vw, 1.42rem);
      line-height: 1.35;
      color: var(--moth);
      text-wrap: balance;
    }

    .speaker {
      margin: 0 0 8px;
      color: var(--lantern);
      letter-spacing: 0.12em;
      font-size: 0.72rem;
      text-transform: uppercase;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    button {
      appearance: none;
      min-height: 48px;
      border: 1px solid rgba(246,223,173,0.28);
      border-radius: 999px;
      padding: 12px 18px;
      background: rgba(246,223,173,0.08);
      color: var(--moth);
      font: inherit;
      font-weight: 700;
      letter-spacing: 0.01em;
      touch-action: manipulation;
    }

    button.primary {
      background: linear-gradient(180deg, rgba(242,177,94,0.34), rgba(157,51,64,0.26));
      box-shadow: 0 0 24px rgba(242,177,94,0.16);
    }

    .hud {
      position: fixed;
      left: max(16px, env(safe-area-inset-left));
      right: max(16px, env(safe-area-inset-right));
      bottom: max(14px, env(safe-area-inset-bottom));
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 12px;
      color: rgba(238,244,232,0.7);
      font-size: 0.78rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .bell {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--moth);
      box-shadow: 0 0 26px var(--moth);
      opacity: 0;
      transition: opacity 240ms ease;
    }

    .bell.on { opacity: 1; }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      white-space: nowrap;
      border: 0;
    }

    @media (min-width: 680px) {
      .actions { grid-template-columns: 1fr 1fr; }
      .kiosk { bottom: 30vh; }
    }
  </style>
</head>
<body>
  <main aria-labelledby="title">
    <h1 id="title" class="sr-only">AFTERSIGN: Io Memory Slice</h1>
    <div class="scene" aria-hidden="true">
      <div class="rain"></div>
      <div class="lantern left"></div>
      <div class="lantern right"></div>
      <div class="stair"></div>
      <div class="water"></div>
    </div>

    <section class="kiosk" aria-live="polite">
      <div id="packet" class="packet"><span class="seal"></span></div>
      <p class="speaker">Io Vale · Night Post</p>
      <p id="dialogue" class="dialogue"></p>
      <div id="actions" class="actions"></div>
    </section>

    <div class="hud">
      <span id="stateLabel">Packet unassigned</span>
      <span class="bell" id="bell" aria-hidden="true"></span>
    </div>
  </main>

  <script>
    const STORAGE_KEY = "aftersign.io-memory.v1";

    const lines = {
      first: "Blue packet. Brass sign box. Bring both facts back in the same order.",
      sealed: "You came back. So did the blue seal, unbroken. That gives me two facts to trust.",
      opened: "You came back. The seal did not. I can use one of those facts.",
      deliveredSealed: "Box took it. Seal stayed shut. Good. Some doors open for quiet hands.",
      deliveredOpened: "Box took it. Seal was already a witness. We will count that cost later."
    };

    const state = loadState();
    const packet = document.querySelector("#packet");
    const dialogue = document.querySelector("#dialogue");
    const actions = document.querySelector("#actions");
    const label = document.querySelector("#stateLabel");
    const bell = document.querySelector("#bell");

    function loadState() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {
          session: 0,
          packetOutcome: "unassigned",
          authoredMemory: "",
          ioTrustPosture: "untested"
        };
      } catch {
        return {
          session: 0,
          packetOutcome: "unassigned",
          authoredMemory: "",
          ioTrustPosture: "untested"
        };
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      window.__game = {
        slug: "aftersign",
        scene: "io-night-post-kiosk",
        storyState: { ...state },
        reset: () => {
          localStorage.removeItem(STORAGE_KEY);
          location.reload();
        }
      };
    }

    function setDialogue(text) {
      dialogue.textContent = text;
    }

    function setPacket(opened) {
      packet.classList.toggle("opened", opened);
    }

    function ringBell() {
      bell.classList.add("on");
      window.setTimeout(() => bell.classList.remove("on"), 520);
    }

    function setActions(buttons) {
      actions.innerHTML = "";
      buttons.forEach(({ text, primary, onClick }) => {
        const button = document.createElement("button");
        button.type = "button";
        button.textContent = text;
        if (primary) button.classList.add("primary");
        button.addEventListener("click", onClick);
        actions.appendChild(button);
      });
    }

    function updateLabel() {
      const copy = {
        unassigned: "Packet unassigned",
        sealed: "Blue seal unbroken",
        opened: "Blue seal broken"
      };
      label.textContent = copy[state.packetOutcome] || "Packet recorded";
    }

    function deliver(outcome) {
      state.packetOutcome = outcome;
      state.session += 1;
      state.ioTrustPosture = outcome === "sealed" ? "trusted" : "useful";
      state.authoredMemory = outcome === "sealed" ? lines.sealed : lines.opened;
      saveState();
      setPacket(outcome === "opened");
      updateLabel();
      ringBell();
      setDialogue(outcome === "sealed" ? lines.deliveredSealed : lines.deliveredOpened);
      setActions([
        { text: "Begin next session", primary: true, onClick: () => location.reload() },
        { text: "Reset memory", onClick: resetMemory }
      ]);
    }

    function resetMemory() {
      localStorage.removeItem(STORAGE_KEY);
      location.reload();
    }

    function boot() {
      saveState();
      updateLabel();
      if (state.authoredMemory) {
        setPacket(state.packetOutcome === "opened");
        setDialogue(state.authoredMemory);
        ringBell();
        setActions([
          { text: "Reset memory", primary: true, onClick: resetMemory }
        ]);
        return;
      }

      setPacket(false);
      setDialogue(lines.first);
      setActions([
        { text: "Deliver it sealed", primary: true, onClick: () => deliver("sealed") },
        { text: "Break the seal first", onClick: () => deliver("opened") }
      ]);
    }

    boot();
  </script>
</body>
</html>
