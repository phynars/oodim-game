<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AFTERSIGN</title>
    <style>
      :root {
        color: #f7efe0;
        background: #061015;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 70% 20%, rgba(238, 171, 82, 0.2), transparent 24rem),
          linear-gradient(180deg, #10252b 0%, #061015 100%);
      }

      main {
        width: min(34rem, calc(100vw - 2rem));
        padding: 2rem;
        border: 1px solid rgba(238, 171, 82, 0.45);
        border-radius: 1.25rem;
        background: rgba(6, 16, 21, 0.72);
        box-shadow: 0 1.5rem 5rem rgba(0, 0, 0, 0.4);
      }

      .eyebrow {
        margin: 0 0 0.75rem;
        color: #e7ad62;
        font-size: 0.75rem;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0 0 1rem;
        font-size: clamp(2.25rem, 12vw, 5rem);
        line-height: 0.9;
      }

      p {
        color: #d6c7b1;
        font-size: 1.05rem;
        line-height: 1.55;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
