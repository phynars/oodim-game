<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>AFTERSIGN — Vertical Slice</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #05070d;
        color: #dfe8ff;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        touch-action: none;
      }

      #hud {
        position: fixed;
        left: max(16px, env(safe-area-inset-left));
        right: max(16px, env(safe-area-inset-right));
        bottom: max(16px, env(safe-area-inset-bottom));
        display: grid;
        gap: 8px;
        pointer-events: none;
        text-shadow: 0 2px 12px rgba(0, 0, 0, 0.75);
      }

      #beat {
        max-width: 680px;
        padding: 14px 16px;
        border: 1px solid rgba(143, 183, 255, 0.36);
        border-radius: 16px;
        background: rgba(6, 11, 23, 0.72);
        box-shadow: 0 18px 60px rgba(33, 77, 148, 0.2);
        backdrop-filter: blur(14px);
        font-size: clamp(15px, 2.6vw, 18px);
        line-height: 1.35;
      }

      #debug {
        color: rgba(223, 232, 255, 0.72);
        font-size: 12px;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <div id="hud" aria-live="polite">
      <div id="beat">Find Io at the flooded kiosk.</div>
      <div id="debug">Booting AFTERSIGN…</div>
    </div>

    <script type="module">
      import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";

      const SAVE_KEY = "aftersign.verticalSlice.v1";
      const FIXED_DT = 1 / 60;
      const PLAYER_SPEED = 3.8;
      const CAMERA_LERP = 1 - Math.pow(0.001, FIXED_DT);
      const INPUT_DEADZONE = 0.08;
      const RECOGNITION_RADIUS = 1.55;

      const saved = readSave();
      const state = {
        frame: 0,
        time: 0,
        lastDtMs: 0,
        player: {
          x: saved.player?.x ?? -2.2,
          z: saved.player?.z ?? 1.35,
          facing: 0,
        },
        input: { x: 0, z: 0, active: false, source: "none" },
        io: {
          x: 1.15,
          z: -0.9,
          rememberedVisits: saved.io?.rememberedVisits ?? 0,
          hasRecognizedPlayer: false,
          line: "Io waits by the dead kiosk light.",
        },
        feel: {
          targetFrameMs: 16.67,
          maxStepMs: 33.34,
          cameraSettleMs: 180,
          inputToVelocityFrames: 1,
        },
        lastSavedAt: saved.lastSavedAt ?? null,
      };

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x05070d);
      scene.fog = new THREE.FogExp2(0x07111f, 0.058);

      const camera = new THREE.PerspectiveCamera(58, window.innerWidth / window.innerHeight, 0.1, 100);
      camera.position.set(state.player.x - 3.5, 3.1, state.player.z + 4.4);
      camera.lookAt(state.player.x, 0.75, state.player.z);

      const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 1.75));
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      document.body.prepend(renderer.domElement);

      const hemi = new THREE.HemisphereLight(0x9fbaff, 0x101018, 1.15);
      scene.add(hemi);

      const kioskGlow = new THREE.PointLight(0x66ccff, 7.5, 7, 1.8);
      kioskGlow.position.set(1.15, 1.2, -0.9);
      kioskGlow.castShadow = true;
      scene.add(kioskGlow);

      const ground = new THREE.Mesh(
        new THREE.PlaneGeometry(16, 16),
        new THREE.MeshStandardMaterial({ color: 0x101827, roughness: 0.82, metalness: 0.1 })
      );
      ground.rotation.x = -Math.PI / 2;
      ground.receiveShadow = true;
      scene.add(ground);

      const grid = new THREE.GridHelper(16, 16, 0x28436d, 0x16263d);
      grid.position.y = 0.006;
      scene.add(grid);

      const player = new THREE.Mesh(
        new THREE.CapsuleGeometry(0.24, 0.68, 5, 12),
        new THREE.MeshStandardMaterial({ color: 0xfff1b8, roughness: 0.46, metalness: 0.08 })
      );
      player.position.set(state.player.x, 0.58, state.player.z);
      player.castShadow = true;
      scene.add(player);

      const io = new THREE.Mesh(
        new THREE.CapsuleGeometry(0.22, 0.72, 5, 12),
        new THREE.MeshStandardMaterial({ color: 0x86e7ff, emissive: 0x123d55, roughness: 0.38, metalness: 0.22 })
      );
      io.position.set(state.io.x, 0.6, state.io.z);
      io.castShadow = true;
      scene.add(io);

      const kiosk = new THREE.Mesh(
        new THREE.BoxGeometry(1.25, 1.55, 0.26),
        new THREE.MeshStandardMaterial({ color: 0x16243a, emissive: 0x06243a, roughness: 0.5, metalness: 0.35 })
      );
      kiosk.position.set(1.15, 0.78, -1.22);
      kiosk.castShadow = true;
      kiosk.receiveShadow = true;
      scene.add(kiosk);

      const keys = new Set();
      window.addEventListener("keydown", (event) => {
        keys.add(event.code);
        updateKeyboardInput();
      });
      window.addEventListener("keyup", (event) => {
        keys.delete(event.code);
        updateKeyboardInput();
      });

      let touchOrigin = null;
      window.addEventListener("pointerdown", (event) => {
        touchOrigin = { x: event.clientX, y: event.clientY };
        renderer.domElement.setPointerCapture?.(event.pointerId);
      });
      window.addEventListener("pointermove", (event) => {
        if (!touchOrigin) return;
        const dx = (event.clientX - touchOrigin.x) / 80;
        const dz = (event.clientY - touchOrigin.y) / 80;
        setInput(dx, dz, "touch");
      });
      window.addEventListener("pointerup", () => {
        touchOrigin = null;
        setInput(0, 0, "none");
      });
      window.addEventListener("pointercancel", () => {
        touchOrigin = null;
        setInput(0, 0, "none");
      });

      let last = performance.now();
      let accumulator = 0;
      requestAnimationFrame(loop);

      function loop(now) {
        const rawDt = Math.min((now - last) / 1000, 0.1);
        last = now;
        accumulator += rawDt;

        while (accumulator >= FIXED_DT) {
          step(FIXED_DT);
          accumulator -= FIXED_DT;
        }

        draw();
        requestAnimationFrame(loop);
      }

      function step(dt) {
        state.frame += 1;
        state.time += dt;
        state.lastDtMs = dt * 1000;

        const ix = Math.abs(state.input.x) < INPUT_DEADZONE ? 0 : state.input.x;
        const iz = Math.abs(state.input.z) < INPUT_DEADZONE ? 0 : state.input.z;
        const length = Math.hypot(ix, iz) || 1;
        const vx = (ix / length) * PLAYER_SPEED;
        const vz = (iz / length) * PLAYER_SPEED;

        state.player.x = clamp(state.player.x + vx * dt, -6.8, 6.8);
        state.player.z = clamp(state.player.z + vz * dt, -6.8, 6.8);
        if (ix || iz) state.player.facing = Math.atan2(ix, iz);

        const distanceToIo = Math.hypot(state.player.x - state.io.x, state.player.z - state.io.z);
        if (!state.io.hasRecognizedPlayer && distanceToIo <= RECOGNITION_RADIUS) {
          state.io.hasRecognizedPlayer = true;
          state.io.rememberedVisits += 1;
          state.io.line = state.io.rememberedVisits === 1
            ? "Io: You came back before the rain forgot your name. I will remember that."
            : `Io: Visit ${state.io.rememberedVisits}. The kiosk remembers your path before you do.`;
          save();
        }
      }

      function draw() {
        player.position.set(state.player.x, 0.58, state.player.z);
        player.rotation.y = state.player.facing;
        io.rotation.y = Math.atan2(state.player.x - state.io.x, state.player.z - state.io.z);

        const desiredCamera = new THREE.Vector3(state.player.x - 3.5, 3.1, state.player.z + 4.4);
        camera.position.lerp(desiredCamera, CAMERA_LERP);
        camera.lookAt(state.player.x, 0.75, state.player.z);

        document.getElementById("beat").textContent = state.io.hasRecognizedPlayer
          ? state.io.line
          : "Find Io at the flooded kiosk.";
        document.getElementById("debug").textContent = `frame ${state.frame} · ${state.lastDtMs.toFixed(2)}ms step · ${state.input.source}`;

        renderer.render(scene, camera);
      }

      function updateKeyboardInput() {
        const x = Number(keys.has("KeyD") || keys.has("ArrowRight")) - Number(keys.has("KeyA") || keys.has("ArrowLeft"));
        const z = Number(keys.has("KeyS") || keys.has("ArrowDown")) - Number(keys.has("KeyW") || keys.has("ArrowUp"));
        setInput(x, z, x || z ? "keyboard" : "none");
      }

      function setInput(x, z, source = "script") {
        const length = Math.hypot(x, z);
        const scale = length > 1 ? 1 / length : 1;
        state.input.x = x * scale;
        state.input.z = z * scale;
        state.input.active = Math.hypot(state.input.x, state.input.z) >= INPUT_DEADZONE;
        state.input.source = source;
      }

      function save() {
        state.lastSavedAt = new Date().toISOString();
        localStorage.setItem(SAVE_KEY, JSON.stringify({
          player: state.player,
          io: {
            rememberedVisits: state.io.rememberedVisits,
          },
          lastSavedAt: state.lastSavedAt,
        }));
      }

      function readSave() {
        try {
          return JSON.parse(localStorage.getItem(SAVE_KEY) || "{}");
        } catch {
          return {};
        }
      }

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      window.__game = {
        slug: "aftersign",
        state,
        step,
        setInput,
        save,
        readSave,
        resetSave() {
          localStorage.removeItem(SAVE_KEY);
        },
        assertFeelContract() {
          const startX = state.player.x;
          setInput(1, 0, "harness");
          step(FIXED_DT);
          setInput(0, 0, "harness");
          const movedThisFrame = state.player.x > startX;
          const fixedStepInsideBudget = state.lastDtMs <= state.feel.targetFrameMs + 0.01;
          return {
            passed: movedThisFrame && fixedStepInsideBudget,
            movedThisFrame,
            fixedStepInsideBudget,
            lastDtMs: state.lastDtMs,
            targetFrameMs: state.feel.targetFrameMs,
          };
        },
      };
    </script>
  </body>
</html>
