<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>AFTERSIGN — Io night, post-kiosk (slice 1)</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #071019;
        color: #eef7ff;
      }

      * { box-sizing: border-box; }

      html, body, #stage {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        touch-action: none;
      }

      body {
        background:
          radial-gradient(circle at 50% 20%, rgba(99, 226, 255, 0.2), transparent 30%),
          linear-gradient(180deg, #101c2d 0%, #05070a 100%);
      }

      #hud {
        position: fixed;
        inset: env(safe-area-inset-top) 16px auto 16px;
        display: grid;
        gap: 10px;
        pointer-events: none;
      }

      #chapter {
        width: fit-content;
        max-width: min(420px, calc(100vw - 32px));
        padding: 8px 11px;
        border: 1px solid rgba(157, 220, 255, 0.35);
        border-radius: 999px;
        background: rgba(6, 15, 26, 0.72);
        color: #9ddcff;
        font-size: 12px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        backdrop-filter: blur(12px);
        transform-origin: left center;
      }

      #line {
        width: min(520px, calc(100vw - 32px));
        min-height: 76px;
        padding: 15px 16px 17px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 18px;
        background: rgba(5, 10, 18, 0.76);
        box-shadow: 0 18px 70px rgba(0, 0, 0, 0.42), inset 0 0 28px rgba(73, 197, 255, 0.08);
        backdrop-filter: blur(18px);
        font-size: clamp(15px, 3.8vw, 18px);
        line-height: 1.42;
        opacity: 0;
        transform: translateY(14px) scale(0.98);
      }

      #choices {
        position: fixed;
        left: 16px;
        right: 16px;
        bottom: calc(env(safe-area-inset-bottom) + 16px);
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        justify-content: center;
      }

      .choice {
        padding: 11px 14px;
        border: 1px solid rgba(137, 225, 255, 0.28);
        border-radius: 999px;
        background: rgba(5, 10, 18, 0.62);
        color: rgba(238, 247, 255, 0.9);
        font-size: 13px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        backdrop-filter: blur(12px);
        cursor: pointer;
        pointer-events: auto;
      }
      .choice[disabled] { opacity: 0.35; cursor: default; }
      .choice.primary { border-color: rgba(99, 226, 255, 0.72); }

      .line-in { animation: line-in 540ms cubic-bezier(0.18, 0.96, 0.22, 1) both; }
      @keyframes line-in {
        0%   { transform: translateY(14px) scale(0.98); opacity: 0; filter: blur(3px); }
        68%  { transform: translateY(-2px) scale(1.012); opacity: 1; filter: blur(0); }
        100% { transform: translateY(0) scale(1); opacity: 1; filter: blur(0); }
      }
    </style>
  </head>
  <body>
    <main id="stage" aria-label="AFTERSIGN — Io night, post-kiosk"></main>
    <section id="hud" aria-live="polite">
      <div id="chapter">AfterSign // Act 1 · the seal</div>
      <div id="line">A blue packet, still sealed, waits on the counter. Io watches from the sign-light.</div>
    </section>
    <div id="choices" aria-label="Choices"></div>

    <script type="module">
      import * as THREE from "https://unpkg.com/three@0.166.1/build/three.module.js";

      // ---------------------------------------------------------------
      // Constants — matches docs/flagship/story-state-contract.md
      // and the feel numbers from issue #401.
      // ---------------------------------------------------------------

      const SLOT = "default";
      const LOCAL_PLAYER_KEY = "aftersign:player-id";       // "local" — wiped by clearLocalState
      const LOCAL_SCRATCH_KEY = "aftersign:scratch";         // "local" — wiped by clearLocalState
      const SERVER_DB = "aftersign_server_mirror";           // stand-in for DO/D1 — NOT local
      const SERVER_STORE = "saves";

      // Feel contract — issue #401 (Io returning-session recognition beat).
      const FEEL = Object.freeze({
        beatMs: 1220,          // authored beat length (target inside 1100-1350)
        inputLockMs: 1180,     // <= 1220ms
        cameraDollyMeters: 0.30, // inside 0.24-0.36
        yawDegrees: 4,           // inside 3-5
        signGlowIntensity: 4.6,
        packetEchoScale: 1.09,
        lineEase: "cubic-bezier(0.18, 0.96, 0.22, 1)",
      });

      // Optional red-polarity break modes (contract § Required red polarity).
      const BREAK_MODE = (() => {
        const url = new URL(location.href);
        return url.searchParams.get("break") || url.searchParams.get("FLAGSHIP_BREAK_MODE") || "";
      })();

      // ---------------------------------------------------------------
      // "Server" — stand-in for the eventual DO/D1 save.
      //
      // Persisted in IndexedDB under a namespace that is EXPLICITLY not
      // wiped by forceReload({ clearLocalState: true }); harness treats
      // this store as server authority. Swap for `fetch('/api/save')`
      // when the Worker route lands without changing the surface.
      // ---------------------------------------------------------------

      const serverStore = (() => {
        function open() {
          return new Promise((resolve, reject) => {
            const req = indexedDB.open(SERVER_DB, 1);
            req.onupgradeneeded = () => {
              const db = req.result;
              if (!db.objectStoreNames.contains(SERVER_STORE)) {
                db.createObjectStore(SERVER_STORE, { keyPath: "key" });
              }
            };
            req.onsuccess = () => resolve(req.result);
            req.onerror = () => reject(req.error);
          });
        }
        async function get(key) {
          const db = await open();
          return new Promise((resolve, reject) => {
            const tx = db.transaction(SERVER_STORE, "readonly");
            const req = tx.objectStore(SERVER_STORE).get(key);
            req.onsuccess = () => resolve(req.result ? req.result.value : null);
            req.onerror = () => reject(req.error);
          });
        }
        async function put(key, value) {
          const db = await open();
          return new Promise((resolve, reject) => {
            const tx = db.transaction(SERVER_STORE, "readwrite");
            tx.objectStore(SERVER_STORE).put({ key, value });
            tx.oncomplete = () => resolve();
            tx.onerror = () => reject(tx.error);
          });
        }
        async function del(key) {
          const db = await open();
          return new Promise((resolve, reject) => {
            const tx = db.transaction(SERVER_STORE, "readwrite");
            tx.objectStore(SERVER_STORE).delete(key);
            tx.oncomplete = () => resolve();
            tx.onerror = () => reject(tx.error);
          });
        }
        return { get, put, del };
      })();

      function saveKey(playerId) {
        return `save:${SLOT}:${playerId}`;
      }

      // ---------------------------------------------------------------
      // Durable player identity. The harness may inject one via URL
      // (?playerId=...) or ?window.__aftersignEnv.playerId; otherwise
      // we generate one and stash in localStorage for the humble path.
      // Server mirror keeps its own copy so clearLocalState still finds it.
      // ---------------------------------------------------------------

      async function resolvePlayerId() {
        const url = new URL(location.href);
        const injected =
          url.searchParams.get("playerId") ||
          (typeof window !== "undefined" && window.__aftersignEnv && window.__aftersignEnv.playerId) ||
          null;
        if (injected) {
          localStorage.setItem(LOCAL_PLAYER_KEY, injected);
          await serverStore.put("player:last", injected);
          return injected;
        }
        // Prefer the server's last-known identity — this is what makes
        // the durable proof survive clearLocalState.
        const serverLast = await serverStore.get("player:last");
        if (serverLast) {
          localStorage.setItem(LOCAL_PLAYER_KEY, serverLast);
          return serverLast;
        }
        const stored = localStorage.getItem(LOCAL_PLAYER_KEY);
        if (stored) {
          await serverStore.put("player:last", stored);
          return stored;
        }
        const fresh = "p_" + Math.random().toString(36).slice(2, 10);
        localStorage.setItem(LOCAL_PLAYER_KEY, fresh);
        await serverStore.put("player:last", fresh);
        return fresh;
      }

      // ---------------------------------------------------------------
      // Story state — mirrors FlagshipGameSurface exactly.
      // ---------------------------------------------------------------

      function freshSave(playerId) {
        return {
          slot: SLOT,
          playerId,
          revision: 0,
          lastPersistedAt: null,
          flags: {
            io_intro_seen: false,
            io_route_listened: false,
            returned_after_first_session: false,
            answer_tone: "unset",
          },
          delivery: { id: "blue-packet", outcome: "unknown" },
          npcIo: {
            trustPosture: "untested",
            memories: [], // delivery-outcome memory lands here on save
          },
        };
      }

      function makeMemory(outcome, sessionId) {
        return {
          id:
            outcome === "sealed"
              ? "io-remembers-blue-packet-sealed"
              : "io-remembers-blue-packet-opened",
          kind: "delivery-outcome",
          subject: "player",
          predicate: "delivered",
          object: outcome === "sealed" ? "blue-packet-sealed" : "blue-packet-opened",
          deliveryId: "blue-packet",
          sessionId,
          source: "server",
        };
      }

      // Fragments required by the contract for lastLine.
      const IO_RETURN_LINES = {
        sealed: {
          lineId: "io_return_packet_sealed",
          text: "Io: A blue seal, unbroken. You kept it. I did not expect that.",
        },
        opened: {
          lineId: "io_return_packet_opened",
          text: "Io: The seal did not survive the walk. I can read what you saw.",
        },
      };

      // ---------------------------------------------------------------
      // App bootstrap
      // ---------------------------------------------------------------

      const stage = document.querySelector("#stage");
      const chapter = document.querySelector("#chapter");
      const line = document.querySelector("#line");
      const choicesEl = document.querySelector("#choices");

      const sessionId = "s_" + Math.random().toString(36).slice(2, 10);

      // Runtime state — separate from the harness-visible surface.
      let playerId = null;
      let save = null;                    // persisted shape (see freshSave)
      let scene = { beat: "arrival", ready: false };
      let lastLoadProof = { source: null, revision: null, playerId: null };
      let memoryBeat = null;              // #401 exposure
      let inputLockedUntil = 0;

      // Idle promise machinery for waitForStoryIdle().
      let idleResolvers = [];
      let idleTimer = 0;
      function markBusy() {
        scene.ready = false;
        if (idleTimer) clearTimeout(idleTimer);
      }
      function markIdleSoon() {
        if (idleTimer) clearTimeout(idleTimer);
        idleTimer = setTimeout(() => {
          scene.ready = true;
          const r = idleResolvers;
          idleResolvers = [];
          for (const res of r) res();
        }, 32);
      }
      function waitForStoryIdle() {
        if (scene.ready) return Promise.resolve();
        return new Promise((res) => idleResolvers.push(res));
      }

      // ---------------------------------------------------------------
      // Three.js scene: kiosk sign + counter + blue packet + Io figure
      // ---------------------------------------------------------------

      const threeScene = new THREE.Scene();
      threeScene.fog = new THREE.FogExp2(0x071019, 0.035);

      const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
      const camBase = { x: 0, y: 2.2, z: 8.8 };
      camera.position.set(camBase.x, camBase.y, camBase.z);

      const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference: "high-performance" });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 1.08;
      stage.appendChild(renderer.domElement);

      threeScene.add(new THREE.HemisphereLight(0x9ddcff, 0x132033, 1.9));

      const keyLight = new THREE.SpotLight(0x63e2ff, 180, 28, Math.PI / 6, 0.45, 1.7);
      keyLight.position.set(-3.2, 6.3, 4.4);
      keyLight.castShadow = true;
      threeScene.add(keyLight);

      const ember = new THREE.PointLight(0xff8a5c, 28, 8, 1.5);
      ember.position.set(3.1, 1.4, -1.4);
      threeScene.add(ember);

      const floor = new THREE.Mesh(
        new THREE.PlaneGeometry(18, 22),
        new THREE.MeshStandardMaterial({ color: 0x111a24, roughness: 0.78, metalness: 0.08 })
      );
      floor.rotation.x = -Math.PI / 2;
      floor.position.y = -1;
      floor.receiveShadow = true;
      threeScene.add(floor);

      // Kiosk sign (background — the recognition-beat glow target).
      const sign = new THREE.Group();
      sign.position.set(-1.05, 0.0, -1.6);
      threeScene.add(sign);
      const signPost = new THREE.Mesh(
        new THREE.BoxGeometry(0.14, 2.2, 0.14),
        new THREE.MeshStandardMaterial({ color: 0x16243a, roughness: 0.38, metalness: 0.45 })
      );
      signPost.position.y = 0.1;
      sign.add(signPost);
      const signFace = new THREE.Mesh(
        new THREE.BoxGeometry(1.4, 0.6, 0.05),
        new THREE.MeshStandardMaterial({ color: 0x63e2ff, emissive: 0x37c8ff, emissiveIntensity: 1.4, roughness: 0.2 })
      );
      signFace.position.set(0, 1.05, 0);
      sign.add(signFace);

      // Counter + blue packet.
      const counter = new THREE.Mesh(
        new THREE.BoxGeometry(2.6, 0.9, 0.9),
        new THREE.MeshStandardMaterial({ color: 0x1a2740, roughness: 0.55, metalness: 0.25 })
      );
      counter.position.set(0.4, -0.55, 0.6);
      counter.castShadow = true;
      counter.receiveShadow = true;
      threeScene.add(counter);

      const packetGroup = new THREE.Group();
      packetGroup.position.set(0.4, 0.02, 0.6);
      threeScene.add(packetGroup);
      const packet = new THREE.Mesh(
        new THREE.BoxGeometry(0.55, 0.06, 0.36),
        new THREE.MeshStandardMaterial({ color: 0x2c62c7, roughness: 0.4, metalness: 0.1, emissive: 0x1a3f8f, emissiveIntensity: 0.35 })
      );
      packet.castShadow = true;
      packetGroup.add(packet);
      const seal = new THREE.Mesh(
        new THREE.CircleGeometry(0.055, 24),
        new THREE.MeshStandardMaterial({ color: 0xd94b6a, emissive: 0xff5b7c, emissiveIntensity: 0.9, side: THREE.DoubleSide })
      );
      seal.rotation.x = -Math.PI / 2;
      seal.position.y = 0.032;
      packetGroup.add(seal);

      // Io figure.
      const io = new THREE.Group();
      io.position.set(-2.25, -0.05, -0.4);
      threeScene.add(io);
      const coat = new THREE.Mesh(
        new THREE.CapsuleGeometry(0.34, 1.22, 8, 16),
        new THREE.MeshStandardMaterial({ color: 0x263554, roughness: 0.58, metalness: 0.12 })
      );
      coat.position.y = 0.12;
      coat.castShadow = true;
      io.add(coat);
      const face = new THREE.Mesh(
        new THREE.SphereGeometry(0.28, 24, 16),
        new THREE.MeshStandardMaterial({ color: 0xffd3b3, roughness: 0.5 })
      );
      face.position.y = 0.92;
      face.castShadow = true;
      io.add(face);
      const halo = new THREE.Mesh(
        new THREE.TorusGeometry(0.38, 0.018, 8, 36),
        new THREE.MeshStandardMaterial({ color: 0x9ddcff, emissive: 0x63e2ff, emissiveIntensity: 1.4 })
      );
      halo.position.y = 1.15;
      halo.rotation.x = Math.PI / 2.7;
      io.add(halo);

      // ---------------------------------------------------------------
      // Rendering / feel: intro dolly, recognition-beat dolly + yaw.
      // ---------------------------------------------------------------

      const clock = new THREE.Clock();
      const introStart = performance.now();
      const introMs = 1450;

      function activeRecognitionOffset() {
        if (!memoryBeat || !memoryBeat.startedAt) return { dolly: 0, yaw: 0, glow: 0 };
        const dt = performance.now() - memoryBeat.startedAt;
        if (dt >= memoryBeat.timing.beatMs) return { dolly: 0, yaw: 0, glow: 0 };
        // ease-out-quart, snap back after half.
        const p = dt / memoryBeat.timing.beatMs;
        const swell = p < 0.5 ? p / 0.5 : 1 - (p - 0.5) / 0.5;
        const eased = 1 - Math.pow(1 - swell, 3);
        return {
          dolly: memoryBeat.camera.dollyMeters * eased,
          yaw: THREE.MathUtils.degToRad(memoryBeat.camera.yawDegrees) * eased,
          glow: eased,
        };
      }

      function animate(now) {
        const dt = clock.getDelta();
        const t = clock.elapsedTime;

        // Intro dolly.
        const intro = Math.min(1, (now - introStart) / introMs);
        const introEase = 1 - Math.pow(1 - intro, 3);

        const rec = activeRecognitionOffset();

        camera.position.x = THREE.MathUtils.lerp(-0.38, 0, introEase);
        camera.position.y = camBase.y + (1 - introEase) * 0.42;
        camera.position.z = THREE.MathUtils.lerp(9.6, camBase.z, introEase) - rec.dolly;
        camera.rotation.y = rec.yaw;
        camera.lookAt(-0.4, 0.25, 0);

        // Sign glow response.
        signFace.material.emissiveIntensity = 1.4 + rec.glow * (FEEL.signGlowIntensity - 1.4);
        // Packet echo bump (sealed vs opened both use it; seal color diverges).
        const echo = 1 + rec.glow * (FEEL.packetEchoScale - 1);
        packetGroup.scale.setScalar(echo);
        seal.material.emissiveIntensity = 0.9 + rec.glow * 1.5;

        io.rotation.y = Math.sin(t * 0.9) * 0.08 + (save && save.npcIo.trustPosture !== "untested" ? 0.18 : 0);
        halo.rotation.z += dt * 0.85;

        renderer.render(threeScene, camera);
        requestAnimationFrame(animate);
      }
      requestAnimationFrame(animate);

      window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      // ---------------------------------------------------------------
      // Story input
      // ---------------------------------------------------------------

      function setLine(text) {
        line.textContent = text;
        line.classList.remove("line-in");
        void line.offsetWidth;
        line.classList.add("line-in");
      }

      function isInputLocked() {
        return performance.now() < inputLockedUntil;
      }

      function derivePacketIntent() {
        // 'io_route_listened' is a lightweight tracker of intent set by
        // keep-sealed / open-packet before deliver-packet fires.
        if (save.flags.answer_tone === "kind") return "sealed";
        if (save.flags.answer_tone === "blunt") return "opened";
        return null;
      }

      async function choose(choiceId) {
        if (isInputLocked()) return;
        markBusy();
        switch (choiceId) {
          case "keep-sealed": {
            save.flags.io_intro_seen = true;
            save.flags.answer_tone = "kind";
            scene.beat = "packet-choice";
            setLine("You leave the seal. Io watches you decide, and does not move.");
            break;
          }
          case "open-packet": {
            save.flags.io_intro_seen = true;
            save.flags.answer_tone = "blunt";
            scene.beat = "packet-choice";
            // Visually break the seal.
            seal.scale.set(0.4, 0.4, 0.4);
            seal.material.color.setHex(0x8a2b3f);
            setLine("The seal cracks. Wax pieces settle on the counter. Io's chin lifts.");
            break;
          }
          case "deliver-packet": {
            const intent = derivePacketIntent();
            if (!intent) {
              setLine("Decide first: keep the seal, or break it.");
              markIdleSoon();
              return;
            }
            save.delivery.outcome = intent;
            save.npcIo.trustPosture = intent === "sealed" ? "trusted-seal" : "useful-breach";
            scene.beat = "packet-delivered";
            setLine(
              intent === "sealed"
                ? "You slide the packet across, seal intact. Io takes it without a word."
                : "You slide the packet across, its seal broken. Io reads your face first, the packet second."
            );
            // Write the delivery-outcome memory into the save shape.
            const mem = makeMemory(intent, sessionId);
            const dropMemory = BREAK_MODE === "drop-memory";
            if (!dropMemory) save.npcIo.memories = [mem];
            await forceSave();
            break;
          }
          case "return-to-io": {
            // Fire the #401 recognition beat.
            await triggerReturnBeat();
            break;
          }
          default:
            markIdleSoon();
            return;
        }
        renderChoices();
        markIdleSoon();
      }

      async function advance() {
        if (isInputLocked()) return;
        markBusy();
        if (scene.beat === "arrival") scene.beat = "packet-offered";
        else if (scene.beat === "packet-offered") scene.beat = "packet-choice";
        renderChoices();
        markIdleSoon();
      }

      async function triggerReturnBeat() {
        if (!save.npcIo.memories.length) {
          setLine("Io sees you, but not for anything in particular. Come back with weight.");
          scene.beat = "arrival";
          renderChoices();
          markIdleSoon();
          return;
        }
        const mem = save.npcIo.memories[0];
        const outcome = mem.object === "blue-packet-sealed" ? "sealed" : "opened";
        const pick = IO_RETURN_LINES[outcome];

        // Break mode: speak the wrong line for the recorded memory.
        const wrong = BREAK_MODE === "wrong-io-line";
        const chosen = wrong
          ? IO_RETURN_LINES[outcome === "sealed" ? "opened" : "sealed"]
          : pick;

        memoryBeat = {
          kind: "io_packet_return",
          outcome,
          lineId: chosen.lineId,
          memoryRefs: [mem.id],
          startedAt: performance.now(),
          timing: {
            beatMs: FEEL.beatMs,
            inputLockMs: FEEL.inputLockMs,
          },
          camera: {
            dollyMeters: FEEL.cameraDollyMeters,
            yawDegrees: FEEL.yawDegrees,
          },
        };
        inputLockedUntil = performance.now() + FEEL.inputLockMs;
        save.flags.returned_after_first_session = true;
        scene.beat = "io-return-recognition";

        // The line and memory refs update immediately; the visual beat
        // plays out over beatMs and is asserted via memoryBeat + surface.
        setLine(chosen.text);

        renderChoices();
        // Story becomes idle when the beat and lock have both cleared.
        await new Promise((res) => setTimeout(res, FEEL.beatMs + 40));
        memoryBeat = { ...memoryBeat, endedAt: performance.now() };
        markIdleSoon();
      }

      // ---------------------------------------------------------------
      // Save / load — server-authoritative, IndexedDB stand-in.
      // ---------------------------------------------------------------

      async function forceSave() {
        save.revision += 1;
        save.lastPersistedAt = new Date().toISOString();
        // Break mode: local-only-save skips the server write on purpose,
        // so the durable proof (which reads from server after clear) fails.
        if (BREAK_MODE !== "local-only-save") {
          await serverStore.put(saveKey(playerId), structuredClone(save));
          await serverStore.put("player:last", playerId);
        }
        // The local scratch mirror always writes, so the "before clear"
        // behavior stays smooth for a normal reload.
        localStorage.setItem(LOCAL_SCRATCH_KEY, JSON.stringify(save));
      }

      async function forceReload(options) {
        const clear = !!(options && options.clearLocalState);
        // Simulate what the harness's clearLocalState does — the page
        // is about to be re-instantiated, but we short-circuit here by
        // doing an in-place reload of state from the server mirror.
        if (clear) {
          localStorage.removeItem(LOCAL_PLAYER_KEY);
          localStorage.removeItem(LOCAL_SCRATCH_KEY);
        }
        await bootFromServer({ clearedLocal: clear });
      }

      async function bootFromServer(opts) {
        const cleared = !!(opts && opts.clearedLocal);
        markBusy();
        playerId = await resolvePlayerId();

        // Try server first — this is the authoritative path.
        let loaded = await serverStore.get(saveKey(playerId));
        let source = loaded ? "server" : null;

        // If server has nothing, try local scratch (unless just cleared).
        if (!loaded && !cleared) {
          const raw = localStorage.getItem(LOCAL_SCRATCH_KEY);
          if (raw) {
            try {
              loaded = JSON.parse(raw);
              source = "local-fallback";
            } catch { /* ignore */ }
          }
        }

        if (loaded) {
          save = loaded;
          save.playerId = playerId; // reconcile in case of injection
        } else {
          save = freshSave(playerId);
          source = null;
        }

        lastLoadProof = {
          source,
          revision: save.revision || null,
          playerId: save.playerId || null,
        };

        // Choose initial beat: returning session vs first-arrival.
        if (save.delivery.outcome === "sealed" || save.delivery.outcome === "opened") {
          scene.beat = "arrival"; // arrival, but a "return-to-io" choice will be offered
        } else {
          scene.beat = "arrival";
        }

        // If clearLocalState wiped local and server had nothing → we know
        // this is a broken local-only save.
        renderChoices();
        setLine(
          save.delivery.outcome === "unknown"
            ? "A blue packet, still sealed, waits on the counter. Io watches from the sign-light."
            : "The counter is bare tonight. Io is still there, still watching."
        );
        markIdleSoon();
      }

      // ---------------------------------------------------------------
      // Choice buttons
      // ---------------------------------------------------------------

      function renderChoices() {
        const items = [];
        if (save.delivery.outcome === "unknown") {
          items.push({ id: "keep-sealed", label: "Keep the seal", primary: save.flags.answer_tone !== "kind" });
          items.push({ id: "open-packet", label: "Open the packet", primary: save.flags.answer_tone !== "blunt" });
          items.push({ id: "deliver-packet", label: "Deliver", primary: !!derivePacketIntent() });
        } else {
          items.push({ id: "return-to-io", label: "Return to Io", primary: true });
        }
        choicesEl.innerHTML = "";
        for (const it of items) {
          const b = document.createElement("button");
          b.className = "choice" + (it.primary ? " primary" : "");
          b.textContent = it.label;
          b.addEventListener("pointerdown", (e) => {
            e.preventDefault();
            choose(it.id);
          });
          choicesEl.appendChild(b);
        }
      }

      // ---------------------------------------------------------------
      // Public surface — window.__game — matches FlagshipGameSurface.
      // ---------------------------------------------------------------

      function surfaceMemories() {
        // Slice 1 contract: expose at most the one delivery-outcome memory.
        return save.npcIo.memories.map((m) => ({ ...m }));
      }

      function lastLineMemoryRefs() {
        return memoryBeat && memoryBeat.memoryRefs ? [...memoryBeat.memoryRefs] : [];
      }

      function lastLine() {
        return line.textContent || null;
      }

      window.__game = {
        get version() { return 1; },
        get build() {
          const url = new URL(location.href);
          const mode = url.searchParams.get("mode") === "prod" ? "prod"
                     : url.searchParams.get("mode") === "dev" ? "dev"
                     : "test";
          return { slug: "aftersign", mode };
        },
        get scene() {
          return {
            id: "io-night-post-kiosk",
            act: "act-1-seal",
            beat: scene.beat,
            ready: scene.ready,
          };
        },
        get player() {
          return {
            id: playerId,
            name: null,
            flags: { ...save.flags },
          };
        },
        get delivery() {
          return { id: "blue-packet", outcome: save.delivery.outcome };
        },
        get npcs() {
          return {
            io: {
              id: "io",
              displayName: "Io Vale",
              present: true,
              trustPosture: save.npcIo.trustPosture,
              memories: surfaceMemories(),
              lastLine: lastLine(),
              lastLineMemoryRefs: lastLineMemoryRefs(),
            },
          };
        },
        get save() {
          return {
            slot: SLOT,
            revision: save.revision,
            lastPersistedAt: save.lastPersistedAt,
            dirty: false, // writes are synchronous through forceSave in slice 1
            authority: BREAK_MODE === "local-only-save" ? "local-fallback" : "server",
            lastLoadProof: { ...lastLoadProof },
          };
        },
        // #401 exposure: memoryBeat for the harness to assert kind, outcome,
        // line id, timing, input lock, camera delta, and yaw.
        get story() {
          return {
            memoryBeat: memoryBeat ? {
              kind: memoryBeat.kind,
              outcome: memoryBeat.outcome,
              lineId: memoryBeat.lineId,
              memoryRefs: [...memoryBeat.memoryRefs],
              timing: { ...memoryBeat.timing },
              camera: { ...memoryBeat.camera },
              startedAt: memoryBeat.startedAt,
              endedAt: memoryBeat.endedAt || null,
              inputLocked: isInputLocked(),
            } : null,
          };
        },
        input: {
          choose: (id) => choose(id),
          advance: () => advance(),
          forceSave: () => forceSave(),
          forceReload: (opts) => forceReload(opts || {}),
          waitForStoryIdle: () => waitForStoryIdle(),
        },
        // Test-only hooks.
        __test: {
          async wipeServer() {
            await serverStore.del(saveKey(playerId));
            await serverStore.del("player:last");
          },
          breakMode: BREAK_MODE,
        },
      };

      // ---------------------------------------------------------------
      // Boot
      // ---------------------------------------------------------------

      bootFromServer({ clearedLocal: false }).catch((err) => {
        console.error("[aftersign] boot failed", err);
      });
    </script>
  </body>
</html>
