<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>AFTERSIGN — Night Post Slice</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #061116;
      color: #f5ead2;
      --amber: #f0b75f;
      --moth: #e7f3ff;
      --water: #0b2e35;
      --red: #9d3d33;
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      touch-action: none;
      overscroll-behavior: none;
      background: radial-gradient(circle at 50% 10%, #173842 0%, #061116 58%, #020507 100%);
    }

    body {
      display: grid;
      place-items: stretch;
    }

    #game {
      position: fixed;
      inset: 0;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(231, 243, 255, 0.08), transparent 36%),
        radial-gradient(circle at 74% 18%, rgba(240, 183, 95, 0.22), transparent 20%),
        linear-gradient(160deg, #07151b 0%, #09262d 46%, #020607 100%);
    }

    #scene {
      position: absolute;
      inset: 0;
      perspective: 820px;
      transform-style: preserve-3d;
      overflow: hidden;
    }

    .rain {
      position: absolute;
      inset: -20%;
      opacity: 0.22;
      background-image: repeating-linear-gradient(105deg, transparent 0 15px, rgba(231, 243, 255, 0.42) 16px, transparent 18px);
      animation: rain 0.72s linear infinite;
      will-change: transform;
    }

    @keyframes rain {
      from { transform: translate3d(-2%, -4%, 0); }
      to { transform: translate3d(2%, 4%, 0); }
    }

    .fog {
      position: absolute;
      left: -20%;
      right: -20%;
      bottom: -18%;
      height: 46%;
      background:
        radial-gradient(ellipse at 30% 40%, rgba(182, 220, 224, 0.18), transparent 55%),
        radial-gradient(ellipse at 70% 55%, rgba(121, 169, 174, 0.16), transparent 58%);
      filter: blur(18px);
      animation: fog 8s ease-in-out infinite alternate;
      will-change: transform;
    }

    @keyframes fog {
      from { transform: translate3d(-3%, 0, 0) scale(1); }
      to { transform: translate3d(3%, -4%, 0) scale(1.05); }
    }

    .stair {
      position: absolute;
      left: 50%;
      bottom: 7%;
      width: min(76vw, 660px);
      height: min(54vh, 420px);
      transform: translateX(-50%) rotateX(59deg) rotateZ(-4deg);
      transform-origin: 50% 80%;
      background:
        linear-gradient(90deg, rgba(255,255,255,0.08) 0 1px, transparent 1px 16%),
        repeating-linear-gradient(180deg, #20333a 0 32px, #16272e 32px 40px);
      border: 1px solid rgba(231, 243, 255, 0.16);
      box-shadow: 0 32px 80px rgba(0, 0, 0, 0.52), inset 0 0 70px rgba(255,255,255,0.04);
    }

    .rail {
      position: absolute;
      bottom: 31%;
      left: 14%;
      width: 74%;
      height: 6px;
      background: linear-gradient(90deg, transparent, rgba(201, 127, 66, 0.9), transparent);
      box-shadow: 0 0 22px rgba(240, 183, 95, 0.25);
      transform: rotate(-4deg);
    }

    .kiosk {
      position: absolute;
      left: 50%;
      top: 14%;
      width: min(68vw, 520px);
      height: min(39vh, 300px);
      transform: translateX(-50%);
      border-radius: 24px 24px 10px 10px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.08), transparent 28%),
        linear-gradient(110deg, #2b1710, #4a2619 52%, #1b1210);
      border: 1px solid rgba(240, 183, 95, 0.24);
      box-shadow: 0 22px 80px rgba(0, 0, 0, 0.62), 0 0 40px rgba(240, 183, 95, 0.12);
      overflow: hidden;
    }

    .kiosk::before {
      content: "NIGHT POST";
      position: absolute;
      left: 50%;
      top: 18px;
      transform: translateX(-50%);
      letter-spacing: 0.42em;
      font-size: clamp(0.68rem, 1.8vw, 0.88rem);
      color: rgba(245, 234, 210, 0.78);
      text-shadow: 0 0 18px rgba(240, 183, 95, 0.54);
      white-space: nowrap;
    }

    .window {
      position: absolute;
      left: 10%;
      right: 10%;
      bottom: 16%;
      height: 46%;
      border-radius: 18px;
      background:
        radial-gradient(circle at 50% 20%, rgba(240, 183, 95, 0.5), transparent 50%),
        linear-gradient(180deg, rgba(55, 35, 20, 0.95), rgba(12, 16, 18, 0.88));
      border: 1px solid rgba(240, 183, 95, 0.28);
      box-shadow: inset 0 0 35px rgba(240, 183, 95, 0.18), 0 0 35px rgba(240, 183, 95, 0.1);
    }

    .io {
      position: absolute;
      left: 50%;
      bottom: 17%;
      width: 78px;
      height: 112px;
      transform: translateX(-50%);
      border-radius: 44px 44px 24px 24px;
      background: linear-gradient(180deg, #3b4e55, #151c20);
      box-shadow: 0 -18px 32px rgba(240, 183, 95, 0.13), inset 0 0 18px rgba(231,243,255,0.08);
    }

    .io::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 14px;
      width: 34px;
      height: 34px;
      transform: translateX(-50%);
      border-radius: 50%;
      background: linear-gradient(180deg, #d0b690, #7f6148);
      box-shadow: 0 0 12px rgba(240, 183, 95, 0.24);
    }

    .lantern {
      position: absolute;
      width: 42px;
      height: 58px;
      border-radius: 50% 50% 44% 44%;
      background: radial-gradient(circle at 50% 35%, #fff2b9, var(--amber) 44%, #9f4c26 84%);
      box-shadow: 0 0 24px rgba(240, 183, 95, 0.72), 0 0 70px rgba(240, 183, 95, 0.28);
      animation: lantern 2.6s ease-in-out infinite alternate;
    }

    .lantern.left { left: 18%; top: 26%; }
    .lantern.right { right: 17%; top: 20%; animation-delay: -1.4s; }

    @keyframes lantern {
      from { transform: translateY(0); filter: brightness(0.9); }
      to { transform: translateY(7px); filter: brightness(1.15); }
    }

    .box {
      position: absolute;
      right: min(18vw, 170px);
      bottom: 18%;
      width: 88px;
      height: 118px;
      border-radius: 12px;
      background: linear-gradient(180deg, #253a3e, #0d181b);
      border: 1px solid rgba(231, 243, 255, 0.22);
      box-shadow: 0 15px 36px rgba(0,0,0,0.5), 0 0 20px rgba(231,243,255,0.08);
    }

    .box::before {
      content: "";
      position: absolute;
      left: 20px;
      right: 20px;
      top: 24px;
      height: 10px;
      border-radius: 999px;
      background: rgba(231, 243, 255, 0.72);
      box-shadow: 0 0 18px rgba(231, 243, 255, 0.24);
    }

    .packet {
      position: absolute;
      left: 50%;
      bottom: calc(13% + env(safe-area-inset-bottom));
      width: min(58vw, 310px);
      height: 112px;
      transform: translateX(-50%);
      border-radius: 16px;
      background: linear-gradient(135deg, #244a63, #0e2431 58%, #061219);
      border: 1px solid rgba(231, 243, 255, 0.2);
      box-shadow: 0 20px 55px rgba(0,0,0,0.48), inset 0 0 35px rgba(231,243,255,0.07);
      z-index: 12;
      touch-action: none;
      user-select: none;
      cursor: pointer;
      transition: transform 140ms ease, filter 140ms ease;
    }

    .packet:active { transform: translateX(-50%) scale(0.985); }

    .seal {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 54px;
      height: 54px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: radial-gradient(circle at 38% 32%, #d97968, var(--red) 58%, #4f1513 100%);
      box-shadow: 0 0 24px rgba(157, 61, 51, 0.48), inset 0 0 12px rgba(255,255,255,0.18);
    }

    .packet.opened .seal {
      width: 74px;
      height: 16px;
      border-radius: 999px;
      transform: translate(-50%, -50%) rotate(-18deg);
      filter: saturate(0.75) brightness(0.8);
    }

    .packet.delivered {
      transform: translateX(32vw) translateY(-16vh) scale(0.36);
      opacity: 0;
      pointer-events: none;
      transition: transform 420ms cubic-bezier(.2,.9,.2,1), opacity 420ms ease;
    }

    .choice-ring {
      position: absolute;
      inset: -12px;
      border-radius: 24px;
      border: 3px solid rgba(231, 243, 255, 0.0);
      background: conic-gradient(from -90deg, rgba(231, 243, 255, 0.85) calc(var(--hold) * 1turn), transparent 0);
      -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      padding: 6px;
      opacity: calc(0.14 + var(--hold));
      pointer-events: none;
    }

    #hud {
      position: fixed;
      left: max(16px, env(safe-area-inset-left));
      right: max(16px, env(safe-area-inset-right));
      top: max(16px, env(safe-area-inset-top));
      z-index: 20;
      display: grid;
      gap: 10px;
      pointer-events: none;
    }

    .line {
      width: fit-content;
      max-width: min(680px, 100%);
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(2, 7, 9, 0.68);
      border: 1px solid rgba(240, 183, 95, 0.18);
      box-shadow: 0 12px 30px rgba(0,0,0,0.36);
      backdrop-filter: blur(10px);
      line-height: 1.35;
      font-size: clamp(0.95rem, 2.5vw, 1.08rem);
    }

    .prompt {
      color: rgba(245, 234, 210, 0.76);
      font-size: clamp(0.78rem, 2.1vw, 0.9rem);
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .controls {
      position: fixed;
      left: max(16px, env(safe-area-inset-left));
      right: max(16px, env(safe-area-inset-right));
      bottom: max(16px, env(safe-area-inset-bottom));
      z-index: 24;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      pointer-events: none;
    }

    button {
      pointer-events: auto;
      border: 1px solid rgba(245, 234, 210, 0.22);
      border-radius: 999px;
      color: #f5ead2;
      background: rgba(2, 7, 9, 0.62);
      padding: 13px 16px;
      min-height: 48px;
      font: inherit;
      box-shadow: 0 10px 26px rgba(0,0,0,0.28);
      backdrop-filter: blur(8px);
    }

    button.primary {
      background: linear-gradient(135deg, rgba(240, 183, 95, 0.82), rgba(157, 61, 51, 0.78));
      color: #130908;
      font-weight: 700;
    }

    .beat {
      animation: beat 580ms ease both;
    }

    @keyframes beat {
      0% { filter: brightness(1); }
      35% { filter: brightness(1.42) saturate(1.2); }
      100% { filter: brightness(1); }
    }

    @media (max-width: 560px) {
      .kiosk { top: 12%; height: 34vh; width: 78vw; }
      .packet { bottom: calc(18% + env(safe-area-inset-bottom)); }
      .box { right: 7vw; bottom: 24%; transform: scale(0.84); }
      .controls { align-items: flex-end; }
      button { padding-inline: 14px; }
    }
  </style>
</head>
<body>
  <main id="game" aria-label="AFTERSIGN Night Post vertical slice">
    <div id="scene">
      <div class="rain" aria-hidden="true"></div>
      <div class="fog" aria-hidden="true"></div>
      <div class="lantern left" aria-hidden="true"></div>
      <div class="lantern right" aria-hidden="true"></div>
      <div class="rail" aria-hidden="true"></div>
      <div class="stair" aria-hidden="true"></div>
      <section class="kiosk" aria-label="Io's Night Post kiosk">
        <div class="window"><div class="io" aria-hidden="true"></div></div>
      </section>
      <div class="box" aria-label="nearby sign box"></div>
      <div id="packet" class="packet" role="button" tabindex="0" aria-label="sealed blue packet: hold to open, tap deliver sealed" style="--hold: 0">
        <div class="choice-ring" aria-hidden="true"></div>
        <div class="seal" aria-hidden="true"></div>
      </div>
    </div>

    <section id="hud" aria-live="polite">
      <div id="ioLine" class="line">Io: “Blue packet. Sign box by the rail. Bring me back the fact, not the story.”</div>
      <div id="prompt" class="line prompt">Tap the packet to deliver sealed. Hold 0.55s to break the wax first.</div>
    </section>

    <nav class="controls" aria-label="slice controls">
      <button id="resetButton" type="button">Reset save</button>
      <button id="returnButton" type="button" class="primary">Start return session</button>
    </nav>
  </main>

  <script type="module">
    // AFTERSIGN slice — implements the FlagshipGameSurface contract in
    // docs/flagship/story-state-contract.md. Every field name and enum
    // value below traces to a rule in that document. The slice is CSS-only
    // (no three.js, no server) so `save.authority` is honestly reported
    // as `local-fallback`; a durable/server implementation will flip it
    // to `server` in a later PR. Break modes (drop-memory / wrong-io-line
    // / local-only-save) are read from ?breakMode= or window.FLAGSHIP_BREAK_MODE
    // so red-polarity CI can prove the harness actually catches regressions.

    const STORAGE_PREFIX = 'aftersign.slice.v2';
    const CONTRACT_VERSION = 1;
    const HOLD_TO_OPEN_MS = 550;
    const RETURN_LINE_FRAGMENTS = {
      sealed: 'blue seal, unbroken',
      opened: 'The seal did not',
    };
    const RETURN_MEMORY_IDS = {
      sealed: 'io-remembers-blue-packet-sealed',
      opened: 'io-remembers-blue-packet-opened',
    };

    // Query params drive slot + breakMode. Guarded because the node feel
    // harness (aftersign/aftersign-feel.test.mjs) evals this module inside
    // a Function() with a stubbed context that has no `location`.
    const search =
      (typeof location !== 'undefined' && location && location.search) || '';
    const params = new URLSearchParams(search);
    const slot = params.get('slot') || 'default';
    const STORAGE_KEY = `${STORAGE_PREFIX}:${slot}`;

    // Break mode: query param wins, then a window sentinel the harness may
    // set before boot via addInitScript. Kept read-only after boot so a
    // spec can't flip mid-run and lie to itself.
    const breakMode =
      params.get('breakMode') ||
      (typeof window !== 'undefined' && window && window.FLAGSHIP_BREAK_MODE) ||
      null;

    const packet = document.querySelector('#packet');
    const ioLine = document.querySelector('#ioLine');
    const prompt = document.querySelector('#prompt');
    const game = document.querySelector('#game');
    const resetButton = document.querySelector('#resetButton');
    const returnButton = document.querySelector('#returnButton');

    function defaultState() {
      return {
        version: CONTRACT_VERSION,
        build: { slug: 'aftersign', mode: 'test' },
        scene: {
          id: 'io-night-post-kiosk',
          act: 'act-1-seal',
          beat: 'packet-offered',
          ready: true,
        },
        player: {
          id: `local-player:${slot}`,
          name: null,
          flags: {
            io_intro_seen: false,
            io_route_listened: false,
            returned_after_first_session: false,
            answer_tone: 'unset',
          },
        },
        delivery: { id: 'blue-packet', outcome: 'unknown' },
        npcs: {
          io: {
            id: 'io',
            displayName: 'Io Vale',
            present: true,
            trustPosture: 'untested',
            memories: [],
            lastLine: ioLine.textContent,
            lastLineMemoryRefs: [],
          },
        },
        save: {
          slot: 'default',
          revision: 0,
          lastPersistedAt: null,
          dirty: false,
          authority: 'local-fallback',
          lastLoadProof: { source: null, revision: null, playerId: null },
        },
        // Slice-local input feel state — not part of the contract, but the
        // aftersign-feel.test.mjs harness reads it under window.__game.inputState.
        _input: {
          holdToOpenMs: HOLD_TO_OPEN_MS,
          holdProgress: 0,
          lastDecisionLatencyMs: null,
        },
      };
    }

    let state = defaultState();

    // Idle-tracker: input.waitForStoryIdle() resolves when no beat or line
    // transition has been dispatched for `IDLE_MS`. The contract calls
    // out state-quiescence over pixel/animation timing. IDLE_MS is small
    // enough for CI to finish quickly and big enough that a subsequent
    // beat scheduled 1180ms later (recognition beat) is treated as a new
    // wake, not the same idle window.
    const IDLE_MS = 50;
    let lastStoryChangeAt = performance.now();
    let idleWaiters = [];

    function markStoryChange() {
      lastStoryChangeAt = performance.now();
    }

    function pumpIdle() {
      if (!idleWaiters.length) return;
      const since = performance.now() - lastStoryChangeAt;
      if (since >= IDLE_MS) {
        const resolvers = idleWaiters;
        idleWaiters = [];
        for (const resolve of resolvers) resolve();
      } else {
        setTimeout(pumpIdle, Math.max(1, IDLE_MS - since));
      }
    }

    function waitForStoryIdle() {
      return new Promise((resolve) => {
        idleWaiters.push(resolve);
        setTimeout(pumpIdle, IDLE_MS);
      });
    }

    // Local persistence. Under breakMode='local-only-save' the durable
    // proof (lastLoadProof.source === 'server') stays false even after a
    // save+reload; under 'drop-memory' the memory is stripped on load;
    // under 'wrong-io-line' the outcome is loaded but Io's line is
    // swapped. These are documented in docs/flagship/story-state-contract.md
    // "Required red polarity".

    function persist() {
      const payload = {
        scene: state.scene,
        player: state.player,
        delivery: state.delivery,
        npcs: state.npcs,
        save: state.save,
      };
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
      } catch {
        /* headless envs may lack quota — surface as dirty=true. */
      }
    }

    function loadPersisted() {
      let raw;
      try {
        raw = localStorage.getItem(STORAGE_KEY);
      } catch {
        return null;
      }
      if (!raw) return null;
      try {
        return JSON.parse(raw);
      } catch {
        return null;
      }
    }

    function publish() {
      // No-op — the getter on window.__game reads `state` live. Left as a
      // named seam so any future async publish path is discoverable.
      markStoryChange();
    }

    function setLine(text) {
      ioLine.textContent = text;
      state.npcs.io.lastLine = text;
      ioLine.classList.remove('beat');
      void ioLine.offsetWidth;
      ioLine.classList.add('beat');
      markStoryChange();
    }

    function setBeat(nextBeat) {
      if (state.scene.beat === nextBeat) return;
      state.scene.beat = nextBeat;
      markStoryChange();
    }

    function ioLineFor(outcome, phase) {
      if (phase === 'first-session') {
        return outcome === 'sealed'
          ? 'Io: “Unbroken. Good. Vey can use one more pair of clean hands.”'
          : 'Io: “Wax broke before the box. I can still use the fact. Not the habit.”';
      }
      // return-to-io recognition beat
      const sealed = 'Io: “You came back. So did the ' + RETURN_LINE_FRAGMENTS.sealed + '. That gives me two facts to trust.”';
      const opened = 'Io: “You came back. ' + RETURN_LINE_FRAGMENTS.opened + '. I can use one of those facts.”';
      if (breakMode === 'wrong-io-line') {
        // Swap the two lines so the fragment check catches it.
        return outcome === 'sealed' ? opened : sealed;
      }
      return outcome === 'sealed' ? sealed : opened;
    }

    function memoryFor(outcome) {
      // Honest source: this slice persists locally (see save.authority
      // above); stamping 'server' would let a server-mismatch regression
      // sneak through the durable proof. The fixmed npc-memory round-trip
      // test (which does require source === 'server') stays fixmed until
      // the server path lands — flipping this then is a one-line change.
      return {
        id: RETURN_MEMORY_IDS[outcome],
        kind: 'delivery-outcome',
        subject: 'player',
        predicate: 'delivered',
        object: outcome === 'sealed' ? 'blue-packet-sealed' : 'blue-packet-opened',
        deliveryId: 'blue-packet',
        sessionId: `session:${slot}:${Date.now()}`,
        source: 'local-fallback',
      };
    }

    function commitDelivery(outcome, latencyMs) {
      if (state.delivery.outcome !== 'unknown') return;
      state.delivery.outcome = outcome;
      state._input.lastDecisionLatencyMs = Math.round(latencyMs);
      packet.classList.toggle('opened', outcome === 'opened');
      packet.classList.add('delivered');
      game.classList.add('beat');

      state.player.flags.io_intro_seen = true;
      state.npcs.io.trustPosture = outcome === 'sealed' ? 'trusted-seal' : 'useful-breach';

      // Persist the delivery-outcome memory.
      const mem = memoryFor(outcome);
      state.npcs.io.memories = [mem];
      state.save.dirty = true;

      setBeat('packet-delivered');
      setLine(ioLineFor(outcome, 'first-session'));
      prompt.textContent = 'Saved. Start a return session to test Io’s memory line.';
      publish();
    }

    function forceSave() {
      state.save.revision = state.save.revision + 1;
      state.save.lastPersistedAt = new Date().toISOString();
      state.save.dirty = false;
      persist();
      markStoryChange();
    }

    function forceReload(options) {
      const clearLocalState = !!(options && options.clearLocalState);
      const persisted = clearLocalState ? null : loadPersisted();

      if (!persisted) {
        // No saved state (or local wiped) — reset to first-session.
        state = defaultState();
        packet.classList.remove('opened', 'delivered');
        packet.style.setProperty('--hold', '0');
        setLine('Io: “Blue packet. Sign box by the rail. Bring me back the fact, not the story.”');
        prompt.textContent = 'Tap the packet to deliver sealed. Hold 0.55s to break the wax first.';
        markStoryChange();
        return;
      }

      // Load path — restore prior state.
      state = defaultState();
      state.scene = persisted.scene || state.scene;
      state.player = persisted.player || state.player;
      state.delivery = persisted.delivery || state.delivery;
      state.npcs = persisted.npcs || state.npcs;
      state.save = persisted.save || state.save;

      // drop-memory break: the local blob loads but Io's packet memory is
      // stripped, so returning-session assertions must fail.
      if (breakMode === 'drop-memory') {
        state.npcs.io.memories = [];
        state.npcs.io.lastLineMemoryRefs = [];
      }

      // Under the CSS-only slice there is no real server. The durable
      // proof requires `source === 'server'` in lastLoadProof after
      // clearLocalState — which honestly cannot be satisfied here. So:
      //   - a normal reload reports source='local-fallback'
      //   - a clearLocalState reload reports source=null (nothing to prove)
      // A future server-backed impl flips these to 'server'. For now the
      // durable spec is guarded on FLAGSHIP_BREAK_MODE=local-only-save so
      // the red-polarity CI can prove the guard is honest.
      state.save.lastLoadProof = {
        source: clearLocalState ? null : 'local-fallback',
        revision: clearLocalState ? null : state.save.revision,
        playerId: clearLocalState ? null : state.player.id,
      };
      state.save.dirty = false;

      if (state.delivery.outcome !== 'unknown') {
        packet.classList.add('delivered');
      }
      markStoryChange();
    }

    async function choose(choiceId) {
      switch (choiceId) {
        case 'keep-sealed':
          setBeat('packet-choice');
          state.player.flags.io_intro_seen = true;
          return;
        case 'open-packet':
          setBeat('packet-choice');
          state.player.flags.io_intro_seen = true;
          commitDelivery('opened', HOLD_TO_OPEN_MS);
          return;
        case 'deliver-packet': {
          // Deliver whichever outcome the player currently intends —
          // default to sealed unless open-packet was chosen already.
          if (state.delivery.outcome === 'unknown') {
            commitDelivery('sealed', 0);
          }
          return;
        }
        case 'return-to-io': {
          // Recognition beat: reference the persisted delivery memory and
          // speak the line whose fragment maps to that outcome.
          const outcome = state.delivery.outcome;
          if (outcome === 'sealed' || outcome === 'opened') {
            const memId = RETURN_MEMORY_IDS[outcome];
            const hasMem = state.npcs.io.memories.some((m) => m.id === memId);
            state.npcs.io.lastLineMemoryRefs = hasMem ? [memId] : [];
            setLine(ioLineFor(outcome, 'return'));
            setBeat('io-return-recognition');
            state.player.flags.returned_after_first_session = true;
          } else {
            setLine('Io: “No packet in the ledger yet. First we make a fact.”');
          }
          return;
        }
        default:
          throw new Error(`Unknown choiceId: ${choiceId}`);
      }
    }

    // ------------------- input wiring (pointer / keyboard) -------------------

    let holdStart = 0;
    let holdFrame = 0;
    let pointerDown = false;
    let decidedThisPress = false;

    function updateHoldProgress(now) {
      if (!pointerDown || decidedThisPress) return;
      const elapsed = now - holdStart;
      state._input.holdProgress = Math.min(1, elapsed / HOLD_TO_OPEN_MS);
      packet.style.setProperty('--hold', state._input.holdProgress.toFixed(3));
      if (elapsed >= HOLD_TO_OPEN_MS) {
        decidedThisPress = true;
        commitDelivery('opened', elapsed);
        if (navigator.vibrate) navigator.vibrate(24);
        return;
      }
      holdFrame = requestAnimationFrame(updateHoldProgress);
    }

    function beginPress(event) {
      if (state.delivery.outcome !== 'unknown') return;
      event.preventDefault();
      packet.setPointerCapture?.(event.pointerId);
      pointerDown = true;
      decidedThisPress = false;
      holdStart = performance.now();
      state._input.holdProgress = 0;
      packet.style.setProperty('--hold', '0');
      holdFrame = requestAnimationFrame(updateHoldProgress);
    }

    function endPress(event) {
      if (!pointerDown) return;
      event.preventDefault();
      pointerDown = false;
      cancelAnimationFrame(holdFrame);
      packet.style.setProperty('--hold', '0');
      const elapsed = performance.now() - holdStart;
      if (!decidedThisPress && state.delivery.outcome === 'unknown') {
        commitDelivery('sealed', elapsed);
        if (navigator.vibrate) navigator.vibrate(12);
      }
    }

    packet.addEventListener('pointerdown', beginPress, { passive: false });
    packet.addEventListener('pointerup', endPress, { passive: false });
    packet.addEventListener('pointercancel', endPress, { passive: false });
    packet.addEventListener('keydown', (event) => {
      if (event.key === 'Enter' || event.key === ' ') {
        event.preventDefault();
        commitDelivery('sealed', 0);
      }
      if (event.key.toLowerCase() === 'o') {
        event.preventDefault();
        commitDelivery('opened', HOLD_TO_OPEN_MS);
      }
    });
    resetButton.addEventListener('click', () => {
      try { localStorage.removeItem(STORAGE_KEY); } catch { /* no-op */ }
      state = defaultState();
      packet.classList.remove('opened', 'delivered');
      packet.style.setProperty('--hold', '0');
      setLine('Io: “Blue packet. Sign box by the rail. Bring me back the fact, not the story.”');
      prompt.textContent = 'Tap the packet to deliver sealed. Hold 0.55s to break the wax first.';
    });
    returnButton.addEventListener('click', () => choose('return-to-io'));

    // On boot, if there IS a persisted state for this slot, load it — same
    // behavior as the older slice. Harness specs override this via
    // forceReload/reset as needed.
    (function boot() {
      const persisted = loadPersisted();
      if (persisted) {
        forceReload({ clearLocalState: false });
      }
      markStoryChange();
    })();

    // ------------------- public FlagshipGameSurface -------------------

    // Slot slug for save.slot per the contract enum ('default'). Real slot
    // isolation is done via the storage key, not the surface field.
    Object.defineProperty(state.save, 'slot', {
      value: 'default',
      writable: true,
      configurable: true,
      enumerable: true,
    });

    function snapshot() {
      return JSON.parse(JSON.stringify({
        version: state.version,
        build: state.build,
        scene: state.scene,
        player: state.player,
        delivery: state.delivery,
        npcs: state.npcs,
        save: state.save,
      }));
    }

    window.__game = {
      get version() { return state.version; },
      get build() { return state.build; },
      get scene() { return state.scene; },
      get player() { return state.player; },
      get delivery() { return state.delivery; },
      get npcs() { return state.npcs; },
      get save() { return state.save; },

      // Feel-harness (aftersign-feel.test.mjs) reads these; not part of
      // the FlagshipGameSurface but colocated for a single boot script.
      get inputState() { return { ...state._input }; },
      get storyState() {
        // Back-compat shim for the CSS-slice feel test — mirrors what the
        // slice used to publish while remaining a subset of the contract.
        return {
          scene: state.scene.id,
          packetOutcome:
            state.delivery.outcome === 'unknown' ? 'pending' : state.delivery.outcome,
          ioTrustPosture:
            state.npcs.io.trustPosture === 'trusted-seal'
              ? 'trusting'
              : state.npcs.io.trustPosture === 'useful-breach'
                ? 'wary'
                : 'testing',
          authoredMemory:
            state.npcs.io.memories.length
              ? (state.delivery.outcome === 'sealed'
                  ? 'The player delivered the blue packet unopened.'
                  : 'The player opened the blue packet before delivery.')
              : null,
          lastIoLine: state.npcs.io.lastLine,
          returningSession: state.scene.beat === 'io-return-recognition',
        };
      },

      // Legacy CSS-slice helpers kept for the node feel harness.
      choosePacketOutcome(outcome) {
        commitDelivery(outcome, outcome === 'opened' ? HOLD_TO_OPEN_MS : 0);
      },
      startReturnSession() {
        choose('return-to-io');
      },
      resetSlice() {
        try { localStorage.removeItem(STORAGE_KEY); } catch { /* no-op */ }
        state = defaultState();
        packet.classList.remove('opened', 'delivered');
        packet.style.setProperty('--hold', '0');
        setLine('Io: “Blue packet. Sign box by the rail. Bring me back the fact, not the story.”');
      },

      // Contract input surface.
      input: {
        choose,
        advance: () => choose('return-to-io'),
        forceSave: async () => forceSave(),
        forceReload: async (options) => forceReload(options),
        waitForStoryIdle,
      },

      // Snapshot / reset — used by the memory-prior-session spec.
      getSnapshot: snapshot,
      reset: (saved) => {
        if (saved) {
          state = defaultState();
          Object.assign(state, JSON.parse(JSON.stringify(saved)));
          state.version = CONTRACT_VERSION;
        } else {
          state = defaultState();
        }
        markStoryChange();
      },
    };
  </script>
</body>
</html>
