<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>AFTERSIGN — Night Post Slice</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #061116;
      color: #f5ead2;
      --amber: #f0b75f;
      --moth: #e7f3ff;
      --water: #0b2e35;
      --red: #9d3d33;
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      touch-action: none;
      overscroll-behavior: none;
      background: radial-gradient(circle at 50% 10%, #173842 0%, #061116 58%, #020507 100%);
    }

    body {
      display: grid;
      place-items: stretch;
    }

    #game {
      position: fixed;
      inset: 0;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(231, 243, 255, 0.08), transparent 36%),
        radial-gradient(circle at 74% 18%, rgba(240, 183, 95, 0.22), transparent 20%),
        linear-gradient(160deg, #07151b 0%, #09262d 46%, #020607 100%);
    }

    #scene {
      position: absolute;
      inset: 0;
      perspective: 820px;
      transform-style: preserve-3d;
      overflow: hidden;
    }

    .rain {
      position: absolute;
      inset: -20%;
      opacity: 0.22;
      background-image: repeating-linear-gradient(105deg, transparent 0 15px, rgba(231, 243, 255, 0.42) 16px, transparent 18px);
      animation: rain 0.72s linear infinite;
      will-change: transform;
    }

    @keyframes rain {
      from { transform: translate3d(-2%, -4%, 0); }
      to { transform: translate3d(2%, 4%, 0); }
    }

    .fog {
      position: absolute;
      left: -20%;
      right: -20%;
      bottom: -18%;
      height: 46%;
      background:
        radial-gradient(ellipse at 30% 40%, rgba(182, 220, 224, 0.18), transparent 55%),
        radial-gradient(ellipse at 70% 55%, rgba(121, 169, 174, 0.16), transparent 58%);
      filter: blur(18px);
      animation: fog 8s ease-in-out infinite alternate;
      will-change: transform;
    }

    @keyframes fog {
      from { transform: translate3d(-3%, 0, 0) scale(1); }
      to { transform: translate3d(3%, -4%, 0) scale(1.05); }
    }

    .stair {
      position: absolute;
      left: 50%;
      bottom: 7%;
      width: min(76vw, 660px);
      height: min(54vh, 420px);
      transform: translateX(-50%) rotateX(59deg) rotateZ(-4deg);
      transform-origin: 50% 80%;
      background:
        linear-gradient(90deg, rgba(255,255,255,0.08) 0 1px, transparent 1px 16%),
        repeating-linear-gradient(180deg, #20333a 0 32px, #16272e 32px 40px);
      border: 1px solid rgba(231, 243, 255, 0.16);
      box-shadow: 0 32px 80px rgba(0, 0, 0, 0.52), inset 0 0 70px rgba(255,255,255,0.04);
    }

    .rail {
      position: absolute;
      bottom: 31%;
      left: 14%;
      width: 74%;
      height: 6px;
      background: linear-gradient(90deg, transparent, rgba(201, 127, 66, 0.9), transparent);
      box-shadow: 0 0 22px rgba(240, 183, 95, 0.25);
      transform: rotate(-4deg);
    }

    .kiosk {
      position: absolute;
      left: 50%;
      top: 14%;
      width: min(68vw, 520px);
      height: min(39vh, 300px);
      transform: translateX(-50%);
      border-radius: 24px 24px 10px 10px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.08), transparent 28%),
        linear-gradient(110deg, #2b1710, #4a2619 52%, #1b1210);
      border: 1px solid rgba(240, 183, 95, 0.24);
      box-shadow: 0 22px 80px rgba(0, 0, 0, 0.62), 0 0 40px rgba(240, 183, 95, 0.12);
      overflow: hidden;
    }

    .kiosk::before {
      content: "NIGHT POST";
      position: absolute;
      left: 50%;
      top: 18px;
      transform: translateX(-50%);
      letter-spacing: 0.42em;
      font-size: clamp(0.68rem, 1.8vw, 0.88rem);
      color: rgba(245, 234, 210, 0.78);
      text-shadow: 0 0 18px rgba(240, 183, 95, 0.54);
      white-space: nowrap;
    }

    .window {
      position: absolute;
      left: 10%;
      right: 10%;
      bottom: 16%;
      height: 46%;
      border-radius: 18px;
      background:
        radial-gradient(circle at 50% 20%, rgba(240, 183, 95, 0.5), transparent 50%),
        linear-gradient(180deg, rgba(55, 35, 20, 0.95), rgba(12, 16, 18, 0.88));
      border: 1px solid rgba(240, 183, 95, 0.28);
      box-shadow: inset 0 0 35px rgba(240, 183, 95, 0.18), 0 0 35px rgba(240, 183, 95, 0.1);
    }

    .io {
      position: absolute;
      left: 50%;
      bottom: 17%;
      width: 78px;
      height: 112px;
      transform: translateX(-50%);
      border-radius: 44px 44px 24px 24px;
      background: linear-gradient(180deg, #3b4e55, #151c20);
      box-shadow: 0 -18px 32px rgba(240, 183, 95, 0.13), inset 0 0 18px rgba(231,243,255,0.08);
    }

    .io::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 14px;
      width: 34px;
      height: 34px;
      transform: translateX(-50%);
      border-radius: 50%;
      background: linear-gradient(180deg, #d0b690, #7f6148);
      box-shadow: 0 0 12px rgba(240, 183, 95, 0.24);
    }

    .lantern {
      position: absolute;
      width: 42px;
      height: 58px;
      border-radius: 50% 50% 44% 44%;
      background: radial-gradient(circle at 50% 35%, #fff2b9, var(--amber) 44%, #9f4c26 84%);
      box-shadow: 0 0 24px rgba(240, 183, 95, 0.72), 0 0 70px rgba(240, 183, 95, 0.28);
      animation: lantern 2.6s ease-in-out infinite alternate;
    }

    .lantern.left { left: 18%; top: 26%; }
    .lantern.right { right: 17%; top: 20%; animation-delay: -1.4s; }

    @keyframes lantern {
      from { transform: translateY(0); filter: brightness(0.9); }
      to { transform: translateY(7px); filter: brightness(1.15); }
    }

    .box {
      position: absolute;
      right: min(18vw, 170px);
      bottom: 18%;
      width: 88px;
      height: 118px;
      border-radius: 12px;
      background: linear-gradient(180deg, #253a3e, #0d181b);
      border: 1px solid rgba(231, 243, 255, 0.22);
      box-shadow: 0 15px 36px rgba(0,0,0,0.5), 0 0 20px rgba(231,243,255,0.08);
    }

    .box::before {
      content: "";
      position: absolute;
      left: 20px;
      right: 20px;
      top: 24px;
      height: 10px;
      border-radius: 999px;
      background: rgba(231, 243, 255, 0.72);
      box-shadow: 0 0 18px rgba(231, 243, 255, 0.24);
    }

    .packet {
      position: absolute;
      left: 50%;
      bottom: calc(13% + env(safe-area-inset-bottom));
      width: min(58vw, 310px);
      height: 112px;
      transform: translateX(-50%);
      border-radius: 16px;
      background: linear-gradient(135deg, #244a63, #0e2431 58%, #061219);
      border: 1px solid rgba(231, 243, 255, 0.2);
      box-shadow: 0 20px 55px rgba(0,0,0,0.48), inset 0 0 35px rgba(231,243,255,0.07);
      z-index: 12;
      touch-action: none;
      user-select: none;
      cursor: pointer;
      transition: transform 140ms ease, filter 140ms ease;
    }

    .packet:active { transform: translateX(-50%) scale(0.985); }

    .seal {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 54px;
      height: 54px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: radial-gradient(circle at 38% 32%, #d97968, var(--red) 58%, #4f1513 100%);
      box-shadow: 0 0 24px rgba(157, 61, 51, 0.48), inset 0 0 12px rgba(255,255,255,0.18);
    }

    .packet.opened .seal {
      width: 74px;
      height: 16px;
      border-radius: 999px;
      transform: translate(-50%, -50%) rotate(-18deg);
      filter: saturate(0.75) brightness(0.8);
    }

    .packet.delivered {
      transform: translateX(32vw) translateY(-16vh) scale(0.36);
      opacity: 0;
      pointer-events: none;
      transition: transform 420ms cubic-bezier(.2,.9,.2,1), opacity 420ms ease;
    }

    .choice-ring {
      position: absolute;
      inset: -12px;
      border-radius: 24px;
      border: 3px solid rgba(231, 243, 255, 0.0);
      background: conic-gradient(from -90deg, rgba(231, 243, 255, 0.85) calc(var(--hold) * 1turn), transparent 0);
      -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      padding: 6px;
      opacity: calc(0.14 + var(--hold));
      pointer-events: none;
    }

    #hud {
      position: fixed;
      left: max(16px, env(safe-area-inset-left));
      right: max(16px, env(safe-area-inset-right));
      top: max(16px, env(safe-area-inset-top));
      z-index: 20;
      display: grid;
      gap: 10px;
      pointer-events: none;
    }

    .line {
      width: fit-content;
      max-width: min(680px, 100%);
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(2, 7, 9, 0.68);
      border: 1px solid rgba(240, 183, 95, 0.18);
      box-shadow: 0 12px 30px rgba(0,0,0,0.36);
      backdrop-filter: blur(10px);
      line-height: 1.35;
      font-size: clamp(0.95rem, 2.5vw, 1.08rem);
    }

    .prompt {
      color: rgba(245, 234, 210, 0.76);
      font-size: clamp(0.78rem, 2.1vw, 0.9rem);
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .controls {
      position: fixed;
      left: max(16px, env(safe-area-inset-left));
      right: max(16px, env(safe-area-inset-right));
      bottom: max(16px, env(safe-area-inset-bottom));
      z-index: 24;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      pointer-events: none;
    }

    button {
      pointer-events: auto;
      border: 1px solid rgba(245, 234, 210, 0.22);
      border-radius: 999px;
      color: #f5ead2;
      background: rgba(2, 7, 9, 0.62);
      padding: 13px 16px;
      min-height: 48px;
      font: inherit;
      box-shadow: 0 10px 26px rgba(0,0,0,0.28);
      backdrop-filter: blur(8px);
    }

    button.primary {
      background: linear-gradient(135deg, rgba(240, 183, 95, 0.82), rgba(157, 61, 51, 0.78));
      color: #130908;
      font-weight: 700;
    }

    .beat {
      animation: beat 580ms ease both;
    }

    @keyframes beat {
      0% { filter: brightness(1); }
      35% { filter: brightness(1.42) saturate(1.2); }
      100% { filter: brightness(1); }
    }

    @media (max-width: 560px) {
      .kiosk { top: 12%; height: 34vh; width: 78vw; }
      .packet { bottom: calc(18% + env(safe-area-inset-bottom)); }
      .box { right: 7vw; bottom: 24%; transform: scale(0.84); }
      .controls { align-items: flex-end; }
      button { padding-inline: 14px; }
    }
  </style>
</head>
<body>
  <main id="game" aria-label="AFTERSIGN Night Post vertical slice">
    <div id="scene">
      <div class="rain" aria-hidden="true"></div>
      <div class="fog" aria-hidden="true"></div>
      <div class="lantern left" aria-hidden="true"></div>
      <div class="lantern right" aria-hidden="true"></div>
      <div class="rail" aria-hidden="true"></div>
      <div class="stair" aria-hidden="true"></div>
      <section class="kiosk" aria-label="Io's Night Post kiosk">
        <div class="window"><div class="io" aria-hidden="true"></div></div>
      </section>
      <div class="box" aria-label="nearby sign box"></div>
      <div id="packet" class="packet" role="button" tabindex="0" aria-label="sealed blue packet: hold to open, tap deliver sealed" style="--hold: 0">
        <div class="choice-ring" aria-hidden="true"></div>
        <div class="seal" aria-hidden="true"></div>
      </div>
    </div>

    <section id="hud" aria-live="polite">
      <div id="ioLine" class="line">Io: “Blue packet. Sign box by the rail. Bring me back the fact, not the story.”</div>
      <div id="prompt" class="line prompt">Tap the packet to deliver sealed. Hold 0.55s to break the wax first.</div>
    </section>

    <nav class="controls" aria-label="slice controls">
      <button id="resetButton" type="button">Reset save</button>
      <button id="returnButton" type="button" class="primary">Start return session</button>
    </nav>
  </main>

  <script type="module">
    const STORAGE_KEY = 'aftersign.slice.ioMemory.v1';
    const HOLD_TO_OPEN_MS = 550;
    const packet = document.querySelector('#packet');
    const ioLine = document.querySelector('#ioLine');
    const prompt = document.querySelector('#prompt');
    const game = document.querySelector('#game');
    const resetButton = document.querySelector('#resetButton');
    const returnButton = document.querySelector('#returnButton');

    const state = {
      scene: 'io-night-post',
      packetOutcome: 'pending',
      ioTrustPosture: 'testing',
      authoredMemory: null,
      lastIoLine: ioLine.textContent,
      returningSession: false,
      input: {
        holdToOpenMs: HOLD_TO_OPEN_MS,
        holdProgress: 0,
        lastDecisionLatencyMs: null
      }
    };

    let holdStart = 0;
    let holdFrame = 0;
    let pointerDown = false;
    let decidedThisPress = false;

    function loadMemory() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
      } catch {
        return null;
      }
    }

    function saveMemory(record) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        ...record,
        durablePlayerId: record.durablePlayerId || 'local-harness-player',
        savedAt: new Date().toISOString()
      }));
    }

    function setLine(text) {
      ioLine.textContent = text;
      state.lastIoLine = text;
      ioLine.classList.remove('beat');
      void ioLine.offsetWidth;
      ioLine.classList.add('beat');
    }

    function setOutcome(outcome, latencyMs) {
      if (state.packetOutcome !== 'pending') return;
      state.packetOutcome = outcome;
      state.input.lastDecisionLatencyMs = Math.round(latencyMs);
      packet.classList.toggle('opened', outcome === 'opened');
      packet.classList.add('delivered');
      game.classList.add('beat');

      if (outcome === 'sealed') {
        state.ioTrustPosture = 'trusting';
        state.authoredMemory = 'The player delivered the blue packet unopened.';
        setLine('Io: “Unbroken. Good. Vey can use one more pair of clean hands.”');
      } else {
        state.ioTrustPosture = 'wary';
        state.authoredMemory = 'The player opened the blue packet before delivery.';
        setLine('Io: “Wax broke before the box. I can still use the fact. Not the habit.”');
      }

      saveMemory({
        completedDeliveryIds: ['blue-packet-sign-box'],
        deliveryOutcome: outcome,
        npcTrustPosture: state.ioTrustPosture,
        authoredMemory: state.authoredMemory,
        lastSeenBucket: 'same-night'
      });

      prompt.textContent = 'Saved. Start a return session to test Io’s memory line.';
    }

    function updateHoldProgress(now) {
      if (!pointerDown || decidedThisPress) return;
      const elapsed = now - holdStart;
      state.input.holdProgress = Math.min(1, elapsed / HOLD_TO_OPEN_MS);
      packet.style.setProperty('--hold', state.input.holdProgress.toFixed(3));
      if (elapsed >= HOLD_TO_OPEN_MS) {
        decidedThisPress = true;
        setOutcome('opened', elapsed);
        if (navigator.vibrate) navigator.vibrate(24);
        return;
      }
      holdFrame = requestAnimationFrame(updateHoldProgress);
    }

    function beginPress(event) {
      if (state.packetOutcome !== 'pending') return;
      event.preventDefault();
      packet.setPointerCapture?.(event.pointerId);
      pointerDown = true;
      decidedThisPress = false;
      holdStart = performance.now();
      state.input.holdProgress = 0;
      packet.style.setProperty('--hold', '0');
      holdFrame = requestAnimationFrame(updateHoldProgress);
    }

    function endPress(event) {
      if (!pointerDown) return;
      event.preventDefault();
      pointerDown = false;
      cancelAnimationFrame(holdFrame);
      packet.style.setProperty('--hold', '0');
      const elapsed = performance.now() - holdStart;
      if (!decidedThisPress && state.packetOutcome === 'pending') {
        setOutcome('sealed', elapsed);
        if (navigator.vibrate) navigator.vibrate(12);
      }
    }

    function startReturnSession() {
      const memory = loadMemory();
      state.returningSession = true;
      packet.classList.add('delivered');
      if (!memory) {
        setLine('Io: “No packet in the ledger yet. First we make a fact.”');
        prompt.textContent = 'No saved delivery found. Reset and make the first packet choice.';
        return;
      }

      state.packetOutcome = memory.deliveryOutcome;
      state.ioTrustPosture = memory.npcTrustPosture;
      state.authoredMemory = memory.authoredMemory;

      if (memory.deliveryOutcome === 'sealed') {
        setLine('Io: “You came back. So did the blue seal, unbroken. That gives me two facts to trust.”');
      } else {
        setLine('Io: “You came back. The seal did not. I can use one of those facts.”');
      }
      prompt.textContent = 'Return beat loaded from saved memory. Harness can assert lastIoLine against packetOutcome.';
    }

    function resetSlice() {
      localStorage.removeItem(STORAGE_KEY);
      state.scene = 'io-night-post';
      state.packetOutcome = 'pending';
      state.ioTrustPosture = 'testing';
      state.authoredMemory = null;
      state.returningSession = false;
      state.input.holdProgress = 0;
      state.input.lastDecisionLatencyMs = null;
      packet.classList.remove('opened', 'delivered');
      packet.style.setProperty('--hold', '0');
      setLine('Io: “Blue packet. Sign box by the rail. Bring me back the fact, not the story.”');
      prompt.textContent = 'Tap the packet to deliver sealed. Hold 0.55s to break the wax first.';
    }

    packet.addEventListener('pointerdown', beginPress, { passive: false });
    packet.addEventListener('pointerup', endPress, { passive: false });
    packet.addEventListener('pointercancel', endPress, { passive: false });
    packet.addEventListener('keydown', (event) => {
      if (event.key === 'Enter' || event.key === ' ') {
        event.preventDefault();
        setOutcome('sealed', 0);
      }
      if (event.key.toLowerCase() === 'o') {
        event.preventDefault();
        setOutcome('opened', HOLD_TO_OPEN_MS);
      }
    });
    resetButton.addEventListener('click', resetSlice);
    returnButton.addEventListener('click', startReturnSession);

    window.__game = {
      get storyState() {
        return {
          scene: state.scene,
          packetOutcome: state.packetOutcome,
          ioTrustPosture: state.ioTrustPosture,
          authoredMemory: state.authoredMemory,
          lastIoLine: state.lastIoLine,
          returningSession: state.returningSession
        };
      },
      get inputState() {
        return { ...state.input };
      },
      resetSlice,
      startReturnSession,
      choosePacketOutcome: (outcome) => setOutcome(outcome, outcome === 'opened' ? HOLD_TO_OPEN_MS : 0),
      loadMemory
    };
  </script>
</body>
</html>
