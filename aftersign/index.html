<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>AFTERSIGN — Kiosk Slice</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #05070c;
        color: #edf7ff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        overflow: hidden;
        background: radial-gradient(circle at 50% 20%, #182033 0%, #05070c 65%);
        touch-action: manipulation;
      }

      canvas {
        display: block;
        width: 100vw;
        height: 100vh;
      }

      .hud {
        position: fixed;
        inset: auto 0 0 0;
        padding: 18px max(18px, env(safe-area-inset-right)) max(18px, env(safe-area-inset-bottom)) max(18px, env(safe-area-inset-left));
        pointer-events: none;
        background: linear-gradient(0deg, rgba(2, 5, 10, 0.86) 0%, rgba(2, 5, 10, 0.5) 58%, rgba(2, 5, 10, 0) 100%);
      }

      .panel {
        width: min(680px, 100%);
        border: 1px solid rgba(119, 232, 255, 0.34);
        border-radius: 18px;
        padding: 16px;
        background: rgba(5, 10, 19, 0.72);
        box-shadow: 0 0 40px rgba(0, 204, 255, 0.12), inset 0 0 30px rgba(22, 89, 130, 0.14);
        backdrop-filter: blur(12px);
      }

      .speaker {
        margin: 0 0 8px;
        color: #78e9ff;
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      .line {
        margin: 0;
        font-size: clamp(17px, 3.6vw, 24px);
        line-height: 1.32;
        text-wrap: balance;
      }

      .controls {
        display: flex;
        gap: 10px;
        margin-top: 12px;
        flex-wrap: wrap;
        pointer-events: auto;
      }

      button {
        border: 1px solid rgba(173, 242, 255, 0.4);
        border-radius: 999px;
        padding: 11px 14px;
        color: #edf7ff;
        background: rgba(8, 28, 43, 0.85);
        box-shadow: 0 0 20px rgba(0, 204, 255, 0.1);
        font: inherit;
        font-weight: 750;
        cursor: pointer;
      }

      button:active {
        transform: translateY(1px) scale(0.99);
      }

      .state-readout {
        position: fixed;
        top: max(14px, env(safe-area-inset-top));
        left: max(14px, env(safe-area-inset-left));
        margin: 0;
        padding: 8px 10px;
        border-radius: 999px;
        color: rgba(237, 247, 255, 0.74);
        background: rgba(3, 7, 13, 0.58);
        font-size: 12px;
        letter-spacing: 0.04em;
      }
    </style>
  </head>
  <body>
    <canvas id="scene" aria-label="AFTERSIGN first kiosk scene"></canvas>
    <p class="state-readout" id="stateReadout">story: arrive-at-kiosk</p>
    <section class="hud" aria-live="polite">
      <div class="panel">
        <p class="speaker" id="speaker">Io</p>
        <p class="line" id="line">You made it before the rain learned your name. Good. Take the blue packet. Do not make it interesting.</p>
        <div class="controls">
          <button id="deliverButton" type="button">Leave packet at the blue kiosk</button>
          <button id="soundButton" type="button">Wake kiosk sound</button>
          <button id="resetButton" type="button">Reset slice save</button>
        </div>
      </div>
    </section>

    <script type="module">
      import * as THREE from "https://esm.sh/three@0.165.0";
      import { EffectComposer } from "https://esm.sh/three@0.165.0/examples/jsm/postprocessing/EffectComposer.js";
      import { RenderPass } from "https://esm.sh/three@0.165.0/examples/jsm/postprocessing/RenderPass.js";
      import { UnrealBloomPass } from "https://esm.sh/three@0.165.0/examples/jsm/postprocessing/UnrealBloomPass.js";

      // ------------------------------------------------------------------
      // Story-state contract wiring (docs/flagship/story-state-contract.md).
      //
      // aftersign/src/story/ioFirstBeat.ts is the canonical typed source for
      // Io's lines + memory ids. That module is consumed by the WebGL-headless
      // harness. This inline mirror is what the static page runtime uses at
      // game.oodim.com/aftersign, kept byte-identical for the strings and ids
      // the harness pins on.
      // ------------------------------------------------------------------

      const IO_MEMORY_ID = Object.freeze({
        bluePacketSealed: "io-remembers-blue-packet-sealed",
        bluePacketOpened: "io-remembers-blue-packet-opened",
      });

      const IO_FIRST_SESSION_LINES = Object.freeze({
        arrival: {
          text:
            "You made it before the rain learned your name. Good. Take the blue packet. Do not make it interesting.",
          memoryRefs: Object.freeze([]),
        },
        packetOffered: {
          text:
            "Blue wax, brass hook, no return address. Deliver it whole or deliver it broken — either way I want to know which.",
          memoryRefs: Object.freeze([]),
        },
        packetKeptSealed: {
          text:
            "Seal is clean. Box has it. That is how a city stays standing: one small refusal at a time.",
          memoryRefs: Object.freeze([]),
        },
        packetOpened: {
          text:
            "Wax is broken. So is the easy version of this job. Bring me what is left.",
          memoryRefs: Object.freeze([]),
        },
      });

      const IO_RETURNING_PACKET_LINES = Object.freeze({
        // fragment target: "blue seal, unbroken"
        sealed: {
          text:
            "You came back. So did the blue seal, unbroken. That gives me two facts to trust.",
          memoryRefs: Object.freeze([IO_MEMORY_ID.bluePacketSealed]),
        },
        // fragment target: "The seal did not"
        opened: {
          text:
            "You came back. The seal did not. I can use one of those facts.",
          memoryRefs: Object.freeze([IO_MEMORY_ID.bluePacketOpened]),
        },
      });

      const buildDeliveryOutcomeMemory = ({ outcome, sessionId, source }) => ({
        id:
          outcome === "sealed"
            ? IO_MEMORY_ID.bluePacketSealed
            : IO_MEMORY_ID.bluePacketOpened,
        kind: "delivery-outcome",
        subject: "player",
        predicate: "delivered",
        object:
          outcome === "sealed" ? "blue-packet-sealed" : "blue-packet-opened",
        deliveryId: "blue-packet",
        sessionId,
        source,
      });

      const ioReturningLine = (memories) => {
        const delivery = memories.find((m) => m.kind === "delivery-outcome");
        if (delivery?.id === IO_MEMORY_ID.bluePacketSealed)
          return IO_RETURNING_PACKET_LINES.sealed;
        if (delivery?.id === IO_MEMORY_ID.bluePacketOpened)
          return IO_RETURNING_PACKET_LINES.opened;
        return {
          text:
            "You came back. That is not nothing. Stand where I can see what the rain changed.",
          memoryRefs: [],
        };
      };

      // ------------------------------------------------------------------

      const SAVE_KEY = "aftersign.kioskSlice.v2";
      const PLAYER_ID_KEY = "aftersign.playerId";
      const canvas = document.querySelector("#scene");
      const line = document.querySelector("#line");
      const speaker = document.querySelector("#speaker");
      const stateReadout = document.querySelector("#stateReadout");
      const deliverButton = document.querySelector("#deliverButton");
      const soundButton = document.querySelector("#soundButton");
      const resetButton = document.querySelector("#resetButton");

      const buildMode = (() => {
        const params = new URLSearchParams(window.location.search);
        const explicit = params.get("mode");
        if (explicit === "test" || explicit === "dev" || explicit === "prod") return explicit;
        return "prod";
      })();

      const readBreakMode = () => {
        const params = new URLSearchParams(window.location.search);
        return params.get("break") || null;
      };

      const readOrCreatePlayerId = () => {
        try {
          const params = new URLSearchParams(window.location.search);
          const forced = params.get("playerId");
          if (forced) {
            localStorage.setItem(PLAYER_ID_KEY, forced);
            return forced;
          }
          const existing = localStorage.getItem(PLAYER_ID_KEY);
          if (existing) return existing;
          const created =
            "local-" +
            Math.random().toString(36).slice(2, 10) +
            Date.now().toString(36);
          localStorage.setItem(PLAYER_ID_KEY, created);
          return created;
        } catch (_error) {
          return "local-anon";
        }
      };

      const loadSave = () => {
        try {
          return JSON.parse(localStorage.getItem(SAVE_KEY) || "null");
        } catch (_error) {
          return null;
        }
      };

      const writeSave = (save) => {
        localStorage.setItem(SAVE_KEY, JSON.stringify(save));
        return save;
      };

      const clearSave = () => {
        localStorage.removeItem(SAVE_KEY);
      };

      const newSessionId = () =>
        "sess-" +
        Math.random().toString(36).slice(2, 10) +
        Date.now().toString(36);

      // Contract-shaped state. Field names track FlagshipGameSurface exactly.
      const state = {
        version: 1,
        build: {
          slug: "aftersign",
          mode: buildMode,
        },
        scene: {
          id: "io-night-post-kiosk",
          act: "act-1-seal",
          beat: "arrival",
          ready: false,
        },
        player: {
          id: readOrCreatePlayerId(),
          name: null,
          flags: {
            io_intro_seen: false,
            io_route_listened: false,
            returned_after_first_session: false,
            answer_tone: "unset",
          },
        },
        delivery: {
          id: "blue-packet",
          outcome: "unknown",
        },
        npcs: {
          io: {
            id: "io",
            displayName: "Io Vale",
            present: true,
            trustPosture: "untested",
            memories: [],
            lastLine: null,
            lastLineMemoryRefs: [],
          },
        },
        save: {
          slot: "default",
          revision: 0,
          lastPersistedAt: null,
          dirty: false,
          // This slice runs against localStorage only; a durable server-backed
          // save is a follow-up. The contract explicitly allows this degraded
          // mode and requires the durable harness to fail against it.
          authority: "local-fallback",
          lastLoadProof: {
            source: null,
            revision: null,
            playerId: null,
          },
        },
        // Non-contract runtime bookkeeping — kept off the FlagshipGameSurface
        // read-side; harness never reads these.
        _runtime: {
          audio: { unlocked: false, ambientStarted: false, lastCue: null },
          sessionId: newSessionId(),
          storyIdle: true,
          storyIdleResolvers: [],
          breakMode: readBreakMode(),
        },
      };

      let audioContext;
      let ambientGain;
      let rainNoise;
      let rainFilter;
      let kioskHum;
      let kioskHumGain;

      const makeRainBuffer = (context) => {
        const buffer = context.createBuffer(1, context.sampleRate * 2, context.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < data.length; i += 1) {
          data[i] = (Math.random() * 2 - 1) * 0.38;
        }
        return buffer;
      };

      const startAmbientAudio = () => {
        if (!audioContext || state.audio.ambientStarted) {
          return;
        }

        ambientGain = audioContext.createGain();
        ambientGain.gain.value = 0.045;
        ambientGain.connect(audioContext.destination);

        rainNoise = audioContext.createBufferSource();
        rainNoise.buffer = makeRainBuffer(audioContext);
        rainNoise.loop = true;

        rainFilter = audioContext.createBiquadFilter();
        rainFilter.type = "bandpass";
        rainFilter.frequency.value = 1350;
        rainFilter.Q.value = 0.72;
        rainNoise.connect(rainFilter).connect(ambientGain);
        rainNoise.start();

        kioskHum = audioContext.createOscillator();
        kioskHum.type = "sine";
        kioskHum.frequency.value = 91;
        kioskHumGain = audioContext.createGain();
        kioskHumGain.gain.value = 0.018;
        kioskHum.connect(kioskHumGain).connect(ambientGain);
        kioskHum.start();

        state.audio.ambientStarted = true;
      };

      const enableAudio = async () => {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) {
          state.audio.lastCue = "unsupported";
          publishState();
          return false;
        }

        audioContext ||= new AudioContext();
        if (audioContext.state === "suspended") {
          await audioContext.resume();
        }

        state.audio.unlocked = audioContext.state === "running";
        if (state.audio.unlocked) {
          startAmbientAudio();
          state.audio.lastCue = "ambient-rainline";
        }
        publishState();
        return state.audio.unlocked;
      };

      const playKioskConfirm = async () => {
        const unlocked = await enableAudio();
        if (!unlocked || !audioContext) {
          return;
        }

        const now = audioContext.currentTime;
        const gain = audioContext.createGain();
        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.exponentialRampToValueAtTime(0.14, now + 0.018);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.34);
        gain.connect(audioContext.destination);

        [523.25, 659.25, 987.77].forEach((frequency, index) => {
          const tone = audioContext.createOscillator();
          tone.type = index === 2 ? "triangle" : "sine";
          tone.frequency.setValueAtTime(frequency, now + index * 0.035);
          tone.connect(gain);
          tone.start(now + index * 0.035);
          tone.stop(now + 0.36);
        });

        state.audio.lastCue = "packet-confirmed";
        publishState();
      };

      const markStoryBusy = () => {
        state._runtime.storyIdle = false;
      };

      const markStoryIdle = () => {
        state._runtime.storyIdle = true;
        const resolvers = state._runtime.storyIdleResolvers.splice(0);
        resolvers.forEach((resolve) => resolve());
      };

      const waitForStoryIdle = () =>
        new Promise((resolve) => {
          if (state._runtime.storyIdle) {
            resolve();
            return;
          }
          state._runtime.storyIdleResolvers.push(resolve);
        });

      const setIoLine = (ioLine) => {
        state.npcs.io.lastLine = ioLine.text;
        state.npcs.io.lastLineMemoryRefs = Array.from(ioLine.memoryRefs);
      };

      const applySaveOnLoad = () => {
        const save = loadSave();
        if (!save) {
          state.save.lastLoadProof = {
            source: null,
            revision: null,
            playerId: null,
          };
          setIoLine(IO_FIRST_SESSION_LINES.arrival);
          return;
        }

        // Break-mode: local-only-save survives normal reload, but if the
        // harness clears localStorage before this fires there's nothing to
        // load — which is the whole point of the break mode.
        state.save.revision = save.revision ?? 0;
        state.save.lastPersistedAt = save.lastPersistedAt ?? null;
        state.save.dirty = false;
        state.save.lastLoadProof = {
          source: "local-fallback",
          revision: save.revision ?? 0,
          playerId: save.playerId ?? null,
        };

        if (save.playerId) state.player.id = save.playerId;
        if (save.flags) state.player.flags = { ...state.player.flags, ...save.flags };

        state.player.flags.returned_after_first_session = true;

        if (save.delivery?.outcome === "sealed" || save.delivery?.outcome === "opened") {
          state.delivery.outcome = save.delivery.outcome;
          state.npcs.io.trustPosture =
            save.delivery.outcome === "sealed" ? "trusted-seal" : "useful-breach";

          const breakMode = state._runtime.breakMode;

          if (breakMode !== "drop-memory") {
            const memory = buildDeliveryOutcomeMemory({
              outcome: save.delivery.outcome,
              sessionId: save.sessionId ?? state._runtime.sessionId,
              source: "local-fallback",
            });
            state.npcs.io.memories = [memory];
          }
          state.scene.beat = "arrival";
        }
      };

      const publishState = () => {
        window.__game = {
          version: state.version,
          build: state.build,
          scene: state.scene,
          player: state.player,
          delivery: state.delivery,
          npcs: state.npcs,
          save: state.save,
          input: {
            choose: (choiceId) => runChoice(choiceId),
            advance: () => runAdvance(),
            forceSave: () => runForceSave(),
            forceReload: (options) => runForceReload(options),
            waitForStoryIdle,
          },
          // Convenience escape hatch for the manual page (buttons); harness
          // never reads these.
          _test: {
            snapshot: () =>
              JSON.parse(
                JSON.stringify({
                  version: state.version,
                  build: state.build,
                  scene: state.scene,
                  player: state.player,
                  delivery: state.delivery,
                  npcs: state.npcs,
                  save: state.save,
                }),
              ),
            enableAudio: () => enableAudio(),
            resetSliceSave: () => resetSliceSave(),
          },
        };
      };

      const renderText = () => {
        speaker.textContent = "Io";
        line.textContent =
          state.npcs.io.lastLine ?? IO_FIRST_SESSION_LINES.arrival.text;
        stateReadout.textContent = "story: " + state.scene.beat;
      };

      const scene = new THREE.Scene();
      scene.fog = new THREE.FogExp2(0x07111d, 0.045);

      const camera = new THREE.PerspectiveCamera(62, 1, 0.1, 100);
      camera.position.set(0, 2.25, 7.6);

      const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, powerPreference: "high-performance" });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 1.08;

      const composer = new EffectComposer(renderer);
      composer.addPass(new RenderPass(scene, camera));
      const bloomPass = new UnrealBloomPass(new THREE.Vector2(1, 1), 0.52, 0.55, 0.18);
      composer.addPass(bloomPass);

      const hemi = new THREE.HemisphereLight(0x8ccfff, 0x09111d, 1.4);
      scene.add(hemi);

      const key = new THREE.DirectionalLight(0xc4f4ff, 2.2);
      key.position.set(-4, 6, 5);
      key.castShadow = true;
      key.shadow.mapSize.set(1024, 1024);
      scene.add(key);

      const signLight = new THREE.PointLight(0x33ddff, 8, 9, 1.8);
      signLight.position.set(0, 2.15, -1.1);
      scene.add(signLight);

      const wetGround = new THREE.Mesh(
        new THREE.PlaneGeometry(16, 18),
        new THREE.MeshStandardMaterial({ color: 0x07111a, roughness: 0.18, metalness: 0.2 })
      );
      wetGround.rotation.x = -Math.PI / 2;
      wetGround.receiveShadow = true;
      scene.add(wetGround);

      const kiosk = new THREE.Group();
      const kioskBody = new THREE.Mesh(
        new THREE.BoxGeometry(1.35, 2.45, 0.5),
        new THREE.MeshStandardMaterial({ color: 0x102134, roughness: 0.42, metalness: 0.25 })
      );
      kioskBody.position.y = 1.23;
      kioskBody.castShadow = true;
      kiosk.add(kioskBody);

      const screen = new THREE.Mesh(
        new THREE.BoxGeometry(1.08, 0.66, 0.04),
        new THREE.MeshStandardMaterial({ color: 0x67eaff, emissive: 0x25cfff, emissiveIntensity: 1.8, roughness: 0.08 })
      );
      screen.position.set(0, 1.65, 0.28);
      kiosk.add(screen);

      const slot = new THREE.Mesh(
        new THREE.BoxGeometry(0.76, 0.08, 0.05),
        new THREE.MeshStandardMaterial({ color: 0x07111a, emissive: 0x0b6a82, emissiveIntensity: 0.7 })
      );
      slot.position.set(0, 0.92, 0.3);
      kiosk.add(slot);
      scene.add(kiosk);

      const io = new THREE.Group();
      const coat = new THREE.Mesh(
        new THREE.CapsuleGeometry(0.34, 1.08, 6, 12),
        new THREE.MeshStandardMaterial({ color: 0x1d2738, roughness: 0.64, metalness: 0.05 })
      );
      coat.position.y = 1.1;
      coat.castShadow = true;
      io.add(coat);

      const face = new THREE.Mesh(
        new THREE.SphereGeometry(0.22, 24, 16),
        new THREE.MeshStandardMaterial({ color: 0xd7b99c, roughness: 0.5 })
      );
      face.position.y = 1.92;
      face.castShadow = true;
      io.add(face);

      const visor = new THREE.Mesh(
        new THREE.BoxGeometry(0.5, 0.08, 0.08),
        new THREE.MeshStandardMaterial({ color: 0x8af2ff, emissive: 0x5bdfff, emissiveIntensity: 1.1 })
      );
      visor.position.set(0, 1.95, 0.17);
      io.add(visor);
      io.position.set(-1.55, 0, 0.7);
      io.rotation.y = 0.35;
      scene.add(io);

      const makeTower = (x, z, height, color) => {
        const tower = new THREE.Mesh(
          new THREE.BoxGeometry(0.72, height, 0.72),
          new THREE.MeshStandardMaterial({ color, roughness: 0.72, metalness: 0.08 })
        );
        tower.position.set(x, height / 2, z);
        tower.castShadow = true;
        tower.receiveShadow = true;
        scene.add(tower);

        const windowStrip = new THREE.Mesh(
          new THREE.BoxGeometry(0.5, 0.06, 0.04),
          new THREE.MeshStandardMaterial({ color: 0xffca75, emissive: 0xff9d2e, emissiveIntensity: 0.45 })
        );
        windowStrip.position.set(x, height * 0.72, z + 0.39);
        scene.add(windowStrip);
      };

      makeTower(-4.6, -3.8, 4.4, 0x0c1724);
      makeTower(3.8, -3.4, 5.8, 0x101b2a);
      makeTower(-3.1, -6.1, 7.1, 0x0a1420);
      makeTower(4.9, -6.4, 6.3, 0x0d1722);

      const rain = new THREE.Group();
      const rainMaterial = new THREE.LineBasicMaterial({ color: 0x8edfff, transparent: true, opacity: 0.38 });
      for (let i = 0; i < 90; i += 1) {
        const x = THREE.MathUtils.randFloatSpread(13);
        const y = THREE.MathUtils.randFloat(1.5, 8.5);
        const z = THREE.MathUtils.randFloat(-8, 4);
        const points = [new THREE.Vector3(x, y, z), new THREE.Vector3(x - 0.08, y - 0.55, z)];
        const drop = new THREE.Line(new THREE.BufferGeometry().setFromPoints(points), rainMaterial);
        rain.add(drop);
      }
      scene.add(rain);

      const resize = () => {
        const width = window.innerWidth;
        const height = window.innerHeight;
        camera.aspect = width / height;
        camera.updateProjectionMatrix();
        renderer.setSize(width, height, false);
        composer.setSize(width, height);
        bloomPass.setSize(width, height);
      };

      // Player intent is one of the four contract choices. The runtime turns
      // authored intent into scene beats, delivery outcome, and (on reload)
      // Io's returning line + memory refs.
      const runChoice = async (choiceId) => {
        markStoryBusy();
        try {
          if (choiceId === "keep-sealed") {
            state.player.flags.io_intro_seen = true;
            state.scene.beat = "packet-choice";
            state.delivery.outcome = "sealed";
            setIoLine(IO_FIRST_SESSION_LINES.packetKeptSealed);
          } else if (choiceId === "open-packet") {
            state.player.flags.io_intro_seen = true;
            state.scene.beat = "packet-choice";
            state.delivery.outcome = "opened";
            setIoLine(IO_FIRST_SESSION_LINES.packetOpened);
          } else if (choiceId === "deliver-packet") {
            if (state.delivery.outcome === "unknown") {
              // The contract says the harness may skip through packet-offered
              // → packet-choice, but delivery without a stated seal choice is
              // a bug: pin it as sealed so the scene stays coherent.
              state.delivery.outcome = "sealed";
            }
            state.scene.beat = "packet-delivered";
            state.npcs.io.trustPosture =
              state.delivery.outcome === "sealed"
                ? "trusted-seal"
                : "useful-breach";
            const memory = buildDeliveryOutcomeMemory({
              outcome: state.delivery.outcome,
              sessionId: state._runtime.sessionId,
              source: "local-fallback",
            });
            state.npcs.io.memories = [memory];
            state.save.dirty = true;
            await runForceSave();
            playKioskConfirm();
          } else if (choiceId === "return-to-io") {
            state.scene.beat = "io-return-recognition";
            state.player.flags.returned_after_first_session = true;
            let memories = state.npcs.io.memories;
            if (state._runtime.breakMode === "wrong-io-line" && memories[0]) {
              // Deliberately mis-select so the returning line contradicts the
              // saved outcome — proves the harness catches drift.
              const flipped = memories[0].id === IO_MEMORY_ID.bluePacketSealed
                ? { ...memories[0], id: IO_MEMORY_ID.bluePacketOpened }
                : { ...memories[0], id: IO_MEMORY_ID.bluePacketSealed };
              memories = [flipped];
            }
            setIoLine(ioReturningLine(memories));
          } else {
            throw new Error("unknown choice id: " + String(choiceId));
          }
          renderText();
          publishState();
        } finally {
          markStoryIdle();
        }
      };

      const runAdvance = async () => {
        markStoryBusy();
        try {
          if (state.scene.beat === "arrival") state.scene.beat = "packet-offered";
          else if (state.scene.beat === "packet-offered") state.scene.beat = "packet-choice";
          renderText();
          publishState();
        } finally {
          markStoryIdle();
        }
      };

      const runForceSave = async () => {
        markStoryBusy();
        try {
          const next = {
            version: 2,
            playerId: state.player.id,
            sessionId: state._runtime.sessionId,
            delivery: { outcome: state.delivery.outcome },
            flags: state.player.flags,
            revision: state.save.revision + 1,
            lastPersistedAt: new Date().toISOString(),
          };
          // Break-mode: local-only-save is the default authority already, but
          // we still emit the write so a normal reload passes.
          writeSave(next);
          state.save.revision = next.revision;
          state.save.lastPersistedAt = next.lastPersistedAt;
          state.save.dirty = false;
          publishState();
        } finally {
          markStoryIdle();
        }
      };

      const runForceReload = async (options) => {
        markStoryBusy();
        try {
          if (options?.clearLocalState) {
            clearSave();
            // A durable save would survive this; local-fallback does not.
            // That's the point — the durable harness must fail here.
          }
          // Fresh session id on reload.
          state._runtime.sessionId = newSessionId();
          state.npcs.io.memories = [];
          state.npcs.io.lastLine = null;
          state.npcs.io.lastLineMemoryRefs = [];
          state.npcs.io.trustPosture = "untested";
          state.delivery.outcome = "unknown";
          state.scene.beat = "arrival";
          state.player.flags.returned_after_first_session = false;
          state.save.revision = 0;
          state.save.lastPersistedAt = null;
          applySaveOnLoad();
          renderText();
          publishState();
        } finally {
          markStoryIdle();
        }
      };

      // Manual-page shims: buttons drive the same input surface the harness
      // uses. Keeps one path through the code.
      const deliverPacket = async () => {
        if (state.delivery.outcome === "unknown") {
          await runChoice("keep-sealed");
        }
        await runChoice("deliver-packet");
      };

      const resetSliceSave = () => runForceReload({ clearLocalState: true });

      deliverButton.addEventListener("click", () => {
        deliverPacket().catch((error) => console.error(error));
      });
      soundButton.addEventListener("click", enableAudio);
      resetButton.addEventListener("click", () => {
        resetSliceSave().catch((error) => console.error(error));
      });
      window.addEventListener("resize", resize, { passive: true });

      applySaveOnLoad();
      renderText();
      state.scene.ready = true;
      publishState();
      resize();

      let last = performance.now();
      const tick = (now) => {
        const dt = Math.min((now - last) / 1000, 0.05);
        last = now;
        const t = now / 1000;

        kiosk.rotation.y = Math.sin(t * 0.6) * 0.025;
        io.position.y = Math.sin(t * 1.7) * 0.025;
        screen.material.emissiveIntensity = 1.55 + Math.sin(t * 3.2) * 0.25;
        signLight.intensity = 7.4 + Math.sin(t * 2.4) * 0.8;
        if (rainFilter) {
          rainFilter.frequency.value = 1280 + Math.sin(t * 0.7) * 180;
        }
        if (kioskHum) {
          kioskHum.frequency.value = 89 + Math.sin(t * 0.45) * 3;
        }
        rain.children.forEach((drop, index) => {
          drop.position.y -= dt * (4.4 + (index % 5) * 0.38);
          if (drop.position.y < -2) {
            drop.position.y = 7.5;
          }
        });

        composer.render();
        requestAnimationFrame(tick);
      };

      requestAnimationFrame(tick);
    </script>
  </body>
</html>
