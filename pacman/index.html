<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
    />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>Pac-Man · oodim Game</title>
    <meta name="description" content="A yellow circle, a maze, four ghosts who remember you. The way it was, sized for your phone." />
    <meta name="theme-color" content="#000000" />
    <!-- Open Graph / Twitter share metadata. og.png is a 1200×630 PNG sibling
         to this file; vite copies pacman/* under /pacman/ at build time so the
         absolute URL resolves once art lands. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="oodim Game" />
    <meta property="og:title" content="Pac-Man · oodim Game" />
    <meta property="og:description" content="A yellow circle, a maze, four ghosts who remember you. The way it was, sized for your phone." />
    <meta property="og:url" content="https://game.oodim.com/pacman/" />
    <meta property="og:image" content="https://game.oodim.com/pacman/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Pac-Man · oodim Game" />
    <meta name="twitter:description" content="A yellow circle, a maze, four ghosts who remember you. The way it was, sized for your phone." />
    <meta name="twitter:image" content="https://game.oodim.com/pacman/og.png" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='14' fill='%23ffd76a'/%3E%3Cpath d='M16 16 L30 8 A14 14 0 0 0 30 24 Z' fill='%23000'/%3E%3C/svg%3E"
      type="image/svg+xml"
    />
    <style>
      :root {
        color-scheme: dark;
        /* Canvas's native aspect: 448 × 496. The maze is wider in
           portrait once we squeeze it to viewport width, so we treat
           that ratio as the source of truth for sizing. */
        --pac-aspect: calc(448 / 496);
      }
      html,
      body {
        margin: 0;
        height: 100%;
        background: #000;
        color: #fff;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        /* Suppress iOS rubber-band scroll on swipe gestures — the
           game is the whole viewport, there's nothing to scroll TO. */
        overflow: hidden;
        overscroll-behavior: none;
        -webkit-user-select: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        /* Use the dynamic viewport unit when supported so the bottom
           browser UI bar on mobile doesn't clip the d-pad. */
        height: 100dvh;
        padding: env(safe-area-inset-top) env(safe-area-inset-right)
          env(safe-area-inset-bottom) env(safe-area-inset-left);
        box-sizing: border-box;
      }
      /* Canvas scales to fit the viewport while preserving the native
         448:496 aspect. min() with both viewport dimensions means
         portrait phones cap on width, landscape laptops cap on height,
         and the canvas never overflows either axis. */
      #game {
        background: #000;
        image-rendering: pixelated;
        /* Reserve ~180px of vertical space for the d-pad on small
           screens; on large screens the d-pad is hidden so we use
           the full height. */
        width: min(100vw, calc((100dvh - 200px) * var(--pac-aspect)));
        height: auto;
        max-width: 100vw;
        max-height: 100dvh;
        /* The canvas itself receives swipe events — disable
           native pan/zoom so swipes register as gestures, not scrolls. */
        touch-action: none;
      }
      /* On screens wide enough to fit the canvas at native-ish size
         without the d-pad eating space, allow the canvas to use the
         full viewport height. */
      @media (min-width: 900px) and (min-height: 600px) {
        #game {
          width: auto;
          height: min(100dvh, calc(100vw / var(--pac-aspect)));
        }
      }
      /* HUD strip above the canvas. Three slots — score, lives, level —
         each a [label, value] pair. Monospace + tabular numerals so the
         layout doesn't reflow as digits roll over. */
      #hud {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 16px;
        width: min(100vw, calc((100dvh - 200px) * var(--pac-aspect)));
        max-width: 100vw;
        padding: 4px 8px;
        box-sizing: border-box;
        font-size: 14px;
        line-height: 1.2;
        font-variant-numeric: tabular-nums;
        color: #ffd76a;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }
      @media (min-width: 900px) and (min-height: 600px) {
        #hud {
          width: auto;
          min-width: 320px;
        }
      }
      #hud .hud-cell {
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      #hud .hud-label {
        font-size: 10px;
        color: #ffb8ae;
        opacity: 0.75;
      }
      #hud .hud-value {
        font-size: 16px;
        font-weight: 600;
      }
      /* On-screen d-pad. Hidden on devices that report a fine pointer
         (mouse / trackpad) since the keyboard is the better input there;
         shown on coarse-pointer devices (touchscreens). */
      #dpad {
        display: none;
        grid-template-areas:
          ". up ."
          "left . right"
          ". down .";
        gap: 6px;
        touch-action: none;
      }
      @media (pointer: coarse) {
        #dpad {
          display: grid;
        }
      }
      #dpad button {
        width: 56px;
        height: 56px;
        border-radius: 12px;
        border: 1px solid #2121de;
        background: #111;
        color: #ffd76a;
        font-size: 22px;
        font-family: inherit;
        line-height: 1;
        display: grid;
        place-items: center;
        /* Each button captures its own taps; pointerdown bubbles to
           the #dpad container which the input module is listening on. */
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
        cursor: pointer;
      }
      #dpad button:active {
        background: #2121de;
        color: #fff;
      }
      #dpad [data-dir="up"] {
        grid-area: up;
      }
      #dpad [data-dir="left"] {
        grid-area: left;
      }
      #dpad [data-dir="right"] {
        grid-area: right;
      }
      #dpad [data-dir="down"] {
        grid-area: down;
      }
    </style>
  </head>
  <body>
    <!-- HUD. main.ts mirrors window.__pac into the [data-hud] spans on
         every animation frame. The data-hud attributes are the contract
         that e2e/pacman.spec.ts asserts against. -->
    <div id="hud" aria-label="Game status" role="status" aria-live="polite">
      <div class="hud-cell">
        <span class="hud-label">Score</span>
        <span class="hud-value" data-hud="score">0</span>
      </div>
      <div class="hud-cell">
        <span class="hud-label">Lives</span>
        <span class="hud-value" data-hud="lives">3</span>
      </div>
      <div class="hud-cell">
        <span class="hud-label">Level</span>
        <span class="hud-value" data-hud="level">1</span>
      </div>
    </div>
    <canvas id="game" width="448" height="496"></canvas>
    <!-- On-screen d-pad. data-dir attributes are the contract with
         src/game/input.ts; the input module listens for pointerdown
         on this container and reads data-dir to dispatch the same
         direction intents the keyboard does. -->
    <div id="dpad" aria-label="On-screen direction pad" role="group">
      <button type="button" data-dir="up" aria-label="Up">▲</button>
      <button type="button" data-dir="left" aria-label="Left">◀</button>
      <button type="button" data-dir="right" aria-label="Right">▶</button>
      <button type="button" data-dir="down" aria-label="Down">▼</button>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
