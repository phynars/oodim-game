<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
    />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>Doom · something's down here</title>
    <meta name="description" content="Something's down here. The studio learned 3D on the way down — all code, no assets." />
    <meta name="theme-color" content="#0a0a0f" />
    <!-- Open Graph / Twitter share metadata. og.png is a 1200×630 PNG sibling
         to this file; vite copies doom/* under /doom/ at build time so the
         absolute URL resolves once art lands. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="oodim Game" />
    <meta property="og:title" content="Doom · something's down here" />
    <meta property="og:description" content="Something's down here. The studio learned 3D on the way down — all code, no assets." />
    <meta property="og:url" content="https://game.oodim.com/doom/" />
    <meta property="og:image" content="https://game.oodim.com/doom/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Doom · something's down here" />
    <meta name="twitter:description" content="Something's down here. The studio learned 3D on the way down — all code, no assets." />
    <meta name="twitter:image" content="https://game.oodim.com/doom/og.png" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%230a0a0f'/%3E%3Cpath d='M6 22 L16 8 L26 22 Z' fill='%23cc3333'/%3E%3Crect x='14' y='15' width='4' height='7' fill='%230a0a0f'/%3E%3C/svg%3E"
      type="image/svg+xml"
    />
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        background: #0a0a0f;
        color: #fff;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        overflow: hidden;
        overscroll-behavior: none;
        -webkit-user-select: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100dvh;
        padding: env(safe-area-inset-top) env(safe-area-inset-right)
          env(safe-area-inset-bottom) env(safe-area-inset-left);
        box-sizing: border-box;
      }
      /* Full-bleed 3D viewport. Unlike the 2D products (portrait, pixel-art),
         Doom is a true-3D first-person view, so the canvas fills the viewport
         in landscape. We size it via CSS to the available box; the engine
         matches its drawing buffer to this displayed size (at device pixel
         ratio) on construction + resize. A 960×540 attribute default seeds a
         16:9 buffer before CSS layout settles. */
      #game {
        display: block;
        width: 100vw;
        height: 100dvh;
        background: #0a0a0f;
        touch-action: none;
      }
      /* HUD overlay — health / armor / score, pinned to the bottom of the
         viewport over the 3D view. Monospace + tabular numerals so the layout
         doesn't reflow as digits roll over. The [data-hud] attributes are the
         contract doom/e2e reads. */
      #hud {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        display: grid;
        grid-template-columns: 1fr 1fr 1fr 1fr;
        gap: 16px;
        padding: 10px 16px calc(10px + env(safe-area-inset-bottom));
        box-sizing: border-box;
        background: linear-gradient(to top, rgba(0, 0, 0, 0.6), transparent);
        font-variant-numeric: tabular-nums;
        color: #e8eaff;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        pointer-events: none;
      }
      #hud .hud-cell {
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      #hud .hud-label {
        font-size: 10px;
        color: #8ab;
        opacity: 0.8;
      }
      #hud .hud-value {
        font-size: 20px;
        font-weight: 700;
      }
      /* Health glows red, armor blue, ammo amber, score neutral —
         quick-read FPS HUD. */
      #hud [data-hud="health"] {
        color: #ff6a6a;
      }
      #hud [data-hud="armor"] {
        color: #6ab0ff;
      }
      #hud [data-hud="ammo"] {
        color: #f0c674;
      }
      /* Touch overlay (issue #90). Three controls pinned over the canvas in
         landscape: a move-stick (bottom-left), a look-drag region (right half
         of the screen), a fire button (bottom-right). Each is hidden on
         devices without coarse pointers — keyboard/mouse stays unobstructed.
         Each element carries a [data-touch=*] attribute that input.ts queries
         at boot; missing elements are simply ignored, so removing the overlay
         from the DOM disables touch with zero engine changes. */
      #touch {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 3;
        display: none;
      }
      /* Show the overlay on coarse-pointer devices (touchscreens). Desktop
         mice/trackpads report 'fine' and stay on keyboard/mouse. */
      @media (pointer: coarse) {
        #touch {
          display: block;
        }
      }
      /* Test override: e2e and any environment that wants to force-render
         the overlay (Playwright's touch emulation reports pointer:coarse,
         but we also support an explicit data attribute on <html> so unit
         debug builds can toggle without devtools). */
      html[data-touch="on"] #touch {
        display: block;
      }
      [data-touch="stick"] {
        position: absolute;
        left: calc(24px + env(safe-area-inset-left));
        bottom: calc(24px + env(safe-area-inset-bottom));
        width: 128px;
        height: 128px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.08);
        border: 2px solid rgba(232, 234, 255, 0.35);
        pointer-events: auto;
        touch-action: none;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      [data-touch="stick-knob"] {
        width: 56px;
        height: 56px;
        border-radius: 50%;
        background: rgba(232, 234, 255, 0.7);
        box-shadow: 0 0 6px rgba(0, 0, 0, 0.4);
        transform: translate(0, 0);
        pointer-events: none;
      }
      [data-touch="look"] {
        position: absolute;
        right: 0;
        top: 0;
        bottom: 0;
        width: 55%;
        pointer-events: auto;
        touch-action: none;
        /* Transparent — the canvas shows through. */
        background: transparent;
      }
      [data-touch="fire"] {
        position: absolute;
        right: calc(24px + env(safe-area-inset-right));
        bottom: calc(40px + env(safe-area-inset-bottom));
        width: 88px;
        height: 88px;
        border-radius: 50%;
        background: rgba(240, 110, 90, 0.5);
        border: 2px solid rgba(255, 200, 180, 0.6);
        color: #fff;
        font: 700 14px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        pointer-events: auto;
        touch-action: none;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
      }
      [data-touch="fire"]:active {
        background: rgba(255, 140, 110, 0.7);
      }
      /* Title + game-over overlays (#91). Full-bleed, dark, pinned over the
         canvas; main.ts toggles display based on __doom.status. Click /
         keypress falls through to the canvas listener that flips
         ready→playing (or restart on terminal states), so the overlay is
         purely cosmetic — pointer-events:none keeps the canvas in charge of
         input. */
      .overlay {
        position: fixed;
        inset: 0;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        pointer-events: none;
        z-index: 4;
        background: rgba(10, 10, 15, 0.65);
        color: #e8eaff;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        text-align: center;
        padding: 24px;
        box-sizing: border-box;
      }
      .overlay h1 {
        margin: 0 0 16px;
        font-size: clamp(36px, 8vw, 72px);
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: #ff6a6a;
        text-shadow: 0 0 12px rgba(255, 80, 80, 0.55);
      }
      .overlay p {
        margin: 6px 0;
        font-size: clamp(13px, 2vw, 18px);
        opacity: 0.85;
      }
      .overlay .kbd {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 4px;
        background: rgba(255, 255, 255, 0.12);
        border: 1px solid rgba(255, 255, 255, 0.25);
        font-weight: 700;
        margin: 0 2px;
      }
      /* Hit-flash veil — main.ts ramps opacity 0..0.5 while
         hitFlashTicks > 0. Solid red, pinned over the viewport, below the
         HUD so numbers stay readable. */
      #hit-flash {
        position: fixed;
        inset: 0;
        background: #ff2020;
        opacity: 0;
        pointer-events: none;
        z-index: 1;
        transition: opacity 80ms linear;
      }
      /* Pickup-flash vignette (#230). Radial gradient tinted by the
         picked-up kind: transparent center → tinted edges, so the corridor
         stays readable through the gift's afterglow. The --pickup-tint CSS
         variable is written by main.ts each frame the flash is active. The
         vignette sits BELOW the hit-flash (z-index:1 both) so concurrent
         damage still blots over it — damage trumps gift, narratively. */
      #pickup-flash {
        position: fixed;
        inset: 0;
        background: radial-gradient(
          ellipse at center,
          transparent 30%,
          var(--pickup-tint, transparent) 100%
        );
        opacity: 0;
        pointer-events: none;
        z-index: 1;
        transition: opacity 60ms linear;
      }
      /* Pickup MESSAGE slot (#281). One short line ("Patched up.", "Plate.
         Strap it on.", "More rounds.") pinned just above the HUD cells, in
         the same monospace stack as HEALTH/ARMOR/AMMO labels — industrial-
         grim consistency, NOT a new font or a callout balloon. main.ts
         mirrors `__doom.pickupMessage` into `textContent` each rAF and
         fades alpha while `pickupMessageTicks > 0`. The world that took
         from you in red (#91 flash) now speaks when it gives, in the same
         readable face. */
      #pickup-message {
        position: fixed;
        left: 0;
        right: 0;
        bottom: calc(72px + env(safe-area-inset-bottom));
        text-align: center;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 16px;
        letter-spacing: 0.08em;
        color: #e8eaff;
        text-shadow: 0 0 6px rgba(0, 0, 0, 0.8);
        opacity: 0;
        pointer-events: none;
        z-index: 2;
        transition: opacity 60ms linear;
      }
      /* Stat-pop transition. main.ts writes inline `transform: scale(...)`
         when a pickup of that kind arms; CSS transition smooths the rest
         of the curve between rAF samples (which are coarser than the
         60Hz tick the scale is computed at — eg. monitor refresh at 144Hz
         still only writes scale ~once per ~16ms gap). */
      #hud .hud-value {
        transform-origin: center;
        will-change: transform;
        transition: transform 30ms ease-out;
      }
      /* Crosshair. A tiny plus pinned dead-center over the canvas, drawn in
         pure DOM (no WebGL) so headless e2e can assert its existence via a
         selector without touching pixels. It's a visual sight only —
         gameplay aim still derives from camera yaw/pitch in the state
         contract. */
      #crosshair {
        position: fixed;
        left: 50%;
        top: 50%;
        width: 16px;
        height: 16px;
        margin-left: -8px;
        margin-top: -8px;
        pointer-events: none;
        opacity: 0.85;
        z-index: 2;
      }
      #crosshair::before,
      #crosshair::after {
        content: "";
        position: absolute;
        background: #e8eaff;
        box-shadow: 0 0 2px rgba(0, 0, 0, 0.7);
      }
      /* Horizontal bar. */
      #crosshair::before {
        left: 0;
        right: 0;
        top: 50%;
        height: 2px;
        margin-top: -1px;
      }
      /* Vertical bar. */
      #crosshair::after {
        top: 0;
        bottom: 0;
        left: 50%;
        width: 2px;
        margin-left: -1px;
      }
    </style>
  </head>
  <body>
    <!-- The 3D viewport. main.ts hands this to the three.js Engine. The width/
         height attributes seed the initial drawing buffer; CSS drives the
         displayed (responsive, full-bleed) size. -->
    <canvas id="game" width="960" height="540"></canvas>

    <!-- HUD. main.ts mirrors window.__doom into the [data-hud] spans on every
         animation frame. The data-hud attributes are the contract that
         doom/e2e/doom.spec.ts asserts against. -->
    <div id="hud" aria-label="Game status" role="status" aria-live="polite">
      <div class="hud-cell">
        <span class="hud-label">Health</span>
        <span class="hud-value" data-hud="health">100</span>
      </div>
      <div class="hud-cell">
        <span class="hud-label">Armor</span>
        <span class="hud-value" data-hud="armor">0</span>
      </div>
      <div class="hud-cell">
        <span class="hud-label">Ammo</span>
        <span class="hud-value" data-hud="ammo">50</span>
      </div>
      <div class="hud-cell">
        <span class="hud-label">Score</span>
        <span class="hud-value" data-hud="score">0</span>
      </div>
    </div>
    <!-- Crosshair overlay. Pure-DOM plus sign pinned to the center of the
         viewport over the WebGL canvas — read-only sight, no input. The
         #crosshair selector is the contract doom/e2e asserts on. -->
    <div id="crosshair" data-hud="crosshair" aria-hidden="true"></div>

    <!-- Hit-flash veil (#91). main.ts ramps its opacity while
         __doom.hitFlashTicks > 0. Pure cosmetic; the engine state is the
         source of truth. -->
    <div id="hit-flash" data-overlay="hit-flash" aria-hidden="true"></div>

    <!-- Pickup MESSAGE slot (#281). One line ("Patched up.", "Plate. Strap
         it on.", "More rounds.") pinned above the HUD; main.ts writes
         `textContent` from `__doom.pickupMessage` and fades alpha while
         `pickupMessageTicks > 0`. Same monospace face as the HUD labels —
         the corridor speaks in its own voice. -->
    <div id="pickup-message" data-hud="pickup-message" aria-live="polite"></div>

    <!-- Pickup-flash vignette (#230). main.ts ramps its opacity + sets the
         --pickup-tint CSS variable to the kind's color while
         __doom.pickupFlashTicks > 0. Radial gradient (transparent center →
         tinted edges) keeps the corridor readable through the afterglow. -->
    <div id="pickup-flash" data-overlay="pickup-flash" aria-hidden="true"></div>

    <!-- Title screen (#91). Shown on __doom.status === 'ready'; hidden once
         the first input flips the engine to 'playing'. Click / keypress
         lands on the canvas underneath (pointer-events:none on .overlay),
         which the engine listens to for the ready→playing transition. -->
    <div class="overlay" data-overlay="title" aria-live="polite">
      <h1>Doom</h1>
      <p>Something&rsquo;s down here.</p>
      <p style="margin-top: 16px; opacity: 0.6">
        <span class="kbd">any key</span> to descend ·
        <span class="kbd">WASD</span> move ·
        <span class="kbd">Mouse</span> look ·
        <span class="kbd">Space</span> fire
      </p>
    </div>

    <!-- Game-over screen (#91). Shown on any terminal status
         (lost / gameover / won). main.ts mirrors the final score; any input
         on the canvas (or pressing R) routes through Engine.restart() and
         reloads stage 1 with full health.

         Copy note (June): the h1 below is written for the DEATH case
         ('lost' / 'gameover'). The 'won' status currently shares this same
         overlay (see main.ts wantGameover) — so on a win the player still
         reads "It got you." That's a real bug, but it's an overlay-split
         bug, not a copy bug; the implementer who splits the overlay should
         use the win-case copy already decided below, NOT invent new lines.

         WIN-CASE COPY (decided — ship these verbatim when the overlay splits):
           h1: "You made it down."
           sub: "Score: <span data-overlay="final-score">0</span>"
           kbd: "R again, deeper"
         The keeper-line for Doom is "studio learned 3D on the way down."
         The descent is the stake; "made it down" earns its place because
         going down IS the verb the corridor demanded. "Again, deeper" is
         the dare — same shape as Pac-Man's "AGAIN. FASTER." (engine.ts),
         which is the studio voice for "you cleared it, the room reopens
         harder." Death keeps "It got you." — indefinite pronoun is the
         threat. Win names the act in second person — that's the contract. -->
    <div class="overlay" data-overlay="gameover" aria-live="polite">
      <h1>It got you.</h1>
      <p>Score: <span data-overlay="final-score">0</span></p>
      <p style="margin-top: 16px; opacity: 0.7">
        <span class="kbd">R</span> back to the corridor
      </p>
    </div>

    <!-- Touch overlay (issue #90). Hidden on fine-pointer (mouse) devices via
         @media (pointer: coarse). input.ts auto-discovers each [data-touch=*]
         element at boot and binds pointer-events; the stick produces the same
         forward/back/left/right movement intents as WASD, the look pad pipes
         pointer deltas into the same channel as mousemove (so MOUSE_SENSITIVITY
         applies), and the fire button is edge-triggered like Space. -->
    <div id="touch" aria-hidden="true">
      <div data-touch="stick" aria-label="Move stick">
        <div data-touch="stick-knob"></div>
      </div>
      <div data-touch="look" aria-label="Look drag region"></div>
      <button type="button" data-touch="fire" aria-label="Fire">Fire</button>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
